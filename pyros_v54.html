Sauce bibimbap: gochujang, huile sésame, sucre, vinaigre riz","Sésame, oignons verts"],"s":["Préparer chaque légume séparément, assaisonner.","Griller le bulgogi à feu vif.","Dresser le riz chaud dans bol.","Disposer les légumes en sections colorées sur le riz.","Poser l'oeuf au plat au centre. Sauce gochujang à côté. Mélanger tout avant de manger."]},{"n":"Fattoush Libanais Premium","d":"Salade fraîche pain pita frit croustillant, sumac, tomates, radis, herbes","i":["2 pitas frits à l'huile jusqu'à croustillants brisés en morceaux","Tomates, concombres, poivron vert, radis, oignon rouge","Menthe fraîche, persil plat","Vinaigrette: huile olive, jus citron, sumac, sel, poivre, ail"],"s":["Frire les pitas à l'huile d'olive jusqu'à dorés croustillants. Égoutter.","Couper tous les légumes en morceaux irréguliers.","Herbes fraîches généreuses.","Vinaigrette sumac-citron.","Ajouter les pitas au dernier moment pour garder le croustillant."]},{"n":"Tam Mak Hoong Laotien","d":"Version laotienne de la papaye au mortier, encore plus intense, pâte de poisson paa daek","i":["1 petite papaye verte râpée","Paa daek (pâte de poisson fermentée laotienne)","Piment, jus de citron vert","Tomates cerises, haricots longs","Crevettes séchées, cacahuètes"],"s":["Piler piment dans mortier.","Ajouter un peu de paa daek (très puissant), dosez selon tolérance.","Tomates, haricots, citron, sucre minimal.","Papaye râpée, mélanger.","Cacahuètes. Plus brut et fermenté que le som tum thaï."]},{"n":"Salade de Boeuf Thaï Yam Neua","d":"Tranches de boeuf grillé salade fraîche, sauce acidulée-pimentée, herbes","i":["300g boeuf grillé saignant tranché fin","2 c.s jus de citron vert","2 c.s sauce de poisson","1 c.c sucre","3 piments thaï","Échalotes, oignons verts, tomates cerises","Menthe, coriandre","Concombre"],"s":["Griller le boeuf saignant, laisser reposer, trancher contre le fil.","Préparer la vinaigrette: citron, sauce de poisson, sucre, piment.","Mélanger boeuf avec échalotes, oignons verts.","Verser la vinaigrette, mélanger.","Herbes fraîches et concombre. Servir à température ambiante."]}]},{"cat":"SNACKS SUCRÉS DE RUE","emoji":"🧁","items":[{"n":"Gulab Jamun Indien","d":"Boulettes de lait séché frites dorées, sirop cardamome-rose, pistaches","i":["200g khoya (lait séché) ou lait en poudre et crème","50g farine","1/4 c.c bicarbonate","Lait pour lier","Sirop: 300g sucre, 200ml eau, cardamome, eau de rose","Ghee ou huile pour frire","Pistaches, feuilles d'or"],"s":["Mélanger khoya, farine, bicarbonate. Ajouter lait goutte à goutte pour boule lisse.","Former de petites boules lisses sans fissures.","Frire à 150°C (feu doux!) 5-7 min en tournant continuellement.","Plonger chauds dans sirop chaud avec cardamome et eau de rose.","Laisser absorber 30 min minimum. Pistaches dessus."]},{"n":"Brigadeiros Brésiliens","d":"Truffes chocolat lait concentré sucré roulées dans granulés de chocolat","i":["1 boîte lait concentré sucré","2 c.s cacao en poudre","1 c.s beurre","Pincée de sel","Granulés de chocolat pour enrober"],"s":["Cuire lait concentré, cacao, beurre, sel à feu moyen en remuant constamment.","Quand ça se décolle de la casserole (8-10 min), c'est prêt.","Réfrigérer 1h pour raffermir.","Beurrer les mains, former des boules.","Rouler dans les granulés. Placer dans mini caissettes."]},{"n":"Madeleine Citron Noisette","d":"Madeleines très moelleuses beurre noisette, zeste citron, bosse parfaite","i":["150g farine","150g sucre","3 oeufs","120g beurre noisette","1 c.c levure chimique","Zeste 2 citrons","Pincée de sel"],"s":["Préparer le beurre noisette, laisser tiédir.","Fouetter oeufs et sucre jusqu'à mousseux.","Incorporer farine, levure, sel, zestes.","Ajouter beurre noisette.","Réfrigérer 1h. Beurrer les moules, remplir aux 2/3. Cuire à 220°C 3 min puis 180°C 9 min."]},{"n":"Takoyaki Sucré Nutella Fraise","d":"Boulettes sucrées à la pâte à choux avec coeur Nutella, sucre glace, fraises","i":["Pâte: 200g farine, 2 oeufs, 300ml lait, 1 c.s sucre, beurre","Nutella en poche pour farcir","Fraises fraîches coupées","Sucre glace","Moule takoyaki ou moule à cake pop"],"s":["Préparer la pâte sucrée.","Chauffer le moule, beurrer.","Remplir chaque cavité, déposer une noix de Nutella congelé au centre.","Couvrir de pâte, tourner pour former des boules.","Sucre glace, fraises fraîches."]},{"n":"Pastel de Nata Portugais","d":"Tartelette feuilletée crème pâtissière brûlée, cannelle et sucre glace","i":["Pâte feuilletée rapide (ou achetée)","Crème: 350ml lait, 3 jaunes, 100g sucre, 30g farine, 30g maïzena, 1 c.c vanille","Cannelle moulue, sucre glace"],"s":["Foncer les moules à tartelettes de pâte feuilletée fine.","Préparer la crème pâtissière légèrement liquide.","Remplir les tartelettes aux 3/4.","Cuire à 250°C 12-15 min — la crème doit brunir en surface.","Servir tiède avec cannelle et sucre glace."]},{"n":"Tres Leches Cake","d":"Génoise imbibée 3 laits (lait, crème, lait concentré), chantilly, fraises","i":["Génoise: 4 oeufs, 150g sucre, 150g farine, 1 c.c levure","3 laits: 200ml lait entier, 200ml crème liquide, 1 boîte lait concentré sucré","Chantilly: 300ml crème, sucre, vanille","Fraises fraîches, cannelle"],"s":["Préparer et cuire la génoise, laisser refroidir.","Piquer la génoise partout avec une fourchette.","Mélanger les 3 laits, verser sur la génoise.","Réfrigérer 2h minimum — le gâteau absorbe tout.","Couvrir de chantilly, fraises, cannelle."]},{"n":"Pâte de Fruit Premium","d":"Confiture gélifiée à la pectine, pure fruit, roulée dans sucre cristal","i":["500g purée de fruit frais (framboise, mangue, passion, cassis)","400g sucre","50g glucose","8g pectine jaune","Jus de citron","Sucre cristal pour enrober"],"s":["Mélanger pectine et 50g sucre.","Cuire purée, ajouter pectine-sucre en pluie, incorporer le reste du sucre et glucose.","Cuire à 107°C (thermomètre indispensable).","Verser dans cadre silicone, laisser figer 12h.","Couper en cubes, rouler dans sucre cristal."]},{"n":"Knafeh Nabulsi","d":"Fromage fondu sous pâte kataifi croustillante, sirop eau de rose, pistaches","i":["300g pâte kataifi (cheveux d'ange)","400g fromage akkawi dessalé ou mozzarella","150g beurre","Sirop: 200g sucre, 150ml eau, eau de rose, jus citron","Pistaches concassées"],"s":["Dessaler le fromage si nécessaire en le trempant dans eau froide 2h.","Fondre le beurre, mélanger avec la pâte kataifi effilochée.","Presser la moitié dans un plat beurré.","Poser le fromage en couche.","Couvrir du reste de kataifi. Cuire à 200°C 25-30 min. Retourner, napper de sirop chaud, pistaches."]}]},{"cat":"VIANDE SLOW & EFFILOCHÉE","emoji":"🥩","items":[{"n":"Barbacoa de Mejilla Mexicaine","d":"Joue de boeuf braisée enveloppée feuilles de maguey, effilochée, tacos","i":["2kg joues de boeuf","Marinade: 5 piments guajillo, 3 ancho, ail, cumin, origan, vinaigre","Feuilles de maguey ou alu","Tortillas maïs, oignons, coriandre, salsa verde"],"s":["Mariner les joues 4h dans sauce piments réhydratés mixés.","Envelopper dans feuilles de maguey.","Cuire à l'étouffée 6-8h à 130°C ou cocotte 3h.","Effilocher, récupérer le jus comme consommé.","Tacos avec oignons blancs, coriandre, salsa verde, citron vert."]},{"n":"Ropa Vieja Cubaine","d":"Flanc de boeuf braisé effiloché dans sofrito tomates-poivrons-olives, riz et plantains","i":["800g flanc de boeuf ou jarret","Sofrito: 2 oignons, 4 poivrons, 6 gousses ail, 400g tomates concassées","Cumin, oregano, vin blanc","Olives vertes, câpres","Riz blanc, plantains frits"],"s":["Cuire le boeuf dans eau avec aromates jusqu'à très tendre, 2-3h.","Effilocher la viande.","Faire le sofrito dans la même cocotte.","Ajouter boeuf effiloché, vin blanc, tomates, cumin, origan.","Mijoter 20 min. Olives et câpres. Servir avec riz et plantains frits."]},{"n":"Porcchetta Italienne Roll","d":"Porc entier rôti fenouil-romarin-ail-zeste d'orange, tranché dans sandwich ciabatta","i":["1,5kg poitrine de porc déroulée","2 c.s fenouil sauvage ou graines fenouil","Romarin, sauge, ail haché","Zeste orange, sel, poivre noir concassé","Ciabatta ou pain rustique"],"s":["Étaler la poitrine à plat, inciser la chair.","Mélanger fenouil, romarin, sauge, ail, zeste orange, sel, poivre.","Masser généreusement l'intérieur.","Rouler très serré, ficeler.","Rôtir à 230°C 20 min pour la peau, puis 160°C 2h. Laisser reposer 30 min. Trancher épais dans le pain."]},{"n":"Texas Brisket Tacos","d":"Tranches épaisses de brisket fumé dans tortillas maïs, pico, guac, pickled onions","i":["Brisket fumé (voir recette brisket Texas)","Tortillas maïs épaisses","Pico de gallo frais","Guacamole","Oignons rouges marinés: oignon, vinaigre, sel, sucre, citron vert"],"s":["Trancher le brisket en bouchées.","Chauffer les tortillas directement sur flamme.","Préparer oignons marinés 30 min avant.","Assembler: brisket, pico, guac, oignons marinés.","Trait de hot sauce."]},{"n":"Lamb Shoulder Slow 8h","d":"Épaule d'agneau entière 8h au four doux, effilochée, flatbread, tzatziki","i":["1 épaule d'agneau entière (1,8kg)","Marinade: ail, origan, cumin, paprika fumé, huile olive, jus citron","200ml vin blanc ou eau","Flatbreads pita","Tzatziki, oignons rouges, herbes"],"s":["Inciser l'épaule profondément, insérer des gousses d'ail.","Badigeonner généreusement de marinade.","Placer dans plat avec vin blanc, filmer avec alu.","Cuire à 150°C pendant 8h.","Effilocher à la fourchette, récupérer le jus. Servir dans pita avec tzatziki, oignons, herbes."]},{"n":"Bo Kho Boeuf Carottes Viêtnam","d":"Ragoût boeuf épicé citronnelle-annatto-anis étoilé, carottes, pain baguette","i":["800g jarret de boeuf en gros cubes","Marinade: citronnelle, ail, gingembre, annatto, piment, sauce de poisson","2 tiges citronnelle","2 carottes en grosses rondelles","400ml lait de coco","Baguette vietnamienne"],"s":["Mariner le boeuf 2h.","Saisir le boeuf dans huile avec citronnelle, ail.","Mouiller avec eau et lait de coco.","Ajouter carottes, mijoter 2h jusqu'à tendre.","Servir avec baguette vietnamienne pour tremper dans la sauce rouge."]},{"n":"Porc Effiloché Asiatique Style","d":"Épaule de porc braisée soja-5 épices-anis, effilochée, bao vapeur, concombre","i":["1kg épaule de porc","Braise: 100ml soja, 50ml mirin, 50ml saké, 2 c.s sucre, 5 étoiles d'anis, cannelle, 5 épices","Bao vapeur (achetés)","Concombre en tranches, oignons verts, sauce hoisin"],"s":["Braisier le porc dans le mélange soja-mirin avec épices 2h-2h30 à couvert.","La sauce doit réduire et devenir sirupeuse.","Effilocher la viande, enrober du jus réduit.","Cuire les bao vapeur.","Garnir: porc glacé, hoisin, concombre, oignons verts."]}]},{"cat":"TACOS AVANCÉS SUITE","emoji":"🌮","items":[{"n":"Tacos de Canasta","d":"Tacos marinés dans huile pimentée transportés dans panier, fondants, tradition Mexico","i":["Tortillas maïs","Farce: haricots refrits, pomme de terre-chorizo, ou chicharrón en salsa","Huile pimentée au chile ancho pour tremper","Oignons, coriandre, piment de arbol"],"s":["Préparer les farces.","Chauffer l'huile pimentée.","Farcir et plier les tortillas.","Tremper dans l'huile pimentée chaude.","Empiler dans le panier tapissé de plastique, l'huile continue de cuire les tacos en transpirant. Servir avec salsa."]},{"n":"Tacos de Chapulines","d":"Sauterelles grillées au sel et citron, dans tortilla avec guac, avocat, chile","i":["200g chapulines (sauterelles séchées)","Jus de citron vert","Sel","Tortillas maïs bleu","Guacamole","Salsa de molcajete","Oignons, coriandre"],"s":["Faire revenir les chapulines à sec dans wok chaud.","Assaisonner sel et jus de citron.","Chauffer les tortillas.","Étaler le guacamole.","Poser les chapulines croustillants, oignons, coriandre, salsa. Goût: crevette + noisette."]},{"n":"Tacos de Suadero","d":"Boeuf poitrine confit dans huile jusqu'à fondant et doré, oignon blanc, coriandre","i":["800g suadero (poitrine de boeuf contre-plat, la couche graisseuse entre peau et chair)","Huile pour confire","Sel","Tortillas maïs petites","Oignons blancs, coriandre, salsa verde et roja"],"s":["Cuire le suadero dans l'huile à 150°C pendant 2h jusqu'à fondant.","Augmenter la température pour dorer la surface.","Hacher grossièrement ou couper en morceaux.","Graisser les tortillas avec l'huile de cuisson.","Garnir de viande, oignons blancs, coriandre, double salsa."]},{"n":"Tacos Gobernador","d":"Crevettes et fromage fondus ensemble, poivrons, dans tortilla de farine grillée","i":["400g crevettes décortiquées","1 poivron rouge, 1 poivron vert","200g fromage Chihuahua ou mozzarella","1 oignon, ail, chile pasilla","Tortillas de farine","Salsa verde"],"s":["Faire revenir oignon, poivrons, ail, chile.","Ajouter crevettes, cuire 2 min.","Chauffer la tortilla de farine sur comal.","Poser fromage sur la tortilla, garniture de crevettes par-dessus.","Plier, griller jusqu'à fromage fondu. Salsa verde froide."]},{"n":"Carnitas Michoacán Tacos","d":"Porc confit dans saindoux-orange-épices, frit croustillant, triple salsa","i":["1,5kg porc (échine, palette, poitrine) en morceaux","400g saindoux","1 orange coupée en deux","Cumin, laurier, thym, sel","Tortillas maïs","Oignons, coriandre, salsa molcajete, guac, chile de arbol"],"s":["Fondre le saindoux, ajouter tous les morceaux de porc.","Orange, épices, sel. Confire à feu doux 1h30.","Augmenter le feu pour dorer.","Égoutter, effriter en morceaux irréguliers.","Tacos avec oignons blancs, coriandre, toutes les salsas."]}]},{"cat":"BOUCHÉES ET FINGER FOOD ÉLÉGANTS","emoji":"🍢","items":[{"n":"Blinis Caviar et Crème Fraîche","d":"Mini blinis sarrasin chauds, crème fraîche, caviar osciètre ou saumon","i":["Mini blinis sarrasin (recette blini en + petit)","Crème fraîche épaisse","Caviar ou oeufs de saumon","Aneth","Zeste de citron"],"s":["Cuire les blinis très petits (5cm).","Servir tièdes.","Petite cuillère de crème fraîche.","Poser le caviar délicatement.","Brin d'aneth et zeste de citron."]},{"n":"Bruschetta Pomodoro Basilic","d":"Pain ciabatta grillé, tomates concassées crues, basilic, huile d'olive extra, sel fleur","i":["1 ciabatta ou pain de campagne","4 tomates mûres en dés","Basilic frais abondant","Huile d'olive extra vierge de qualité","Ail pour frotter","Fleur de sel, poivre"],"s":["Griller les tranches de pain sur braise ou gril.","Frotter avec l'ail cru immédiatement.","Mélanger tomates, basilic, huile olive, sel.","Laisser mariner 15 min.","Disposer sur le pain au moment de servir. Huile d'olive supplémentaire. Fleur de sel."]},{"n":"Gougères Gruyère","d":"Petits choux gruyère-muscade, légers et creux, servis chauds avec vin blanc","i":["250ml eau","100g beurre","150g farine","4 oeufs","150g gruyère râpé fin","Sel, poivre, muscade"],"s":["Préparer la pâte à choux classique.","Hors feu, incorporer le gruyère et la muscade.","Mettre en poche, coucher des petits choux de 3cm.","Badigeonner oeuf, parsemer un peu de gruyère.","Cuire à 200°C 20-25 min sans ouvrir le four. Servir immédiatement."]},{"n":"Pintxos Basques Variés","d":"Petites brochettes sur pain, garnitures variées: anchois, jambon, chorizo, tortilla","i":["Pain de campagne tranché fin toasté","Jambon serrano","Anchois","Chorizo tranché","Tortilla espagnole en petits carrés","Pimientos del piquillo","Olives, câpres"],"s":["Toaster le pain légèrement.","Préparer les garnitures variées.","Assembler: une ou deux garnitures sur chaque tranche.","Piquer avec un petit pic en bois.","Disposer sur planche ou plateau. Le bar à pintxos: chacun se sert."]},{"n":"Dim Sum Siu Mai Porc Crevette","d":"Dumplings ouverts classiques dim sum, peau jaune, farce porc-crevette-shiitake","i":["Pâte: 200g farine blanche, 50g farine de blé dur, eau chaude colorée curcuma","Farce: 200g porc haché, 100g crevettes, 50g shiitake, soja, sésame, gingembre, sucre"],"s":["Pâte jaune: incorporer curcuma dans farine, eau chaude, pétrir.","Farce: mélanger porc, crevettes hachées, champignons, assaisonnements.","Étaler fins cercles, centrer une cuillère de farce.","Plier en cylindre ouvert dessus, plisser les bords.","Vapeur 10 min. Servir avec sauce soja-gingembre."]},{"n":"Deviled Eggs Louisianais","d":"Oeufs mimosa fourrés mayo-moutarde-cajun, garnis crevette épicée ou bacon","i":["8 oeufs durs","4 c.s mayo","1 c.s moutarde de Dijon","1 c.c épices cajun","Sel, poivre, tabasco","Garniture: petites crevettes sautées épicées, ou bacon croustillant, ou caviar"],"s":["Cuire les oeufs durs parfaits: 12 min, eau froide.","Couper en deux, récupérer les jaunes.","Mixer jaunes, mayo, moutarde, cajun, tabasco jusqu'à lisse.","Mettre en poche, fourrer les blancs.","Garnir selon envie: crevette, bacon ou caviar. Paprika fumé et ciboulette."]},{"n":"Arancini Truffes Noires","d":"Boules de risotto truffe noire et parmesan frites, coeur de taleggio fondant","i":["400g risotto refroidi truffe noire et parmesan","100g taleggio ou fontina en petits dés (coeur)","Oeufs, chapelure panko","Huile","Sauce: fond de veau court ou beurre truffe"],"s":["Former des boules en insérant un dé de fromage au centre.","Passer en oeuf puis panko.","Frire à 175°C 5-6 min.","Servir sur sauce fond de veau ou beurre à la truffe.","Râper un peu de truffe supplémentaire dessus si disponible."]}]},{"cat":"STREET FOOD MÉDITERRANÉEN","emoji":"🌊","items":[{"n":"Panisse Marseillaise","d":"Farine de pois chiches cuite, moulée, frite en bâtonnets croustillants, fleur de sel","i":["250g farine de pois chiches","750ml eau","3 c.s huile d'olive","Sel, poivre, thym","Fleur de sel pour servir","Sauce: mayo ail ou aioli"],"s":["Porter l'eau et l'huile à ébullition avec sel.","Verser la farine en pluie en fouettant.","Cuire 5-8 min en remuant constamment.","Verser dans moule huilé, laisser refroidir et solidifier.","Couper en bâtonnets, frire à 180°C 4 min. Fleur de sel et aioli."]},{"n":"Keftedes Grecs Menthe","d":"Boulettes de viande grecques à la menthe et origan, frites, tzatziki","i":["500g agneau ou boeuf haché","1 oignon mixé","3 c.s menthe fraîche","1 c.s origan séché","1 oeuf, 2 c.s chapelure, sel, poivre","Farine pour enrober","Tzatziki maison"],"s":["Mélanger viande, oignon, menthe, origan, oeuf, chapelure.","Réfrigérer 30 min.","Former des petites boulettes allongées.","Enrober légèrement de farine.","Frire dans huile d'olive à 170°C 4-5 min. Tzatziki genereux."]},{"n":"Loukoumades Grecs","d":"Beignets ronds légers dorés, miel, cannelle, noix concassées","i":["200g farine","7g levure","150ml eau tiède","Pincée de sel, 1 c.c sucre","Huile de friture","Miel de thym","Cannelle, noix concassées"],"s":["Mélanger farine, levure, eau tiède, sel, sucre jusqu'à pâte lisse.","Laisser pousser 1h.","Frire par cuillerées à 180°C en faisant des boules parfaites.","3-4 min jusqu'à dorure uniforme.","Napper de miel chaud, cannelle, noix."]},{"n":"Meze Plateau Méditerranéen","d":"Plateau de petits plats: houmous, tzatziki, mutabal, dolmades, olives, pain pita","i":["Houmous maison","Tzatziki: yaourt, concombre, ail, aneth","Mutabal: aubergines rôties mixées avec tahini","Dolmades: feuilles de vigne farcies riz et herbes","Olives kalamata, feta marinée aux herbes","Pain pita chaud"],"s":["Préparer chaque composante individuellement.","Servir dans petits ramequins ou directement sur ardoise.","Houmous avec huile d'olive et paprika.","Pain pita chaud coupé en triangles.","Chacun se sert, l'ordre n'existe pas."]},{"n":"Spanakopita Triangles","d":"Triangles de filo croustillants fourrés épinards-feta-oignons verts-menthe","i":["10 feuilles de filo","300g épinards frais sautés bien essorés","200g feta émiettée","3 oignons verts","Menthe fraîche","Aneth","2 oeufs","Beurre fondu"],"s":["Mélanger épinards essorés, feta, oignons verts, menthe, aneth, oeufs.","Beurrer une feuille de filo, couper en bandes.","Poser farce au coin, plier en triangle (comme un drapeau).","Beurrer l'extérieur.","Cuire à 180°C 20-25 min jusqu'à doré croustillant."]},{"n":"Ftira Maltaise","d":"Pain rond malte fendu, thon, câpres, olives, tomates, oeufs durs, anchois","i":["4 petits pains maltais ou ciabatta","Thon à l'huile de qualité","Câpres maltaises (au sel)","Tomates fraîches","Oeufs durs","Anchois","Olives noires","Huile d'olive"],"s":["Tremper légèrement le pain dans l'eau froide puis essorer.","Frotter avec tomates fraîches coupées.","Garnir de thon émietté, câpres rincées, olives, anchois, oeuf dur tranché.","Filet d'huile d'olive généreuse.","Poivre noir et sel."]},{"n":"Sfeeha Libanaise","d":"Petites tartelettes ouvertes d'agneau haché épicé, tomates, oignons, grenade","i":["Pâte levée: 300g farine, 7g levure, 150ml eau tiède, 2 c.s huile, sel","Farce: 400g agneau haché, 2 tomates mixées, 1 oignon, pins, grenade, cannelle, 7 épices, sel"],"s":["Pâte levée 1h, étaler en petits cercles de 10cm.","Mélanger farce épicée avec tomates, oignon.","Égoutter l'excès de liquide de la farce.","Étaler sur les cercles en couche fine.","Cuire à 200°C 15-20 min jusqu'à bords dorés. Jus de grenade dessus."]}]},{"cat":"NOODLES AVANCÉS SUITE","emoji":"🍜","items":[{"n":"Jjajangmyeon Coréen","d":"Nouilles sauce noire aux haricots (chunjang), porc, courgette, oignons","i":["300g nouilles jjajang épaisses ou spaghetti","3 c.s chunjang (pâte de haricots noirs fermentés)","200g porc haché ou dés","1 oignon, 1 courgette","Eau, fécule de maïs pour épaissir","Concombre julienne, oeuf au plat"],"s":["Frire le chunjang dans l'huile 2 min (indispensable pour enlever l'amertume).","Faire revenir porc, oignon, courgette.","Ajouter chunjang frit, eau, laisser mijoter 10 min.","Épaissir avec fécule de maïs.","Cuire les nouilles, dresser avec sauce. Concombre julienne et oeuf au plat."]},{"n":"Mie Goreng Indonésien","d":"Nouilles sautées wok kecap manis-crevettes-chou, oeuf, kerupuk","i":["300g nouilles aux oeufs fraîches","200g crevettes","2 oeufs","2 c.s kecap manis (sauce soja sucrée)","1 c.s sauce de poisson","Chou, poireaux, carottes","Ail, échalotes, piment","Kerupuk (chips crevettes) pour servir"],"s":["Wok très chaud, faire revenir ail et échalotes.","Ajouter crevettes.","Pousser, brouiller les oeufs.","Ajouter légumes et nouilles.","Kecap manis, sauce de poisson, wok toss à feu max. Kerupuk et oignons frits."]},{"n":"Pho Ga Poulet Vietnamien","d":"Bouillon doré poulet épices douces, poulet effiloché, nouilles, herbes fraîches","i":["1 poulet entier","Épices: gingembre brûlé, oignon brûlé, étoile d'anis, cannelle","Sauce de poisson, sel, sucre","Nouilles pho","Poulet effiloché","Oignons verts, coriandre, basilic, germes, jalapeño, citron vert"],"s":["Bouillir le poulet avec épices grillées, gingembre brûlé, oignon brûlé.","2h à frémissements, filtrer.","Effilocher le poulet.","Assaisonner le bouillon: sauce de poisson, sel, sucre.","Dresser: nouilles, poulet, bouillon brûlant, garnitures fraîches."]},{"n":"Tsukemen Ramen Trempette","d":"Ramen froids trempés dans bouillon chaud très concentré, porc, naruto, nori","i":["Ramen épais (niboshi ou straight)","Tsuyu concentré: bouillon porc et dashi de poisson, tare, sauce de poisson","Chashu épais","Menma, naruto, nori","Oignons verts, poivre noir"],"s":["Cuire les ramen, rincer à l'eau froide, diviser en portions.","Préparer le tsuyu ultra concentré — 3 fois plus intense que le ramen normal.","Réchauffer le tsuyu dans petit bol/casserole.","Tremper les nouilles froides par petites bouchées dans le tsuyu chaud.","Chashu et garnitures à côté."]},{"n":"Aglio e Olio Pasta Midnight","d":"Spaghetti ail doré, huile olive, piment, persil — le plat de minuit romain","i":["400g spaghetti","8 gousses ail émincées très finement","6 c.s huile d'olive extra vierge","2 piments rouges frais ou secs","Grande botte de persil plat","Sel, eau de cuisson amidon"],"s":["Cuire les spaghetti dans eau très salée.","Chauffer l'huile avec ail à feu très doux — il doit dorer sans brûler.","Ajouter piment, verser une louche d'eau de cuisson (ça crache!).","Égoutter les pâtes al dente, toss dans la poêle avec l'huile.","Persil haché abondant. Huile d'olive extra à la fin."]},{"n":"Khao Soi Curry Laque Chiang Mai","d":"Nouilles aux oeufs dans bouillon curry coconut thaï-birman, nouilles frites dessus","i":["Pâte curry khao soi: piments séchés, curcuma, galangal, lemongrass, ail","400ml lait de coco","300ml bouillon poulet","Cuisses de poulet braisées","Nouilles aux oeufs fraîches","Une poignée de nouilles frits croustillants dessus","Échalotes, cornichons moutarde, lime"],"s":["Frire la pâte curry khao soi dans huile 3 min.","Ajouter lait de coco, bouillon, cuire 5 min.","Braiser le poulet dans ce bouillon 20 min.","Cuire les nouilles fraîches.","Dresser: nouilles, poulet, bouillon. Nouilles frites croustillantes dessus. Échalotes, cornichons, lime."]},{"n":"Pasta alla Gricia","d":"L'ancêtre de la carbonara: guanciale, pecorino, poivre noir — rien d'autre","i":["400g rigatoni ou tonnarelli","200g guanciale (joue de porc séchée) en dés","150g pecorino romano râpé finement","Poivre noir fraîchement moulu en quantité généreuse","Eau de cuisson"],"s":["Rôtir le guanciale à sec jusqu'à croustillant et gras fondu.","Cuire les pâtes dans peu d'eau (plus d'amidon).","Égoutter en gardant beaucoup d'eau de cuisson.","Toss les pâtes dans le gras de guanciale.","Ajouter pecorino et eau de cuisson en mélangeant vigoureusement pour crémer. Guanciale dessus. Poivre noir généreux."]}]},{"cat":"SNACKS ASIATIQUES COMPLÉMENTAIRES","emoji":"🧆","items":[{"n":"Gyoza Japonais Frit-Vapeur","d":"Demi-lunes de pâte fine, farce porc-chou-gingembre, mi-frit mi-vapeur, sauce ponzu","i":["Pâte gyoza: 200g farine, 100ml eau bouillante","Farce: 300g porc haché, 150g chou napa émincé et essoré, gingembre, soja, sésame, oignons verts","Sauce: soja, vinaigre riz, huile piment"],"s":["Pâte: eau bouillante sur farine, pétrir immédiatement, reposer 30 min.","Farce: mélanger tous les ingrédients, mariner 15 min.","Farcir les disques de pâte, plisser les bords.","Huile dans poêle, dorer le fond 2 min.","Verser 100ml eau, couvrir, vapeur 6 min. Découvrir, croustiller 1 min. Sauce ponzu."]},{"n":"Edamame Shio Koji","d":"Gousses de soja entières cuites et marinées shio koji umami, fleur de sel","i":["500g edamame en gousses fraîches ou surgelés","3 c.s shio koji (koji de sel fermenté)","Fleur de sel, piment en option"],"s":["Cuire les edamame en gousses 5 min dans eau très salée.","Égoutter, mélanger chaud avec le shio koji.","Laisser mariner 20 min.","Servir tiède ou froid.","Fleur de sel supplémentaire. Manger en extrayant les fèves des gousses avec les dents."]},{"n":"Scallion Pancake Cong You Bing","d":"Galette feuilletée à la ciboulette, laminée en spirale, croustillante, sauce dipping","i":["300g farine","180ml eau bouillante","3 c.s huile de sésame","4 oignons verts hachés fins","Sel","Sauce: soja, vinaigre riz, sésame, piment, ail"],"s":["Eau bouillante sur farine, pétrir jusqu'à lisse, reposer 30 min.","Étaler en rectangle, badigeonner d'huile de sésame.","Parsemer d'oignons verts et sel.","Rouler en boudin, puis en spirale, aplatir à nouveau.","Cuire dans huile 3 min par face jusqu'à croustillant et feuilleté. Sauce dipping."]},{"n":"Chikuwabu Oden Japonais","d":"Tofu, daikon, oeuf, poulpe dans bouillon dashi léger sucré-salé, moutarde karashi","i":["Dashi: kombu et katsuobushi","Assaisonnement: soja, mirin, sel, sucre","Ingrédients oden: daikon en rondelles épaisses, oeufs durs, tofu frit, saucisses japonaises, konnyaku, chikuwabu","Moutarde karashi"],"s":["Préparer le dashi, assaisonner pour bouillon oden (doux et légèrement sucré).","Pré-cuire le daikon à l'eau jusqu'à mi-tendre.","Plonger tous les ingrédients dans le dashi, laisser mijoter 2h à feu très doux.","Plus ça mijote, plus les saveurs s'imprègnent.","Servir dans bols avec bouillon, moutarde karashi à côté."]},{"n":"Mandu Coréens Porc Tofu","d":"Raviolis coréens porc-tofu-kimchi-oignons verts, cuits vapeur ou grillés","i":["Pâte mandu: farine, eau tiède, sel","Farce: 200g porc haché, 100g tofu ferme pressé, 100g kimchi haché essoré, oignons verts, soja, sésame, ail","Sauce trempette: soja, vinaigre, sésame, piment"],"s":["Pâte: eau tiède, farine, sel, pétrir, reposer 30 min.","Farce: mélanger tous les ingrédients, bien presser pour enlever l'humidité.","Farcir les disques, plier en demi-lune ou former en bourse.","Cuire vapeur 12 min, ou griller pan-fry style.","Sauce soja-vinaigre à côté."]},{"n":"Bánh Cuốn Crêpes Riz Vapeur","d":"Fines crêpes de farine de riz cuites vapeur, roulées avec porc-champignons, herbes","i":["Pâte: 200g farine de riz, 400ml eau, sel","Farce: porc haché, champignons noirs réhydratés, échalotes, sel, poivre","Nuoc cham: sauce de poisson, sucre, citron, ail, piment","Chả lụa (saucisse porc vietnamienne), frites d'échalotes, herbes"],"s":["Cuire les crêpes de riz vapeur ultra fines sur tissu huilé.","Farce: faire revenir porc et champignons.","Étaler la farce sur la crêpe, rouler immédiatement.","Couper en morceaux.","Servir avec nuoc cham, chả lụa, échalotes frites, concombre, herbes."]},{"n":"Wonton Soupe Cantonaise","d":"Wontons porc-crevettes dans bouillon cantonais léger, oignons verts, sésame","i":["Pâte wonton: 200g farine, eau tiède, sel (ou pâte achetée)","Farce: 200g porc haché, 100g crevettes hachées, soja, sésame, gingembre, oignons verts","Bouillon: 1 litre bouillon de poulet, soja, huile de sésame, sel","Oignons verts, champignons"],"s":["Farce: mélanger porc, crevettes, soja, sésame, gingembre.","Farcir les wontons, plier en triangle ou en bourse.","Préparer le bouillon léger assaisonné.","Cuire les wontons dans eau bouillante 4-5 min.","Transférer dans bols avec bouillon chaud, oignons verts, sésame."]}]},{"cat":"SPÉCIALITÉS RÉGIONALES FRANÇAISES STREET","emoji":"🇫🇷","items":[{"n":"Croque Monsieur Premium","d":"Jambon de Paris, gruyère fondu, béchamel généreuse, pain de mie beurré grillé","i":["Pain de mie de qualité","Jambon de Paris épais","Gruyère ou Comté râpé","Béchamel: beurre, farine, lait, muscade, sel","Beurre pour griller"],"s":["Préparer une béchamel épaisse.","Assembler: pain, béchamel fine, jambon, gruyère, pain.","Tartiner béchamel épaisse sur le dessus, parsemer gruyère.","Dorer à la poêle beurrée 3 min par face.","Finir sous le grill pour gratiner. Servir brûlant."]},{"n":"Socca Niçoise Croustillante","d":"Crêpe épaisse farine pois chiches, huile olive, cumin, servie brûlante poivrée","i":["300g farine de pois chiches","400ml eau","6 c.s huile olive extra vierge","1 c.c cumin","Sel","Poivre noir frais pour finition"],"s":["Fouetter farine, eau, huile olive, cumin, sel en pâte lisse.","Laisser reposer 30 min.","Huiler généreusement une grande poêle ou plaque en fonte.","Verser la pâte pour une crêpe épaisse de 1cm.","Cuire à four très chaud 230°C 10-12 min ou sous grill. Brûlante, croustillante, poivre noir à la sortie."]},{"n":"Merguez Frites Parisiennes","d":"Merguez grillées, frites maison, harissa, pain baguette — standard bistrots","i":["4 merguez de qualité","500g frites maison","Harissa","1 baguette fraîche","Moutarde en option"],"s":["Griller les merguez sur plancha ou gril 5-6 min.","Préparer les frites: double friture (150°C puis 190°C).","Saler les frites immédiatement.","Couper la baguette, glisser les merguez.","Harissa généreuse. Frites dans un cornet à côté."]},{"n":"Tartine Beurre Radis Parisienne","d":"Pain de campagne, beurre AOP demi-sel, radis croquants, fleur de sel","i":["Pain de campagne de qualité en belles tranches","Beurre demi-sel AOP (Isigny ou Échiré) à température ambiante","Radis frais croquants","Fleur de sel"],"s":["Tartiner généreusement le pain de beurre mou.","Trancher les radis finement.","Disposer les radis en chevauchement sur le beurre.","Fleur de sel.","Servir immédiatement: le contraste beurre froid-radis croquant-fleur de sel est parfait."]},{"n":"Andouillette Grillée AAAAA","d":"Andouillette 5A grillée à point, moutarde ancienne, frites, vin blanc Chablis","i":["4 andouillettes AAAAA","Moutarde à l'ancienne","Moutarde de Dijon","Frites","Échalotes, vin blanc sec","Beurre, sel, poivre"],"s":["Inciser légèrement les andouillettes pour éviter l'éclatement.","Griller sur gril chaud ou plancha 5-6 min par face.","Sauce moutarde: faire suer échalotes, déglacer vin blanc, réduire, ajouter moutarde.","Servir avec la double moutarde.","Frites et un verre de Chablis ou Riesling."]},{"n":"Camembert Fondu en Boîte","d":"Camembert dans sa boîte mis au four avec ail et romarin, chips et pain pour tremper","i":["1 Camembert de Normandie AOP dans sa boîte en bois","3 gousses ail émincées","Branches de romarin frais","Filet de vin blanc","Pain de campagne, baguette","Chips pour tremper"],"s":["Retirer l'emballage plastique du camembert, le remettre dans la boîte.","Inciser en croix sur le dessus.","Insérer ail et romarin dans les incisions.","Verser un filet de vin blanc.","Cuire à 180°C 20 min. Servir dans la boîte avec pain et chips pour tremper."]},{"n":"Flammekueche Alsacienne","d":"Tarte flambée pâte très fine, crème fraîche, oignons, lardons, sans fromage","i":["Pâte: 250g farine, 120ml eau, 2 c.s huile, sel","Garniture: 200ml crème fraîche épaisse, 2 oignons émincés fins, 150g lardons fumés","Sel, poivre, muscade"],"s":["Pâte sans levure, pétrir 10 min, reposer 30 min.","Étaler très finement, presque transparente.","Étaler la crème sur toute la surface.","Répartir oignons et lardons.","Cuire à 250°C 8-10 min. La pâte doit être croustillante, bords légèrement brûlés."]}]},{"cat":"BROCHETTES ET GRILLADES SUITE","emoji":"🔥","items":[{"n":"Kofta Grillées Épices","d":"Viande hachée agneau-boeuf modelée sur brochette, herbes, paprika, sauce yaourt","i":["500g mélange agneau-boeuf haché 50/50","1 oignon mixé égoutté","Persil, menthe fraîche hachés","1 c.c cumin, 1 c.c coriandre, 1 c.c paprika, cannelle","Sauce: yaourt, ail, citron, menthe","Pain pita, oignons"],"s":["Mélanger viandes, oignon, herbes, épices vigoureusement.","Réfrigérer 30 min.","Modeler en saucisses sur brochettes plates en pressant fermement.","Griller sur braise vive 4-5 min en tournant.","Sauce yaourt-menthe, pita, oignons frais."]},{"n":"Espetinho Brésilien","d":"Petites brochettes de rue São Paulo: coeur de poulet, frango, queijo, sauce cocktail","i":["300g coeurs de poulet","300g poulet en cubes","100g fromage minas en cubes","Assaisonnement: sel, ail, poivre, origan","Sauce cocktail: ketchup, mayo, sauce de tabasco, citron"],"s":["Alterner sur les brochettes: coeur, poulet, fromage.","Assaisonner généreusement.","Griller sur braise ou grill 10-12 min en tournant.","Badigeonner d'un peu d'huile à mi-cuisson.","Sauce cocktail pour tremper."]},{"n":"Tsukune Boulettes Poulet Japonais","d":"Boulettes de poulet haché sur brochette, sauce tare, jaune d'oeuf cru pour tremper","i":["500g poulet haché","2 oignons verts hachés fins","1 c.s gingembre râpé","1 c.s soja, 1 c.c sésame","Sauce tare: soja, mirin, saké, sucre (réduits)","Jaunes d'oeufs frais pour tremper"],"s":["Mélanger poulet haché, oignons verts, gingembre, soja, sésame.","Mouiller légèrement les mains, former des boulettes allongées sur brochettes.","Griller à feu moyen 3 min par face en tournant.","Badigeonner de sauce tare, 2 passages.","Servir avec jaune d'oeuf cru dans petite assiette pour tremper."]},{"n":"Ahi Thon Sésame Grillé","d":"Pavé de thon rouge enrobé graines de sésame, saisi 30 secondes par face, cru dedans","i":["2 beaux pavés de thon rouge","4 c.s graines de sésame (blanc et noir mélangés)","Sauce: 3 c.s soja, 1 c.s mirin, 1 c.c gingembre, wasabi","Salade de roquette, avocat","Vinaigrette: soja, sésame, citron vert"],"s":["Badigeonner légèrement le thon d'huile.","Presser les graines de sésame sur toutes les faces.","Saisir dans poêle très chaude 30 secondes par face seulement.","Trancher immédiatement.","Disposer sur roquette et avocat avec vinaigrette. Sauce wasabi-soja à côté."]},{"n":"Pinchos Morunos Espagnols","d":"Brochettes porc mariné cumin-paprika-ail façon maures, citron, persil","i":["500g filet de porc en cubes de 2cm","Marinade: 3 c.s huile olive, 1 c.s cumin, 1 c.s paprika doux, 1 c.c ras el hanout, ail, sel, jus citron","Citron, persil haché"],"s":["Mariner le porc 4h minimum avec les épices (marinade maure).","Enfiler sur brochettes courtes.","Griller sur braise vive 3-4 min par face.","Laisser reposer 2 min.","Jus de citron frais, persil haché."]},{"n":"Brochettes Poulet Bahrani","d":"Poulet mariné épices du Bahreïn (baharat, loomi), grillé, pain khobz","i":["600g poulet en cubes","Marinade: yaourt, 1 c.s baharat, 1 c.c loomi (lime séché poudre), ail, gingembre, curcuma","Pain khobz ou pita","Sauce: tomates fraîches, piment, ail, coriandre"],"s":["Mariner le poulet 4h dans yaourt épicé.","Enfiler sur brochettes.","Griller 10-12 min en tournant.","Préparer la sauce tomates-piment fraîche.","Servir dans le pain khobz avec sauce et oignons."]}]},{"cat":"DESSERTS ASIATIQUES ET MOYEN-ORIENTAUX","emoji":"🍮","items":[{"n":"Om Ali Égyptien","d":"Pain feuilleté (croissant ou pâte feuillettée) cuit dans crème chaude, noix, raisins","i":["200g pâte feuilletée ou croissants rassis émiettés","500ml crème entière","200ml lait","3 c.s sucre","Cannelle, cardamome","100g pistaches, noix, amandes, raisins secs","Noix de coco râpée"],"s":["Émietter le feuilletage, étaler dans plat.","Chauffer crème, lait, sucre, épices jusqu'à presque bouillant.","Verser sur le feuilletage.","Ajouter noix, raisins, coco.","Cuire à 200°C 15-20 min jusqu'à doré et bouillonnant."]},{"n":"Halawa Tahini Sésame","d":"Confiserie à la pâte de sésame et sirop de sucre cristallisé, pistaches","i":["300g tahini de qualité","200g sucre","50ml eau","1 c.c extrait de vanille","100g pistaches concassées"],"s":["Cuire le sucre et eau à 125°C (boule ferme).","Chauffer le tahini séparément à 65°C.","Verser le sirop sur le tahini en fouettant.","Incorporer pistaches et vanille.","Verser dans moule huilé, laisser refroidir et cristalliser. Couper en portions."]},{"n":"Qatayef Ramadan","d":"Crêpes épaisses farcies crème ou noix, frites ou cuites vapeur, sirop eau de rose","i":["Pâte: 200g farine, 1 c.c levure, 250ml eau tiède, 1 c.c sucre","Farce noix: noix, cannelle, sucre, eau de rose","Ou farce crème: ashta (crème épaisse) et pistaches","Sirop: sucre, eau, jus citron, eau de rose"],"s":["Pâte levurée, laisser pousser 30 min, cuire comme des blinis (une seule face!).","Côté non cuit reste humide pour coller.","Farcir et pincer les bords en demi-lune.","Frire à 170°C 3-4 min ou cuire au four.","Tremper dans sirop eau de rose, pistaches."]},{"n":"Taro Ball Boules Taro Taïwan","d":"Boules de taro et patate douce violette bouillies, servi chaud ou froid avec lait de coco","i":["300g taro cuit en purée","200g fécule de tapioca","Sucre, sel","Boules patate douce violette (idem avec patate douce)","Lait de coco sucré chaud ou froid","Haricots rouges, jelly de konjac"],"s":["Mixer taro avec sucre et fécule de tapioca jusqu'à pâte.","Diviser, rouler en petites boules de 1cm.","Idem avec patate douce violette.","Cuire dans eau bouillante 5 min jusqu'à translucides.","Servir avec lait de coco chaud, haricots rouges, jelly."]},{"n":"Muhallabia Liban Crème Fleur d'Oranger","d":"Crème de lait à la fleur d'oranger, très légère, pistaches, eau de rose","i":["500ml lait entier","3 c.s maïzena","3 c.s sucre","2 c.s eau de fleur d'oranger","Pistaches concassées","Cannelle en option"],"s":["Délayer maïzena dans un peu de lait froid.","Chauffer le reste du lait avec sucre.","Incorporer la maïzena, cuire en remuant jusqu'à épaississement (5 min).","Hors feu, ajouter eau de fleur d'oranger.","Verser dans verrines, refroidir, réfrigérer 2h. Pistaches et cannelle."]},{"n":"Matcha Dorayaki","d":"Pancakes japonais moelleux fourrés crème matcha-anko, style moderne","i":["Pâte dorayaki: 2 oeufs, 60g sucre, 1 c.s miel, 100g farine, 1/2 c.c bicarbonate, 2 c.s eau","Crème matcha: 200ml crème fouettée, 2 c.s sucre glace, 1 c.s matcha","Anko (pâte de haricots rouges sucrée)"],"s":["Fouetter oeufs, sucre, miel. Incorporer farine et bicarbonate dilué.","Reposer 30 min.","Cuire des petites galettes épaisses à feu doux, retourner quand des bulles apparaissent.","Fouetter crème avec matcha et sucre glace.","Assembler par paires: une couche d'anko, une couche de crème matcha entre deux dorayaki."]},{"n":"Sesame Ball Jian Dui","d":"Boule de pâte de riz gluant fourrée anko, roulée sésame, frite gonflée croustillante","i":["200g farine de riz gluant","100ml eau tiède","60g sucre","Anko (pâte haricots rouges) ou pâte lotus","100g graines de sésame","Huile de friture"],"s":["Mélanger farine gluante, sucre, eau jusqu'à pâte souple.","Former des boules, creuser, farcir d'anko, refermer.","Rouler dans les graines de sésame en appuyant légèrement.","Frire à 160°C (feu doux) en appuyant légèrement au début.","Les boules doublent de taille. 8-10 min jusqu'à dorées."]}]},{"cat":"ÉLABORÉS ET TECHNIQUES","emoji":"👨‍🍳","items":[{"n":"Xo Fried Rice Cantonais","d":"Riz cantonais wok avec XO sauce, oeufs, légumes, wok hei intense","i":["400g riz jasmin cuit de la veille (froid)","3 c.s XO sauce","2 oeufs","100g crevettes","Oignons verts, carottes pois","Sauce soja, huile d'arachide"],"s":["Wok très chaud, huile d'arachide.","Oeufs brouillés rapidement, pousser.","Ajouter crevettes.","Riz froid directement, écraser les blocs.","XO sauce, soja, wok toss à feu maximum pour le wok hei. Oignons verts."]},{"n":"Consommé Clarifié Classique","d":"Bouillon double clarifié à la clarification (raft), servi avec brunoise ou quenelles","i":["2 litres bouillon de boeuf ou poulet fort","Clarification: 300g viande hachée, 2 blancs d'oeufs, 2 tomates, mirepoix, aromates","Garniture: brunoise de légumes, vermicelles ou quenelles fines"],"s":["Mélanger viande hachée froide, blancs, tomates, mirepoix.","Incorporer au bouillon froid, porter à ébullition en remuant.","Quand le raft se forme, arrêter de remuer.","Laisser frémir 45 min sans toucher.","Passer délicatement à la passoire et étamine. Limpide comme du cristal. Servir avec garniture."]},{"n":"Terrine de Foie Gras Maison","d":"Foie gras cru assaisonné et mis en terrine, cuit bain-marie, démoulé le lendemain","i":["1 lobe de foie gras de canard frais de 500g","Sel, sucre, poivre blanc, quatre épices","30ml Sauternes ou Armagnac","Pain brioché grillé, fleur de sel, confiture de figue"],"s":["Déveiner délicatement le foie à température ambiante.","Assaisonner avec sel, poivre, quatre épices, alcool.","Tasser dans terrine, réfrigérer 12h.","Cuire bain-marie à 90°C pendant 40-50 min (jusqu'à 58°C coeur).","Presser, réfrigérer 24h. Servir tranché avec brioche et fleur de sel."]},{"n":"Sphérification Olive Huile","d":"Fausse olive: sphère d'huile d'olive encapsulée dans membrane d'alginate, mimétique","i":["200ml huile d'olive extra vierge","Alginate de sodium 0,5g par 100ml eau","Chlorure de calcium 0,5g par 100ml eau","Eau distillée"],"s":["Préparer le bain d'alginate en mixant avec eau, laisser reposer 30 min.","Bain de chlorure de calcium dans eau distillée.","Prendre de l'huile avec une cuillère ronde, plonger dans le bain d'alginate.","Laisser former 2 min, transférer dans eau distillée pour rincer.","Servir immédiatement sur cuillère: la sphère éclate en bouche, libérant l'huile."]},{"n":"Œuf Parfait 63 Degrés","d":"Oeuf entier cuit précisément à 63°C 1h, jaune coulant épais, blanc juste gélifié","i":["6 oeufs très frais","Fleur de sel","Poivre de Timut ou poivre noir","Mouillettes de pain brioché beurré","Huile de truffe en option"],"s":["Tempérer l'eau à exactement 63°C avec thermoplongeur ou cocotte sur thermomètre.","Plonger les oeufs entiers dans leur coquille.","Cuire exactement 1 heure en maintenant la température.","Casser délicatement sur assiette.","Fleur de sel, poivre, filet d'huile de truffe. Mouillettes de brioche."]},{"n":"Carbonara di Mare","d":"Spaghetti à la carbonara avec fruits de mer: palourdes, crevettes, encornet — sans porc","i":["400g spaghetti","200g palourdes","150g crevettes","100g encornets en anneaux","4 jaunes d'oeufs, 1 oeuf entier","100g bottarga (oeufs de mulet séchés) râpée ou parmesan","Vin blanc, ail, persil"],"s":["Ouvrir les palourdes au vin blanc avec ail, garder le jus.","Cuire les pâtes.","Fouetter jaunes, oeuf, parmesan ou bottarga.","Sauter crevettes et encornets.","Mélanger pâtes dans la poêle avec fruits de mer hors feu, verser les oeufs, incorporer avec eau cuisson. Jus de palourdes pour l'umami."]},{"n":"Cromesquis de Foie Gras","d":"Cubes de foie gras panés fine chapelure, frits 30 secondes, fondent en bouche","i":["200g foie gras cuit (de terrine) réfrigéré","Farine, oeuf battu, panko très fin","Huile à 180°C","Fleur de sel","Chutney de mangue ou gelée de Sauternes"],"s":["Couper le foie gras froid en cubes de 2cm.","Paner très rapidement: farine, oeuf, panko. Retravailler entre chaque étape.","Remettre au congélateur 10 min.","Frire 30 secondes seulement à 180°C.","Servir immédiatement sur fleur de sel, le centre doit être encore chaud et fondant."]}]},{"cat":"SANDWICHS SUITE","emoji":"🥪","items":[{"n":"Cemita Milanesa de Res","d":"Brioche sésame mexicaine, escalope de boeuf panée, avocat, chipotles, quesillo","i":["4 cemitas (buns sésame)","4 escalopes de boeuf fines panées","2 avocats","Chipotles en adobo","200g quesillo effiloché","Tomates, laitue"],"s":["Paner et frire les escalopes de boeuf.","Ouvrir les cemitas, tartiner de chipotles des deux côtés.","Superposer escalope, avocat écrasé, quesillo, laitue, tomate.","Appuyer fort.","Servir chaud, le fromage doit fondre légèrement."]},{"n":"Club Sandwich Premium","d":"Triple decker pain de mie, poulet rôti, bacon, tomate, laitue, mayo, oeuf","i":["6 tranches pain de mie de mie toastées","200g poulet rôti tranché","4 tranches bacon croustillant","Tomates rondelles","Laitue iceberg","Mayo maison","2 oeufs durs tranchés"],"s":["Toaster le pain doré.","Tartiner les trois tranches de mayo.","Première couche: pain, laitue, tomate, mayo.","Deuxième tranche, poulet, bacon, oeuf.","Troisième tranche. Couper en 4 triangles, piquer avec longue pique."]},{"n":"Reuben Sandwich New-Yorkais","d":"Pain seigle grillé, corned beef, sauerkraut, Swiss cheese fondu, Russian dressing","i":["4 tranches pain seigle épais","300g corned beef tranché épais","150g sauerkraut bien égoutté","4 tranches Swiss cheese (Emmental ou Gruyère)","Russian dressing: mayo, ketchup, raifort, cornichons, paprika"],"s":["Préparer le Russian dressing.","Tartiner le pain de dressing.","Superposer corned beef chaud, sauerkraut, fromage.","Griller dans beurre 3-4 min par face.","Le fromage doit être fondu, le pain bien doré."]},{"n":"Mozzarella in Carrozza","d":"Sandwich mozzarella dans pain de mie, trempé oeuf, frit doré, fondant","i":["8 tranches pain de mie sans croûte","400g mozzarella fraîche en tranches épaisses","4 anchois (option)","2 oeufs, 50ml lait","Farine","Huile pour frire"],"s":["Superposer mozzarella (et anchois optionnel) entre deux tranches de pain.","Appuyer pour coller.","Passer dans farine, puis oeuf-lait, puis farine à nouveau.","Frire à 170°C 3-4 min.","Servir immédiatement: extérieur croustillant, fromage fondu dedans."]},{"n":"Croque Madame","d":"Croque Monsieur avec un oeuf au plat sur le dessus, béchamel, gruyère","i":["Pain de mie","Jambon blanc","Gruyère ou Comté","Béchamel généreuse","Beurre","1 oeuf au plat par sandwich"],"s":["Préparer le croque monsieur avec béchamel sur le dessus.","Gratiner sous le grill.","Cuire un oeuf au plat séparément beurre-sel.","Poser l'oeuf sur le croque sorti du grill.","Servir immédiatement pendant que le jaune est encore coulant."]},{"n":"Medianoche Cubain","d":"Pain cubain sucré, porc rôti, jambon, Suisse, cornichons, moutarde, pressé chaud","i":["4 pains cubains medianoche (petits pains briochés légèrement sucrés)","200g porc rôti tranché fin","200g jambon","4 tranches Swiss cheese","Cornichons tranchés","Moutarde jaune","Beurre pour presser"],"s":["Ouvrir les pains.","Tartiner les deux faces de moutarde.","Superposer jambon, porc, fromage, cornichons.","Beurrer l'extérieur.","Presser dans plancha pressée ou fonte lourde à feu moyen jusqu'à pain doré et fromage fondu."]}]},{"cat":"PLUS DE STREET FOOD WORLD","emoji":"🌐","items":[{"n":"Pad Kra Pao Poulet Thaï","d":"Poulet haché sauté au basilic sacré, oeuf frit, riz blanc — plat national de rue Thaïlande","i":["400g poulet haché","4-8 piments thaï hachés","4 gousses ail","Grande botte basilic sacré thai (or regular si indisponible)","2 c.s sauce huître, 1 c.s sauce de poisson, 1 c.c sucre","2 oeufs frits","Riz jasmin"],"s":["Wok très chaud, huile, faire revenir ail et piment 30 secondes.","Ajouter poulet haché, écraser, cuire à feu vif.","Sauce huître, sauce de poisson, sucre, mélanger.","Basilic sacré en dernier, juste fané.","Servir sur riz avec oeuf frit dessus. Le jaune doit être encore coulant."]},{"n":"Rendang Boeuf Sumatra","d":"Boeuf mijoté lentement dans lait de coco et épices jusqu'à sec et caramélisé — le prince des currys secs","i":["1kg paleron de boeuf en gros cubes","Pâte rempah: 10 piments rouges, 6 échalotes, 4 gousses ail, galangal, lemongrass, gingembre","400ml lait de coco","Feuilles de lime kaffir, feuilles de citronnelle, curcuma frais"],"s":["Mixer la pâte rempah.","Faire revenir la pâte 5 min dans wok.","Ajouter boeuf, lait de coco, feuilles aromatiques.","Mijoter à découvert 3-4h en remuant de temps en temps.","Quand tout le liquide est absorbé, le boeuf frit dans sa propre huile et caramélise — c'est prêt."]},{"n":"Mutton Keema Naan","d":"Naan tandoor fourré viande d'agneau hachée épicée, oignons, piments, coriandre","i":["Pâte naan: 300g farine, yaourt, levure, sel, sucre","Keema: 300g agneau haché, oignons, tomates, ail, gingembre, épices (cumin, garam masala, piment)","Coriandre fraîche, ghee"],"s":["Pâte levée 1h.","Préparer le keema: revenir oignons, ail, gingembre, ajouter agneau, tomates, épices, cuire sec.","Étaler la pâte en disque, farcir de keema, refermer.","Étaler à nouveau délicatement.","Cuire sur plaque très chaude ou tandoor. Ghee immédiatement à la sortie."]},{"n":"Mole Negro Poulet Oaxaca","d":"La sauce la plus complexe du Mexique: 30 ingrédients dont chocolat et piments multiples","i":["Piments: mulato, pasilla, ancho, chihuacle negro (7-8 de chaque type)","Graines de sesame, courge, cacahuètes","Tomates, tomatillos, oignons, ail","Chocolat noir, pain rassis, plantain frit","Épices: cumin, origan, cannelle, clous de girofle","1 poulet en morceaux"],"s":["Griller chaque type de piment à sec séparément, tremper dans eau chaude.","Torréfier toutes les graines et épices séparément.","Charrer tomates, tomatillos, oignons, ail.","Frire pain et plantain.","Mixer par étapes, cuire dans cocotte en couches de saveurs 2h. Ajouter poulet, mijoter 30 min."]},{"n":"Biryani Royal Hyderabad","d":"Riz basmati et agneau mariné cuits en dum (étouffé), safran, oignons dorés","i":["600g agneau en morceaux","Marinade: yaourt, ail, gingembre, piment, garam masala, huile, citron","400g riz basmati long trempé","Safran dans lait chaud","Oignons frits croustillants (barista)","Ghee, épices entières"],"s":["Mariner l'agneau 4h. Cuire à moitié dans sauce.","Cuire le riz à 60% avec épices entières, sel.","Superposer dans grande cocotte: agneau, riz, safran-lait, oignons frits, ghee.","Sceller le couvercle à la pâte ou alu.","Cuire dum 30-40 min à feu doux. Ouvrir à table devant les convives."]},{"n":"Jollof Rice Nigérian de Fête","d":"Riz cuit dans sauce tomate-poivrons-épices, poulet grillé, plantains frits","i":["400g riz long grain","400g tomates mixées avec poivrons rouges et oignons","Poulet grillé épicé suya","Bouillon de poulet","Thym, laurier, curry, paprika fumé","Plantains mûrs frits","Piment scotch bonnet"],"s":["Frire la sauce tomate-poivron dans huile 15 min (sauce de base).","Ajouter bouillon, porter à ébullition.","Riz lavé, réduire le feu.","Cuire 20-25 min couverts jusqu'à absorption.","La couleur orange-rouge et le fond légèrement brûlé sont la signature. Servir avec poulet et plantains."]},{"n":"Chili Con Carne Texas No Beans","d":"Boeuf en dés (pas haché) au chili rouge sans haricots — la règle texane","i":["1kg paleron en dés de 2cm","5 piments ancho réhydratés, 3 guajillo","2 c.s cumin moulu","1 oignon, 6 gousses ail","500ml bouillon de boeuf","Masa harina pour épaissir (optionnel)","Pain de maïs pour servir"],"s":["Dorer le boeuf en dés par portions.","Mixer les piments réhydratés avec ail et oignons.","Cuire la sauce 5 min, ajouter boeuf.","Bouillon, cumin, mijoter 2h30 jusqu'à boeuf très tendre.","Pas de haricots, pas de tomates — c'est la règle. Masa pour épaissir si nécessaire."]},{"n":"Shakshuka Verte Zhoug","d":"Oeufs pochés dans sauce verde épinards-jalapeño-coriandre, version non-rouge","i":["6 oeufs","300g épinards","2 jalapeños","Grande botte coriandre","1 oignon vert","2 gousses ail","Jus de citron, sel","Feta, huile olive","Pain pita"],"s":["Mixer épinards, jalapeños, coriandre, oignons verts, ail, citron — sauce verte.","Chauffer la sauce dans poêle avec huile.","Creuser des niches, casser les oeufs.","Couvrir, cuire 5-7 min.","Feta émiettée, huile olive, pita chaud."]}]},{"cat":"CHARCUTERIE ET CONSERVES MAISON","emoji":"🥓","items":[{"n":"Rillettes de Porc du Mans","d":"Porc confit dans sa graisse effiloché, pot de rillettes dorées, cornichons, pain","i":["1kg épaule de porc avec gras","300g saindoux","Sel, poivre, thym, laurier","Vin blanc sec","Cornichons, pain de campagne"],"s":["Couper le porc en gros dés, assaisonner la veille avec sel, épices, thym.","Cuire avec saindoux et vin blanc à 150°C pendant 3h en cocotte.","La viande doit se défaire au toucher.","Égoutter, effilocher, remettre dans la graisse de cuisson.","Mettre en pot, laisser refroidir. Servir à température ambiante avec cornichons."]},{"n":"Lard Fumé Maison","d":"Poitrine de porc saumurée et fumée au bois de hêtre, tranchée fine","i":["1kg poitrine de porc","Saumure: 1 litre eau, 100g sel, 50g sucre, laurier, poivre, baies de genévrier","Bois de hêtre pour fumer"],"s":["Saumurer la poitrine 48h au frigo.","Rincer, sécher à l'air 24h (peau sèche = meilleure fumée).","Fumer à froid 8h ou à chaud 4h à 70°C avec bois de hêtre.","Laisser reposer et maturer 48h au frigo avant de trancher.","Trancher très fin, frire à la poêle croustillant."]},{"n":"Confit de Canard Maison","d":"Cuisses de canard confites dans leur graisse, conservées, rôties croustillantes","i":["4 cuisses de canard","Gros sel, thym, laurier, poivre, baies de genévrier","Graisse de canard fondue (ou huile)","Ail"],"s":["Saler les cuisses généreusement avec herbes, réfrigérer 24h.","Rincer, sécher.","Confire dans graisse fondue à 80°C pendant 3-4h.","Laisser refroidir dans la graisse, conserver ainsi des mois.","Pour servir: rôtir côté peau à 200°C 20 min jusqu'à croustillant."]},{"n":"Saucisson Sec Lyonnais","d":"Saucisse séchée porc-vin rouge-épices, affinage 4-6 semaines, planche apéro","i":["1kg porc maigre haché, 300g gorge de porc hachée","30g sel nitrité de charcuterie","5g sucre, 3g poivre, 2g noix de muscade","100ml vin rouge, boyau de porc 38mm"],"s":["Mélanger toutes les chairs avec épices et vin.","Embosser dans le boyau sans trop serrer.","Ficeler régulièrement.","Sécher à 10-12°C et 80% humidité pendant 4-6 semaines.","Trancher fin pour l'apéro. Se conserve des mois."]},{"n":"Terrine de Campagne Rustique","d":"Terrine porc-foie-lard-herbes, cuite au bain-marie, pressée, servie froide","i":["500g porc maigre haché","200g foie de porc haché","200g lard gras haché","2 oeufs, 50ml cognac","Ail, échalotes, thym, persil","Sel, poivre, quatre épices","Bandes de lard pour chemiser"],"s":["Mélanger viandes hachées, oeufs, cognac, aromates, épices.","Chemiser la terrine de bandes de lard.","Remplir, tasser, refermer les bandes de lard dessus.","Cuire bain-marie à 160°C 1h30.","Presser jusqu'à refroidissement, réfrigérer 24h minimum."]}]},{"cat":"CUISINE DE RUE AFRICAINE AVANCÉE","emoji":"🌍","items":[{"n":"Thiéboudienne Sénégalais","d":"Le plat national: riz au poisson rouge frit, légumes, tomate concentrée","i":["400g thiof ou daurade entier","300g riz brisé sénégalais","Sauce: tomates, concentré, oignons, ail, poisson fumé yette","Légumes: chou, aubergines africaines, carottes, manioc","Huile, sel, piment, persil, citron"],"s":["Farcir le poisson de persil, ail, sel, piment.","Frire dans huile chaude.","Sauce tomate profonde avec légumes et poisson fumé.","Cuire le riz dans cette sauce rouge jusqu'à absorption.","Dresser riz, poisson frit, légumes. Jus de citron."]},{"n":"Egusi Soup Nigérian","d":"Soupe aux graines d'egusi (melon) avec feuilles amères, viande et poisson fumé","i":["200g graines d'egusi moulues","200g viande de chèvre ou boeuf","100g poisson fumé","Feuilles amères (bitter leaf) ou épinards","Oignons, tomates","Huile de palme rouge","Iru (locust bean fermenté), sel, piment"],"s":["Chauffer l'huile de palme, revenir oignons.","Ajouter pâte d'egusi, frire en remuant 5 min.","Viande cuite, poisson fumé, piment.","Mouiller avec bouillon ou eau.","Feuilles amères en dernier, cuire 10 min. Accompagner de fufu ou riz."]},{"n":"Asun Porc Épicé Fumé Yoruba","d":"Chèvre fumée puis grillée dans sauce piment scotch bonnet — fête nigériane","i":["1kg viande de chèvre découpée","Scotch bonnet (quantité selon tolérance)","Oignons","Huile de palme","Sel, poivre, poudre curry","Bois de fumage"],"s":["Cuire la chèvre à l'eau avec sel et épices 30 min.","Fumer 1h avec bois de bois léger.","Frire dans huile de palme avec oignons.","Ajouter scotch bonnet haché généreusement.","Servir avec du pain ou directement — plat de fête."]},{"n":"Piri Piri Chicken Mozambique","d":"Poulet mariné pili pili frais, grillé sur braise, sauce piri piri maison","i":["1 poulet entier découpé","Marinade piri piri: 10 piments piri piri ou birds eye, ail, jus citron, huile, paprika, origan","Beurre piri piri pour servir"],"s":["Mixer la marinade piri piri.","Inciser le poulet profondément, enduire de marinade.","Mariner 4h minimum.","Griller sur braise 35-45 min en badigeonnant.","Beurre piri piri fondu dessus à la sortie."]},{"n":"Bunny Chow Durban","d":"Pain burger évidé rempli de curry d'agneau ou de haricots — street food Durban SA","i":["4 petits pains blancs ronds (ou moitiés de pain de mie)","Curry: 500g agneau en cubes, oignons, tomates, épices curry Durban, piment, sel","Ou: curry de haricots/légumes","Coriandre fraîche"],"s":["Cuire le curry d'agneau épicé jusqu'à tendre et sauce épaisse.","Évider les petits pains en gardant la mie (pour tremper).","Remplir l'intérieur de curry brûlant.","La mie évidée posée sur le dessus.","Coriandre. Manger en déchirant le pain dans le curry."]},{"n":"Kapenta Sardines Lac Malawi","d":"Petites sardines du lac séchées puis frites, tomates, oignons, sadza (polenta maïs)","i":["300g kapenta ou petites sardines séchées","2 tomates, 2 oignons","Piment, sel","Huile","Sadza: farine de maïs blanche, eau bouillante"],"s":["Rincer les kapenta.","Frire les oignons dans huile.","Ajouter tomates et piment, cuire 5 min.","Kapenta, mélanger doucement, cuire 10 min.","Sadza: farine dans eau bouillante, remuer 15 min jusqu'à solide. Servir ensemble."]},{"n":"Muamba de Galinha Angola","d":"Poulet en sauce palm oil et moambe (beurre de palme), gombos, piment","i":["1 poulet découpé","200ml huile de palme rouge (dendê)","200g beurre de palme (moamba)","Okras (gombos)","Piment, ail, sel","Riz ou funge (polenta manioc)"],"s":["Saisir le poulet dans l'huile de palme.","Ajouter ail, piment, sel.","Verser le beurre de palme dilué dans eau chaude.","Mijoter 30 min jusqu'à sauce onctueuse.","Okras en dernier 10 min. Servir avec riz ou funge."]}]},{"cat":"CUISINE VÉGANE CRÉATIVE","emoji":"🌱","items":[{"n":"Jackfruit Pulled Pork Style","d":"Jeune fruit du jaquier en conserve effiloché, BBQ fumé, slaw, bun végane","i":["2 boîtes jeune jackfruit en saumure","Sauce BBQ: ketchup, sirop d'érable, vinaigre, paprika fumé, ail, sauce Worcester végane","Buns","Coleslaw végane: mayo d'avocat, chou, carottes"],"s":["Égoutter et rincer le jackfruit.","Faire revenir dans poêle, écraser et effilocher avec deux fourchettes.","Ajouter la sauce BBQ, cuire 10 min jusqu'à caramélisation.","Préparer le coleslaw.","Assembler sur bun grillé avec coleslaw."]},{"n":"Aubergine Croustillante Miso","d":"Rondelles d'aubergine panées et frites, glaze miso-mirin, sésame, oignons verts","i":["2 aubergines en rondelles épaisses","Fécule de maïs pour paner","Glaze: 3 c.s miso blanc, 2 c.s mirin, 1 c.s saké ou eau, sucre","Sésame noir et blanc, oignons verts"],"s":["Saler les rondelles, attendre 20 min, sécher.","Enrober dans fécule de maïs.","Frire à 180°C 4-5 min jusqu'à dorées.","Chauffer la glaze miso.","Napper les rondelles, finir sous grill 1 min. Sésame et oignons verts."]},{"n":"Tofu Katsu Curry","d":"Tofu ferme pané façon katsu japonais, sauce curry japonaise végane, riz","i":["400g tofu ferme extra bien pressé","Farine, lait végétal, panko","Curry végane: oignon, carotte, pomme, poudre curry japonais, bouillon légumes","Riz vapeur, chou ciselé"],"s":["Presser le tofu 30 min minimum.","Paner: farine, lait végétal, panko.","Frire à 170°C 5 min par face.","Sauce curry: revenir légumes, ajouter curry et bouillon, mixer.","Trancher le tofu katsu, servir sur riz avec sauce et chou."]},{"n":"Chickpea Shawarma Libanais","d":"Pois chiches épicés shawarma rôtis, pita, toum, taboulé, pickles","i":["2 boîtes pois chiches égouttés","Épices shawarma: 7 épices, paprika, cumin, cannelle, curcuma, ail","Pita","Toum végane (émulsion ail-aquafaba)","Taboulé, pickles"],"s":["Mélanger pois chiches avec épices et huile.","Rôtir à 200°C 25-30 min jusqu'à croustillants.","Préparer le toum végane.","Chauffer les pitas.","Assembler: pita, toum, pois chiches, taboulé, pickles."]},{"n":"Mapo Tofu Végane","d":"Tofu soyeux dans sauce sichuan épicée-huile pimentée, sans viande, poivre sichuan","i":["400g tofu soyeux en cubes délicats","Doubanjiang (pâte de fèves pimentées)","Huile chili maison","2 c.s poivre de sichuan moulu","Ail, gingembre, sauce soja, sucre","Fécule pour épaissir","Oignons verts"],"s":["Chauffer huile, doubanjiang 2 min.","Ail, gingembre, sauce soja.","Mouiller avec bouillon de légumes.","Tofu délicatement, ne pas casser.","Fécule pour épaissir, huile de piment, poivre sichuan généreux. Oignons verts."]},{"n":"Banh Mi Végane Tofu Laqué","d":"Baguette croustillante, tofu laqué soja-gingembre, pickles do chua, herbes","i":["4 mini baguettes croustillantes","300g tofu ferme pressé laqué: soja, gingembre, ail, mirin, sirop d'érable","Pickles do chua (carottes-daikon)","Jalapeño, coriandre, menthe","Mayo végane à base cajou","Sauce hoisin"],"s":["Mariner et rôtir le tofu dans la laque 20 min au four 200°C.","Préparer les pickles.","Couper les baguettes, tartiner mayo d'un côté, sauce hoisin de l'autre.","Tofu laqué chaud.","Pickles, jalapeño, coriandre, menthe."]},{"n":"Dan Dan Mian Végane","d":"Nouilles sésame-chili végane avec champignons shiitake hachés croustillants","i":["300g nouilles chinoises","150g champignons shiitake hachés et sautés à sec","Sauce: tahini, soja, vinaigre noir, sucre","Huile chili maison","Cacahuètes, oignons verts"],"s":["Hacher les shiitake finement, sauter à sec jusqu'à croustillants.","Assaisonner de soja et sucre, poursuivre 2 min.","Préparer la sauce sésame.","Cuire les nouilles.","Dresser sauce dans bol, nouilles, shiitake, oignons verts, cacahuètes, huile chili généreuse."]}]},{"cat":"CUISINE DU PACIFIQUE ET OCÉANIE","emoji":"🌊","items":[{"n":"Hāngī Maori Nouvelle-Zélande","d":"Cuisson dans fosse avec pierres chaudes: agneau, poulet, légumes, pudding","i":["1kg agneau découpé","1 poulet découpé","Kumara (patate douce maorie)","Pommes de terre","Citrouille, chou","Sel, herbes aromatiques"],"s":["Chauffer des pierres au feu pendant 2h (ou simuler avec cocotte-minute 40 min).","Envelopper chaque type de viande et légumes séparément dans alu ou feuilles.","Poser sur les pierres chaudes dans la fosse.","Couvrir hermétiquement, cuire 3-4h.","La fumée et la vapeur de la terre imprègnent tout. Ouvrir et servir."]},{"n":"Poisson Cru Tahitien","d":"Thon cru mariné lait de coco-citron, concombre, tomates, oignons, citron vert","i":["400g thon rouge frais en dés de 2cm","Jus de 4 citrons verts (marinade 15 min)","200ml lait de coco","1/2 concombre en brunoise","2 tomates épépinées en dés","1 oignon rouge, coriandre","Sel"],"s":["Mariner le thon dans jus de citron vert 15 min.","Égoutter légèrement.","Incorporer lait de coco, concombre, tomates, oignon.","Saler, coriandre.","Servir très frais avec riz ou directement."]},{"n":"Lovo Fidji","d":"Cochon de lait et root vegetables cuits dans fosse — festif fidjien","i":["Cochon de lait de 5kg","Dalo (taro fidjien)","Kumala (patate douce)","Breadfruit (arbre à pain)","Feuilles de bananier","Pierres chauffées"],"s":["Préparer et assaisonner le cochon.","Chauffer les pierres en cailloux dans un feu.","Envelopper cochon et légumes dans feuilles de bananier.","Poser sur les pierres dans la fosse, couvrir.","Cuire 2-3h. Déterrer, découper. Peau croustillante, chair fondante."]},{"n":"Pavlova Australienne-Néo-Zélandaise","d":"Grande meringue moelleuse dedans croustillante dehors, crème fouettée, fruits de la passion","i":["4 blancs d'oeufs à température ambiante","220g sucre fin","2 c.c maïzena","1 c.c vinaigre blanc","1 c.c extrait de vanille","300ml crème fouettée","Fruits de la passion, kiwi, fraises"],"s":["Monter les blancs en neige ferme en ajoutant le sucre progressivement.","Incorporer maïzena, vinaigre, vanille délicatement.","Coucher en disque épais sur papier sulfurisé.","Cuire à 130°C 75 min. Éteindre le four, laisser refroidir dedans.","Crème fouettée, fruits de la passion juste avant de servir."]}]},{"cat":"SUPPLÉMENTS FINGER FOOD","emoji":"🍡","items":[{"n":"Croquettes de Jambon Serrano","d":"Béchamel jambon ibérique très épaisse refroidie, panée, frite fondante","i":["Béchamel épaisse: 60g beurre, 80g farine, 500ml lait","200g jambon serrano haché fin","Noix de muscade, sel, poivre blanc","Oeufs, chapelure fine","Huile"],"s":["Béchamel très épaisse avec jambon, cuire 15 min.","Étaler dans plat, réfrigérer 3h jusqu'à très ferme.","Former des cylindres de 5cm.","Paner: farine, oeuf, chapelure.","Frire à 175°C 3-4 min. L'intérieur doit être crémeux et fondant."]},{"n":"Spring Rolls Vietnamiens Frits","d":"Rouleaux nem farcis porc-vermicelles-champignons, frits croustillants, sauce nuoc cham","i":["Galettes de riz rondes","Farce: 200g porc haché, vermicelles, champignons noirs, carottes, oignons verts, oeuf, sel, poivre","Nuoc cham: sauce de poisson, citron, sucre, ail, piment","Laitue pour servir"],"s":["Tremper les galettes de riz 5 secondes dans eau.","Farcir et rouler serré.","Frire à 170°C 5-6 min — deux fois si possible.","Couper en biais, laitue pour enrouler.","Nuoc cham pour tremper."]},{"n":"Cheese Bites Cheddar Jalapeño","d":"Cubes de cheddar jalapeño panés et frits, sauce ranch, ciboulette","i":["300g cheddar fort en cubes de 2cm","2 jalapeños émincés finement incorporés dans le fromage (ou fromage jalapeño)","Farine, oeuf, panko","Sauce ranch: mayo, crème, ail, ciboulette, aneth","Ciboulette"],"s":["Congeler les cubes de fromage 30 min.","Paner rapidement: farine, oeuf, panko. Congeler encore 15 min.","Frire à 180°C 90 secondes seulement.","Servir immédiatement — le fromage est fondu dedans.","Ranch dressing et ciboulette."]},{"n":"Patatas Bravas Style Classique","d":"Pommes de terre frites deux fois, sauce brava, aioli crémeux","i":["600g pommes de terre","Huile pour friture","Sauce brava: 400g tomates, 1 c.s pimenton, cayenne, ail, vinaigre, huile","Aioli: mayo, ail, citron"],"s":["Cuire les pommes de terre en cubes à 130°C 8 min (cuire sans colorer).","Égoutter, refroidir 15 min.","Frire à 190°C jusqu'à dorées 3-4 min.","Sauce brava maison chauffée.","Napper les patatas, trait d'aioli."]},{"n":"Mozzarella Sticks Maison","d":"Bâtonnets mozzarella panés double chapelure, frits, marinara pour tremper","i":["400g mozzarella ferme en bâtonnets de 10cm","Farine, 2 oeufs battus, panko + parmesan","Sel, ail en poudre, origan dans le panko","Sauce marinara: tomates, ail, basilic"],"s":["Congeler les bâtonnets de mozzarella 1h.","Double panure: farine, oeuf, panko assaisonné, oeuf, panko.","Congeler encore 20 min.","Frire à 180°C 2-3 min.","Sauce marinara chaude pour tremper."]},{"n":"Tempura de Légumes Premium","d":"Légumes enrobés pâte ultra légère, frits à blanc, sauce ten tsuyu, daikon râpé","i":["Légumes: champignons, poivrons, courgettes, patate douce, asperges","Pâte tempura: 100g farine tempura, 150ml eau glacée avec glaçons","Huile de friture","Ten tsuyu: dashi, soja, mirin","Daikon râpé, gingembre"],"s":["Préparer la pâte au dernier moment: mélanger grossièrement farine et eau glacée.","Les grumeaux sont normaux et souhaitables.","Tremper les légumes, laisser l'excès s'écouler.","Frire à 180°C 2-3 min par pièce.","Ten tsuyu froid avec daikon râpé pour tremper."]},{"n":"Oeufs à la Scotch Egg Noirs","d":"Oeuf mollet enrobé de black pudding et chair à saucisse, pané, frit — version luxe","i":["4 oeufs","200g black pudding émietté","150g chair à saucisse","Moutarde anglaise, thym","Panko, oeufs battus, farine","Sauce: moutarde, mayo, miel"],"s":["Oeufs mollets 6 min, refroidir.","Mélanger black pudding et chair à saucisse, moutarde, thym.","Envelopper chaque oeuf dans le mélange.","Paner: farine, oeuf, panko.","Frire à 175°C 6-7 min. Couper: le jaune coule, le black pudding est fondant."]}]},{"cat":"FRITURE INTERNATIONALE FINALE","emoji":"🍳","items":[{"n":"Malasadas Hawaïennes","d":"Beignets ronds sans trou originaires du Portugal, sucre, crème pâtissière macadamia","i":["500g farine","7g levure","100g sucre","3 oeufs","100ml lait tiède","80g beurre mou","Zeste citron","Huile de friture","Sucre pour enrober","Crème pâtissière macadamia ou haupia (lait de coco)"],"s":["Pâte levée riche, pousser 1h.","Former des boules de 40g.","Pousser encore 30 min.","Frire à 170°C 4-5 min en tournant.","Rouler dans sucre. Fourrer de crème macadamia à la poche."]},{"n":"Sfincione Sicilien","d":"Pizza épaisse moelleuse, sauce tomate-oignons-anchois-fromage caciocavallo, chapelure","i":["Pâte: 500g farine, 10g levure, 350ml eau, 5 c.s huile olive, sel","Garniture: 3 oignons confits, 400g tomates, anchois, 100g caciocavallo ou provolone","Chapelure, huile d'olive généreuse"],"s":["Pâte levée huile d'olive 2h.","Étaler dans plat huilé, pousse 30 min.","Oignons confits, tomates, anchois, fromage.","Chapelure et huile d'olive en finition.","Cuire à 200°C 30 min. Plus épais et moelleux que la pizza."]},{"n":"Pastel de Forno Brésilien","d":"Chausson frit pâte très fine, farce coeur de palmier-fromage ou viande, pluie de citron","i":["Pâte: 500g farine, 1 oeuf, 200ml eau chaude, sel, 1 c.s vinaigre, 1 c.s cachaça","Farce: coeur de palmier et mozzarella, ou boeuf haché épicé","Huile de friture","Citron pour finition"],"s":["Pétrir la pâte, reposer 30 min.","Étaler très finement (2mm).","Couper en rectangles, farcir, plier et sceller.","Frire à 180°C 3-4 min — la pâte doit former des cloques et bulles.","Citron pressé immédiatement à la sortie."]},{"n":"Bofrot Beignets Ghana","d":"Beignets ronds légèrement sucrés, noix de coco, cardamome — street food Ghana matin","i":["300g farine","7g levure","60g sucre","1 oeuf","100ml eau tiède","60g noix de coco râpée","1 c.c cardamome","Huile de friture"],"s":["Mélanger farine, levure, sucre.","Incorporer oeuf, eau, noix de coco, cardamome.","Pâte collante, pousser 1h.","Frire par cuillerées à 170°C en faisant des boules avec deux cuillères.","4-5 min en tournant. Dorés et légers."]},{"n":"Dalgona Coffee Frothy Biscuit","d":"Café battu jusqu'à mousse crémeuse, sur glace et lait, biscuits croquants","i":["2 c.s café soluble","2 c.s sucre","2 c.s eau chaude","Lait froid","Glaçons","Biscuits speculoos ou amaretti"],"s":["Fouetter café, sucre, eau chaude au batteur 4-5 min jusqu'à mousse ferme et dorée.","Remplir verres de glaçons et lait froid.","Déposer la mousse de café sur le lait.","Biscuits speculoos à côté.","Mélanger avant de boire pour marier la mousse et le lait."]},{"n":"Zeppole di San Giuseppe","d":"Beignets gonflés napolitains de la Saint-Joseph, crème pâtissière, cerise amarena","i":["Pâte choux: 250ml eau, 100g beurre, 150g farine, 4 oeufs","Crème pâtissière: 500ml lait, 4 jaunes, 100g sucre, 40g maïzena, vanille","Cerises amarena en sirop","Sucre glace"],"s":["Préparer la pâte à choux.","Coucher en couronnes avec douille étoile sur papier sulfurisé.","Frire à 170°C en faisant glisser le papier dans l'huile.","Égoutter, refroidir.","Farcir de crème pâtissière, cerise amarena sur le dessus, sucre glace."]},{"n":"Bunuelos Colombiens","d":"Boules de fromage blanc et yuca frites gonflées légères, sirop de panela","i":["200g fromage blanc colombien ou queso fresco","100g fécule de tapioca","50g farine de maïs","1 oeuf, sel, sucre","Huile de friture","Sirop: panela (rapadura), eau, cannelle"],"s":["Mélanger fromage émietté, fécules, oeuf, sel, sucre.","Former des petites boules.","Frire à 170°C 5-6 min — elles doublent de volume et flottent.","Elles doivent être légères et creuses.","Sirop de panela-cannelle pour tremper."]}]},{"cat":"STREET CLASSICS COMPLÉMENTAIRES","emoji":"🍽️","items":[{"n":"Crêpe Complète Beurre Salé","d":"Galette sarrasin jambon-gruyère-oeuf, beurre breton coulant","i":["Pâte sarrasin: 250g farine sarrasin, 400ml eau, 1 oeuf, sel","Jambon blanc épais tranché","Gruyère râpé","Oeuf","Beurre demi-sel de qualité"],"s":["Pâte reposée 1h minimum.","Cuire galette à la crêpière beurrée.","Poser jambon et gruyère, laisser fondre.","Casser l'oeuf au centre.","Replier les bords, beurre demi-sel généreux sur les bords."]},{"n":"Döner Berlin Style","d":"Pain pita chaud, veau et volaille döner épicé, salade, sauce yogurt, harissa","i":["300g mélange veau et poulet haché avec épices türques","Pita ou pain plat","Laitue iceberg, tomates, oignons rouges","Sauce yaourt: yaourt, ail, citron","Harissa ou sauce pimentée","Chou blanc mariné"],"s":["Mélanger et griller la viande en galettes ou boulettes.","Chauffer le pain pita.","Sauce
