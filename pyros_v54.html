"2 oeufs","Farine","100g beurre clarifié pour frire","Citron, câpres, anchois, persil"],"s":["Aplatir les escalopes très finement entre deux feuilles de papier sulfurisé.","Passage classique farine, oeuf, chapelure sans presser pour garder légèreté.","Frire dans le beurre clarifié à 170°C en secouant la poêle.","Égoutter sur papier, saler immédiatement.","Servir avec rondelles de citron, câpres, et filets d'anchois."]},{"n":"Tonkatsu Japonais","d":"Porc pané panko épais, sauce tonkatsu maison, chou blanc ciselé","i":["4 côtelettes de porc","Panko japonais épais","Sauce tonkatsu: ketchup, sauce Worcestershire, sauce soja, moutarde, sucre","Chou blanc finement ciselé","Moutarde japonaise karashi"],"s":["Entailler les bords de la côtelette pour éviter qu'elle se rétracte.","Paner farine, oeuf, panko bien tassé.","Frire à 170°C 4 min par face.","Préparer la sauce tonkatsu en mélangeant et chauffant les ingrédients.","Découper en tranches, servir sur lit de chou blanc avec sauce et karashi."]}]},{"cat":"SANDWICHS & ROLLS ICONIQUES","emoji":"🥖","items":[{"n":"Lobster Roll Style St Jacks","d":"Homard atlantique mayo citronnée, bun beurré grillé, ciboulette, beurre noisette","i":["400g chair de homard cuite","4 c.s mayo de qualité","1 c.s jus de citron","Zeste de citron","Sel, poivre blanc","4 hot dog buns briochés","50g beurre pour griller","Ciboulette fraîche"],"s":["Mélanger délicatement homard, mayo, citron, zeste, sel, poivre.","Ne pas trop mélanger, garder les morceaux généreux.","Beurrer et griller les buns sur les deux côtés plats dans une poêle chaude.","Garnir généreusement les buns de la préparation homard.","Finir avec ciboulette ciselée et un filet de beurre noisette fondu."]},{"n":"Smash Burger Double Stack","d":"Boeuf haché écrasé sur plancha, cheddar fondu double, sauce secrète, pickles","i":["300g boeuf 80/20 en boules de 75g","4 tranches cheddar américain","Sauce: mayo, ketchup, moutarde, pickles hachés, oignon, vinaigre","4 buns briochés toastés","Laitue iceberg, tomate, oignons blancs"],"s":["Chauffer la plancha à feu maximum.","Poser la boule de boeuf et écraser immédiatement avec une spatule lourde.","Saler, poivrer. Cuire 2 min sans toucher pour créer la croûte Maillard.","Retourner une seule fois, poser le cheddar immédiatement.","Assembler double stack: pain, sauce, laitue, tomate, 2 patties avec cheddar, oignons, pain."]},{"n":"Philly Cheesesteak","d":"Fines tranches de boeuf ribeye, oignons caramélisés, Cheez Whiz, hoagie roll","i":["400g ribeye congelé 1h puis tranché très fin","2 oignons émincés","200g Cheez Whiz ou provolone fondu","4 hoagie rolls ou pains italiens","Sel, huile"],"s":["Caraméliser les oignons à feu doux 30 min avec une pincée de sel.","Cuire les tranches fines de boeuf à feu très vif sur plaque en fonte.","Hacher grossièrement pendant la cuisson pour texture traditionnelle.","Mélanger boeuf et oignons sur la plaque, former un monticule.","Poser les tranches de provolone pour faire fondre, ou napper de Cheez Whiz. Glisser dans le pain grillé."]},{"n":"Banh Mi Fusion","d":"Baguette vietnamienne croustillante, porc laqué, pâté de foie, pickles daikon-carotte","i":["4 mini baguettes vietnamiennes","200g porc laqué char siu","4 c.s pâté de foie","Pickles: julienne daikon et carotte, vinaigre de riz, sucre, sel","Piment jalapeño, coriandre fraîche, mayo, sauce soja sucrée"],"s":["Préparer les pickles 1h minimum: daikon, carotte, vinaigre riz, sucre, sel.","Chauffer le porc laqué à la poêle pour caraméliser.","Ouvrir la baguette, tartiner pâté d'un côté, mayo de l'autre.","Garnir de viande, pickles égouttés, piment, coriandre.","Fermer et manger immédiatement pour garder le croustillant."]},{"n":"Katsu Sando Japonais","d":"Pain de mie japonais Shokupan, tonkatsu coupé net, sauce tonkatsu, chou blanc","i":["2 épaisses tranches Shokupan","1 belle escalope de porc tonkatsu","3 c.s sauce tonkatsu","2 c.s mayo japonaise Kewpie","Chou blanc très finement ciselé"],"s":["Préparer le tonkatsu pané et frit.","Tartiner généreusement les deux tranches de Shokupan de mayo Kewpie.","Ajouter un peu de sauce tonkatsu sur une face.","Disposer le tonkatsu chaud, couvrir de chou blanc.","Fermer, appuyer fort, couper les croûtes, trancher en deux net avec un couteau bien aiguisé."]},{"n":"Po'Boy Shrimp Louisianais","d":"Baguette molle louisianaise, crevettes panées épicées, remoulade créole, laitue","i":["400g de crevettes moyennes","Marinade cajun: paprika, cayenne, ail, thym, origan","Panure: farine de maïs et farine blanche","Remoulade: mayo, moutarde créole, raifort, citron, tabasco, persil","Pain français mou, laitue, tomate"],"s":["Assaisonner les crevettes avec épices cajun.","Paner dans le mélange farine de maïs et farine blanche.","Frire 2-3 min à 180°C.","Préparer la remoulade créole en mélangeant tous les ingrédients.","Couper le pain, tartiner de remoulade, garnir de laitue, tomates, crevettes."]},{"n":"Mortadella Sandwich Frit","d":"Mortadelle épaisse poêlée croustillante, stracciatella, pistaches, ciabatta","i":["200g mortadelle en tranches épaisses de 1cm","100g stracciatella ou burrata effilochée","30g pistaches concassées","1 ciabatta","Huile d'olive, roquette, poivre noir"],"s":["Poêler les tranches épaisses de mortadelle à sec jusqu'à coloration.","Ouvrir la ciabatta, passer sous le grill.","Tartiner de stracciatella généreusement.","Poser les tranches de mortadelle chaudes.","Parsemer de pistaches, ajouter roquette, poivrer généreusement."]},{"n":"Monte Cristo Sandwich","d":"Jambon-fromage trempé dans appareil à pain perdu, frit, sucre glace et confiture framboise","i":["8 tranches pain de mie brioché","200g jambon blanc","150g gruyère tranché","Appareil: 2 oeufs, 100ml lait, sel","Sucre glace, confiture de framboise, beurre"],"s":["Assembler les sandwichs: pain, jambon, fromage, pain.","Tremper dans l'appareil oeuf-lait.","Dorer dans le beurre à feu moyen 3 min par côté.","Passer au four 5 min pour fondre le fromage.","Saupoudrer de sucre glace, servir avec confiture framboise."]},{"n":"Francesinha Portugaise","d":"Sandwich Porto épais: jambon, saucisse, steak, pain, nappé de sauce bière-tomate fondue","i":["4 tranches de pain de mie épaisses","100g jambon cuit","2 saucisses fraîches cuites et tranchées","1 steak fin","200g fromage à fondre","Sauce: 200ml bière, 200ml coulis tomate, bouillon, paprika, piri-piri, beurre"],"s":["Assembler sur une tranche: jambon, saucisse, steak, deuxième tranche.","Couvrir entièrement le sandwich de fromage râpé.","Passer au four 200°C jusqu'à fondu.","Préparer la sauce en réduisant bière, tomate, bouillon, épices. Monter au beurre hors feu.","Napper généreusement le sandwich de la sauce chaude dans une assiette creuse."]},{"n":"Choripan Argentin","d":"Chorizo grillé fente, chimichurri maison, pain croustillant","i":["4 chorizos argentins ou criollos","Chimichurri: persil, origan, ail, piment, vinaigre, huile, sel","4 petits pains croustillants"],"s":["Préparer le chimichurri la veille: persil haché fin, origan, ail, piment, vinaigre, huile, sel.","Inciser les chorizos en fente (mariposa) sans séparer.","Griller à feu vif 5-6 min en les ouvrant sur la grille.","Griller également le pain.","Glisser le chorizo dans le pain ouvert, napper de chimichurri."]},{"n":"Sabich Israélien","d":"Pita garnie aubergine frite, oeuf dur, houmous, amba, salade israélienne","i":["4 pitas","2 aubergines tranchées et frites dans l'huile","4 oeufs durs","200g houmous","Sauce amba (mangue épicée)","Salade: tomates, concombres, persil, citron","Tahini"],"s":["Frire les tranches d'aubergine dans l'huile d'olive jusqu'à dorées.","Ouvrir les pitas en poche.","Étaler houmous, puis aubergines, oeuf dur tranché.","Ajouter salade, sauce amba, tahini.","Finir avec zhug (sauce verte pimentée) si disponible."]},{"n":"Cemita Poblana Mexicaine","d":"Brioche sésame, milanesa de poulet, avocado, chipotles, quesillo, papalo","i":["4 cemitas ou pains briochés au sésame","4 escalopes de poulet panées","2 avocats","Chipotles en adobo","200g quesillo ou mozzarella effilochée","Oignons blancs émincés"],"s":["Paner et frire les escalopes de poulet.","Ouvrir les cemitas, tartiner de chipotles écrasés des deux côtés.","Superposer: escalope, avocat écrasé, quesillo effiloché, oignons.","Appuyer fort pour comprimer le sandwich — c'est la tradition.","Servir chaud, le fromage doit commencer à fondre."]},{"n":"Gatsby Sandwich Sud-Africain","d":"Pain ultra garni: frites, viande épicée, sauces diverses — le sandwich du Cap","i":["1 grand pain baguette mou de 60cm","400g viande hachée épicée ou calamars frits","300g frites maison","Sauce piri-piri, mayo, ketchup","Laitue, tomates"],"s":["Préparer les frites et la viande épicée.","Ouvrir le pain en longueur, tartiner de toutes les sauces.","Garnir avec laitue, tomates, viande, frites chaudes directement.","Refermer et couper en portions — se mange à plusieurs traditionnellement.","Servir avec sauces supplémentaires à côté."]},{"n":"Torta de Birria Mexicaine","d":"Birria de boeuf effiloché dans telera, consommé pour tremper, fromage Oaxacan","i":["Birria: 1kg joue de boeuf, guajillo, ancho, chipotle, épices, bouillon","4 teleras ou bolillos","200g fromage Oaxacan ou mozzarella","Oignons blancs, coriandre, citron vert"],"s":["Mijoter la birria 3-4h avec piments réhydratés et épices jusqu'à effilochage.","Réserver le consommé.","Tremper le pain dans le gras de surface du consommé, griller côté trempe.","Garnir: viande effilochée, fromage, refermer, griller à la plancha.","Servir avec bol de consommé chaud pour tremper le sandwich."]},{"n":"Katsu Sando Thon Rouge","d":"Thon rouge pané façon tonkatsu, coeur cru-rosé, mayo wasabi Kewpie, shiso","i":["2 tranches épaisses thon rouge de 3cm","Panure: farine, oeuf, panko","Mayo wasabi: mayo Kewpie, wasabi","Shiso frais","Pain Shokupan"],"s":["Paner les tranches de thon rouge.","Frire 2 min à 180°C: juste la croûte, coeur cru.","Laisser reposer 2 min, trancher.","Tartiner le pain de mayo wasabi.","Assembler avec shiso, trancher net, servir rosé dedans."]}]},{"cat":"BAOS & STEAMED BUNS","emoji":"🥟","items":[{"n":"Gua Bao Porc Effiloché","d":"Pâte vapeur nuage, porc effiloché braisé soja-étoile d'anis, pickles, cacahuètes","i":["Pâte bao: 300g farine, 150ml eau tiède, 5g levure, 1 c.s sucre, 1 c.s huile, 1 c.c levure chimique","Porc effiloché: 1kg épaule de porc, 3 c.s sauce soja, 2 c.s hoisin, 3 étoiles d'anis, 1 c.s sucre roux, 1 c.s gingembre","Pickles de cornichons ou kimchi","Cacahuètes concassées, coriandre"],"s":["Pâte: mélanger farine, levure, sucre, eau, huile, pétrir 10 min, laisser pousser 1h.","Braiser le porc: saisir, mouiller avec soja, hoisin, eau, épices, mijoter 3h à couvert.","Effilocher, réduire le jus pour glacer.","Former les bao: boulettes de 40g, aplatir en ovale, plier sur papier sulfurisé.","Cuire vapeur 12 min. Garnir: porc glacé, pickles, coriandre, cacahuètes."]},{"n":"Bao Homard Beurre Noisette","d":"Bao vapeur, médaillon de homard beurre noisette-estragon, caviar de citron","i":["Pâte bao maison","300g chair de homard","80g beurre","Estragon frais","Citron caviar ou zeste de citron","Fleur de sel"],"s":["Cuire le beurre jusqu'au stade noisette, laisser refroidir légèrement.","Poêler les médaillons de homard 1 min par face dans le beurre noisette.","Cuire les bao vapeur 12 min.","Garnir: homard, quelques feuilles d'estragon, perles de citron caviar.","Finir avec fleur de sel et un trait de beurre noisette."]},{"n":"Bao Wagyu Miso","d":"Tranche de wagyu snackée, glaze miso-mirin, beurre ponzu, micro-pousses","i":["200g wagyu tranché épais","Glaze: 2 c.s miso rouge, 2 c.s mirin, 1 c.s sake","Beurre ponzu: 80g beurre, 1 c.s sauce ponzu","Micro-pousses ou shiso","Bao maison"],"s":["Préparer la glaze en chauffant miso, mirin, sake.","Saisir le wagyu 1 min par face à feu très vif.","Badigeonner de glaze, passer 30 secondes sous grill.","Monter le beurre ponzu froid.","Garnir le bao: viande, beurre ponzu, micro-pousses."]},{"n":"Bao Kimchi Pork Belly","d":"Poitrine de porc confite, kimchi sauté, mayo sriracha, oignons verts","i":["400g poitrine de porc","Saumure: sel, sucre, ail, gingembre, soja","150g kimchi","Mayo sriracha: mayo, sriracha, citron","Oignons verts, sésame"],"s":["Saumurer la poitrine 24h, cuire à 150°C pendant 2h.","Trancher, poêler jusqu'à caramélisation.","Sauter le kimchi haché dans un peu de gras.","Préparer mayo sriracha.","Garnir: poitrine, kimchi sauté, mayo, oignons verts, sésame."]},{"n":"Bao Crevette Tempura","d":"Tempura ultra légère, sauce chili doux thaï, salade de papaye verte","i":["12 grosses crevettes","Pâte tempura: 100g farine tempura, 150ml eau glacée, glaçons","Sauce chili doux","Papaye verte râpée, citron vert, coriandre, piment","Bao maison"],"s":["Préparer la pâte tempura: mélanger grossièrement farine et eau glacée (grumeaux = bien).","Tremper les crevettes, frire à 180°C 2-3 min.","Préparer la salade de papaye avec citron, coriandre, piment.","Garnir le bao ouvert: tempura, salade papaye, sauce chili.","Servir immédiatement."]},{"n":"Liu Sha Bao Coeur Coulant","d":"Bao vapeur fourré au coeur coulant jaune d'oeuf salé-beurré, fondant chaud","i":["Pâte bao","Farce: 4 jaunes d'oeufs salés, 80g beurre, 60g sucre glace, 40g lait en poudre, 20g fécule"],"s":["Mixer les jaunes, beurre fondu, sucre, lait en poudre, fécule.","Congeler en petites boules 2h.","Garnir les bao avec une boule de farce congelée.","Cuire vapeur 8 min exactement — pas plus.","Servir immédiatement: le coeur coule à 75°C, avertir les convives."]},{"n":"Char Siu Bao Cantonais","d":"Classique dim sum: pâte moelleuse vapeur, porc char siu sucré-laqué","i":["Porc char siu: 500g filet de porc, 2 c.s hoisin, 2 c.s soja, 2 c.s miel, 1 c.s huile sésame","Pâte baozi: farine, levure, lait, sucre, huile","Oignons verts"],"s":["Mariner le porc 4h dans hoisin, soja, miel, sésame.","Rôtir à 200°C 20-25 min en badigeonnant régulièrement de marinade.","Couper en petits dés.","Préparer la pâte baozi, laisser pousser 1h.","Farcir les bao avec le char siu, fermer en plissant, cuire vapeur 15 min."]},{"n":"Bao Gyoza Frit-Vapeur","d":"Hybride bao-gyoza: pliage gyoza, mi-frit mi-vapeur, sauce ponzu","i":["Pâte bao","Farce: porc haché, chou napa, gingembre, soja, sésame, oignons verts","Sauce ponzu: soja, jus yuzu ou citron, mirin, dashi","Huile pour frire le fond"],"s":["Mélanger la farce, laisser reposer 30 min.","Former des demis-lunes en plissant comme des gyoza.","Chauffer huile dans poêle, dorer le fond 2 min.","Ajouter 100ml d'eau, couvrir, cuire vapeur 6 min.","Retirer couvercle, croustiller le fond 1 min. Servir avec sauce ponzu."]},{"n":"Mantou Bao Frit Lait Condensé","d":"Bao frit croustillant dehors, moelleux dedans, trempé dans lait concentré sucré","i":["Pâte bao classique","Huile de friture","Lait concentré sucré en pot","Beurre demi-sel fondu en option"],"s":["Former des petits rectangles de pâte bao.","Laisser pousser 30 min.","Frire à 170°C jusqu'à gonflés et dorés.","Servir avec pot de lait concentré pour tremper.","Variation: beurre fondu, sucre glace, cannelle."]},{"n":"Bao Pulled Mushroom Vegan","d":"Champignons king oyster effilochés comme du pulled pork, BBQ fumé, slaw vert","i":["400g champignons king oyster ou pleurotes","Sauce BBQ fumée: ketchup, sirop d'érable, vinaigre cidre, paprika fumé, ail","Slaw: chou vert, mayo végane, vinaigre, sucre","Bao vapeur"],"s":["Effilocher les champignons avec les mains en fines lanières.","Rôtir à 200°C 15 min jusqu'à séchage partiel.","Enrober de sauce BBQ, rôtir 5 min supplémentaires.","Préparer le slaw vert.","Garnir le bao: champignons BBQ, slaw, oignons rouges marinés."]}]},{"cat":"FRITES & SNACKS FRITS ATYPIQUES","emoji":"🍟","items":[{"n":"Frites de Pain Perdu","d":"Bâtonnets de brioche trempés appareil crème, frits croustillants, sucre cannelle, caramel salé","i":["1 brioche rassise coupée en bâtonnets de 2x2cm","Appareil: 3 oeufs, 200ml crème, 2 c.s sucre, 1 c.c cannelle, vanille","Panko pour croustillant en option","Sucre et cannelle pour saupoudrer","Sauce caramel salé: 150g sucre, 100ml crème, 50g beurre demi-sel"],"s":["Tremper les bâtonnets de brioche dans l'appareil crème 30 secondes.","Passer en option dans le panko.","Frire à 175°C 3-4 min jusqu'à beau doré.","Égoutter, saupoudrer immédiatement de sucre-cannelle.","Caramel: sucre à sec jusqu'à ambré, décuire avec crème chaude, monter au beurre salé."]},{"n":"Frites de Polenta Grillée","d":"Polenta refroidie découpée en frites, grillée croustillante, parmesan, romarin, aioli","i":["300g polenta cuite épaisse avec parmesan et beurre","Huile d'olive","Romarin frais","Parmesan râpé","Aioli: mayo, ail écrasé, citron"],"s":["Cuire la polenta épaisse, incorporer parmesan et beurre.","Verser sur plaque, réfrigérer 2h jusqu'à solidification.","Découper en bâtonnets type frites.","Frire à 180°C 4-5 min ou griller au four 200°C.","Finir avec parmesan râpé et romarin frais. Servir avec aioli."]},{"n":"Frites de Halloumi","d":"Halloumi en bâtonnets dorés croustillants, menthe fraîche, miel de thym, citron","i":["400g halloumi","Farine et paprika pour enrober","Huile","Miel de thym","Menthe fraîche","Citron"],"s":["Couper le halloumi en bâtonnets épais.","Enrober légèrement de farine et paprika.","Frire à 180°C 3-4 min ou poêler à l'huile.","Égoutter sur papier.","Servir immédiatement avec miel de thym, menthe déchirée, zeste de citron."]},{"n":"Frites de Yuca Croustillantes","d":"Racine de manioc bouillie puis frite, ultra croustillant, sauce verte chimichurri","i":["600g manioc frais ou surgelé","Sel","Huile de friture","Chimichurri: persil, origan, ail, piment, vinaigre, huile, sel"],"s":["Éplucher et couper le manioc en bâtonnets.","Cuire à l'eau salée 20 min jusqu'à tendre mais pas défait.","Égoutter, sécher, réfrigérer 30 min.","Frire à 190°C 4-5 min jusqu'à croustillant et doré.","Saler immédiatement, servir avec chimichurri."]},{"n":"Takoyaki Japonais","d":"Boulettes octopode dans pâte dashi, mayo japonaise, bonite séchée, sauce okonomiyaki","i":["Pâte: 200g farine, 2 oeufs, 600ml dashi, sel","200g poulpe cuit en dés","Sauce okonomiyaki","Mayo Kewpie","Bonite séchée katsuobushi","Algue ao nori","Moule spécial takoyaki"],"s":["Préparer la pâte dashi: mélanger farine, oeufs, dashi.","Graisser les moules takoyaki, verser la pâte à ras.","Déposer un dé de poulpe dans chaque cavité.","Tourner à 90° toutes les 2 min jusqu'à sphère dorée.","Napper sauce okonomiyaki, mayo Kewpie, katsuobushi, ao nori."]},{"n":"Arancini Siciliens Safran","d":"Boules de risotto safran-petits pois-jambon frites croustillantes, sauce puttanesca","i":["400g risotto refroidi avec safran, petits pois, jambon, parmesan","200g mozzarella en petits dés pour le coeur","Chapelure et oeufs","Sauce puttanesca: tomates, olives, câpres, anchois, piment"],"s":["Former des boules de risotto avec un dé de mozzarella au centre.","Passer en oeuf puis chapelure.","Frire à 175°C 5-6 min jusqu'à dorure profonde.","Préparer sauce puttanesca: tomates, olives, câpres, anchois.","Servir les arancini avec sauce puttanesca chaude."]},{"n":"Coxinhas Brésiliennes","d":"Croquettes poulet effiloché et fromage à pâte de manioc, frits, forme cuisse de poulet","i":["Pâte: 500ml bouillon poulet, 250g farine de blé, 250g farine de manioc","Farce: 300g poulet effiloché, cream cheese, olives, persil","Chapelure et oeufs","Huile"],"s":["Cuire la pâte: faire bouillir le bouillon, ajouter les farines en mélangeant jusqu'à pâte non-collante.","Laisser refroidir.","Mélanger la farce: poulet, cream cheese, olives, persil.","Former des cônes, farcir, sceller.","Passer en oeuf, chapelure et frire à 175°C 5-6 min."]},{"n":"Pakoras Épinards-Oignon","d":"Beignets légers farine pois chiche, épinards frais, gingembre-piment, chutney vert","i":["200g farine de pois chiche","150g épinards frais émincés","1 oignon ciselé","1 c.c gingembre râpé","1 piment vert haché","1 c.c cumin, 1 c.c garam masala","Eau froide, huile de friture"],"s":["Mélanger besan, épices, gingembre, piment.","Ajouter eau froide jusqu'à pâte épaisse qui tient.","Incorporer épinards et oignon.","Laisser reposer 15 min.","Frire par cuillerées à 175°C 4 min. Servir avec chutney menthe-coriandre."]},{"n":"Accras de Morue Antillais","d":"Beignets soufflés morue dessalée, piment végétarien, cives, citron vert","i":["300g morue dessalée émiettée","200g farine","1 oeuf","200ml eau pétillante","2 cives","1 piment végétarien","Thym, ail, citron vert"],"s":["Dessaler la morue 24h en changeant l'eau 3 fois.","Émietter finement.","Mélanger farine, oeuf, eau pétillante, ail, thym.","Incorporer morue, cives, piment haché.","Frire par cuillerées à 180°C 3 min, dorés et gonflés. Servir avec citron vert et mayo pimentée."]},{"n":"Frites de Potimarron Épicées","d":"Quartiers de potimarron rôtis croustillants, épices moyen-orientales, yaourt za'atar","i":["1 potimarron","Épices: cumin, coriandre, paprika fumé, sumac","Huile olive","Yaourt: yaourt grec, za'atar, huile olive, sel","Grenade, menthe"],"s":["Couper en quartiers avec peau (comestible sur le potimarron).","Enrober d'huile et mélange épices.","Rôtir à 200°C 25 min, retourner à mi-cuisson.","Préparer le yaourt za'atar.","Servir avec yaourt, graines de grenade, menthe fraîche."]},{"n":"Corn Ribs de Maïs Viral","d":"Quartiers de maïs cuits au four jusqu'à se courber, beurre chipotle, lime","i":["4 épis de maïs","Beurre chipotle: 80g beurre, 2 chipotles mixés, sel, ail, citron vert","Coriandre, cotija ou feta, tajín"],"s":["Couper les épis en 4 dans la longueur.","Enrober de beurre chipotle.","Four à 220°C 20-25 min — les quartiers vont se courber naturellement.","Ou friture 180°C 4 min pour version plus croustillante.","Resaucer avec beurre chipotle, cotija, tajín, coriandre."]},{"n":"Elotes Frites Mexicains","d":"Épis de maïs frits entiers, mayo chili, cotija, tajín, citron vert","i":["4 épis de maïs","Farine de maïs pour enrober","Huile","Mayo: mayo, jus citron vert, poudre de chili","Fromage cotija émietté ou feta","Tajín ou chili-citron, coriandre"],"s":["Cuire les épis à l'eau bouillante 5 min.","Sécher, enrober légèrement de farine de maïs.","Frire entiers à 180°C 3-4 min en tournant.","Badigeonner de mayo-chili au pinceau.","Parsemer de cotija, tajín, coriandre. Servir avec quartier de citron vert."]}]},{"cat":"TACOS & WRAPS DU MONDE","emoji":"🌮","items":[{"n":"Tacos al Pastor","d":"Porc mariné achiote-ananas, taco al vapor, oignons blancs, coriandre, salsa verde","i":["800g épaule de porc en fines tranches","Marinade: 3 c.s achiote, 2 chipotles, 1 c.s vinaigre, ail, origan, cumin","1 ananas tranché","Tortillas maïs petites","Oignons blancs, coriandre","Salsa verde: tomatillos, jalapeño, ail, coriandre"],"s":["Mariner le porc 4h minimum avec la marinade achiote.","Empiler sur broche verticale en alternant viande et ananas.","Rôtir en tournant, ou simuler au four 200°C suivi d'une poêle à feu vif.","Découper les fines tranches directement dans les tortillas chauffées.","Garnir: oignons, coriandre, cube d'ananas, salsa verde."]},{"n":"Quesabirria Tacos","d":"Tortillas trempées dans le gras de birria, grillées avec fromage, birria effilochée","i":["Birria: 1kg joue de boeuf, guajillo, ancho, chipotle, épices, bouillon","Tortillas maïs","200g fromage Oaxacan ou mozzarella","Consommé de birria chaud, oignons, coriandre, citron vert"],"s":["Mijoter la birria 3-4h avec piments réhydratés jusqu'à effilochage.","Réserver le consommé.","Tremper les tortillas dans le gras de surface de la birria.","Poser sur plancha chaude, garnir de viande effilochée et fromage, plier.","Griller jusqu'à croustillant. Servir avec consommé chaud."]},{"n":"Roti Canai Roll Malaisien","d":"Flatbread feuilleté malaisien garni curry daal, chutney cocotier, piment","i":["Pâte roti canai: farine, ghee, eau, oeuf, sel","Daal curry: lentilles corail, lait coco, curry, oignon, tomate","Chutney coco: coco râpé, coriandre, piment vert, gingembre, jus citron","Oignons frits"],"s":["Pâte roti: mélanger avec beaucoup de ghee, diviser en boules, laisser reposer 1h.","Étirer finement sur plan huilé, cuire sur plaque chaude avec ghee.","Préparer le daal curry jusqu'à épais.","Préparer le chutney coco.","Garnir le roti et rouler, ou servir à côté pour tremper."]},{"n":"Wrap Dürüm Turc","d":"Flatbread fin turc, döner kebab agneau, cacık (tzatziki turc), sumac","i":["Yufka (galette turque fine)","Döner agneau: 500g agneau haché, 1 oignon mixé, ail, origan, paprika, piment","Cacık: yaourt, concombre, ail, menthe, aneth","Sumac, tomates, salade"],"s":["Mélanger agneau et aromates, former en fines galettes, griller à la plancha.","Découper en lamelles comme un döner.","Chauffer la yufka sur la plancha.","Étaler cacık, poser la viande, salade, tomates, sumac.","Rouler serré, couper en deux en biais."]},{"n":"Chapati Roll Indien","d":"Pain chapati frais, poulet tikka, chutney menthe, oignons, citron","i":["Pâte chapati: farine complète, eau, sel","Poulet tikka: cubes de poulet, yaourt, tandoori masala","Chutney menthe: menthe, coriandre, gingembre, piment vert, jus citron","Oignons rouges, citron, chaat masala"],"s":["Mariner le poulet dans yaourt et masala au moins 2h.","Griller au four à 220°C ou plancha.","Pétrir le chapati, former des disques fins, cuire à sec 1-2 min par face.","Préparer le chutney menthe en mixant tous les ingrédients.","Rouler: chapati, chutney, poulet, oignons, chaat masala."]},{"n":"Tostadas de Ceviche","d":"Galette maïs frite, ceviche bar-coriandre-citron vert, crème avocat, chipotle","i":["4 tortillas maïs frites à plat","300g bar frais en dés","Jus de 4 citrons verts (cuisson à froid 30 min)","1 oignon rouge, coriandre, piment jalapeño","Crème avocat: avocats, citron, sel","Crème acidulée, chipotle"],"s":["Mariner le bar dans citron vert 30 min jusqu'à blanchiment.","Ajouter oignon rouge, coriandre, jalapeño, sel.","Préparer la crème avocat lisse.","Étaler la crème sur la tostada.","Dresser le ceviche avec quelques gouttes de crème acidulée et chipotle."]},{"n":"Murtabak Singapourien","d":"Crêpe moelleuse farcie viande hachée épicée, oeuf, oignons, sauce curry","i":["Pâte: farine, eau, sel, huile","Farce: viande hachée, oignon, oeuf, cumin, fenouil, piment","Ghee pour cuire","Sauce curry trempette","Oignons rouges marinés vinaigre"],"s":["Préparer pâte fine, diviser en boules, laisser reposer 30 min.","Faire revenir la farce épicée, laisser refroidir.","Étirer la pâte très finement sur plan huilé.","Poser la farce au centre, ajouter un oeuf cru, rabattre les bords.","Cuire dans le ghee, 3 min par côté jusqu'à croustillant. Couper en carrés, servir avec sauce curry."]},{"n":"Injera Roll Éthiopien","d":"Pain injera fermenté, tibs de boeuf épicé berbéré, ayib (fromage frais), mitmita","i":["Injera (achetée ou faite maison: farine teff fermentée)","Tibs: 400g boeuf en dés, oignon, berbéré, beurre niter kibbeh","Ayib (fromage frais éthiopien)","Mitmita (poudre pimentée), coriandre"],"s":["Faire revenir le boeuf dans beurre épicé niter kibbeh.","Ajouter oignons et berbéré, cuire 10 min.","Étaler la garniture sur l'injera.","Ajouter cuillerées d'ayib, parsemer de mitmita.","Rouler ou servir à plat, manger avec les mains."]},{"n":"Tacos Carne Asada","d":"Bavette marinée citron vert-cumin-ail, grillée vive, tortilla maïs, guac","i":["600g bavette de flanchet","Marinade: jus 3 citrons verts, jus 1 orange, ail, cumin, origan, coriandre, piment ancho","Tortillas maïs","Guacamole: avocats, citron, oignon, coriandre, piment, sel","Oignons blancs, coriandre, salsa"],"s":["Mariner la bavette 2-4h.","Griller sur braise très vive 3-4 min par face.","Laisser reposer, trancher finement contre le fil en diagonale.","Chauffer les tortillas sur la braise.","Assembler avec guac, oignons, coriandre, salsa."]},{"n":"Pupusas Salvadoriennes","d":"Galettes masa épaisses farcies fromage-chicharrón, curtido (chou fermenté), salsa roja","i":["2 tasses masa harina, eau, sel","Farce: 150g fromage frais fondant, 100g chicharrón mixé ou porc haché revenu","Curtido: chou, carotte, oignon, vinaigre, origan, piment (fermenter 2h)","Salsa roja: tomates, ail, piment blendés"],"s":["Préparer le curtido 2h avant.","Pétrir la masa, former des boules.","Aplatir en disque, farcir au centre, refermer, aplatir à nouveau.","Cuire sur comal à sec 4-5 min par face.","Servir avec curtido et salsa roja."]}]},{"cat":"SEAFOOD STREET","emoji":"🦞","items":[{"n":"Fish Tacos Baja California","d":"Poisson frit en tempura légère, chou croquant, crema chipotle, salsa mango","i":["400g cabillaud ou tilapia","Pâte tempura bière: farine, bière blonde, sel, cumin","Chou blanc ciselé avec crème et citron vert","Crema chipotle: crème fraîche, chipotle, citron","Salsa mango: mangue, oignon rouge, piment, coriandre, citron vert","Tortillas maïs bleues si possible"],"s":["Préparer la pâte tempura bière en mélangeant grossièrement.","Tremper les filets de poisson, frire 3-4 min à 180°C.","Mélanger le chou avec crème, citron vert, sel.","Préparer la salsa mango fraîche.","Assembler: tortilla, chou, poisson, crema, salsa mango."]},{"n":"Gambas al Ajillo Street Style","d":"Crevettes à l'ail et piment, huile olive, pain grillé pour sauce","i":["400g gambas crues","8 gousses ail émincées finement","2 piments secs guindilla","150ml huile olive extra vierge","Persil plat","Pain crouton pour servir"],"s":["Chauffer l'huile à feu doux, infuser l'ail et piment 5 min sans colorer.","Monter à feu vif, ajouter les gambas.","Cuire 1-2 min seulement, elles doivent rester juteuses.","Finir avec persil haché.","Servir dans la casserole en terre cuite brûlante avec pain grillé."]},{"n":"Crab Cake Baltimore","d":"Galette crabe bleu peu de liant, Old Bay, mayo rémoulade moutarde","i":["400g chair de crabe bleu","2 c.s mayo","1 oeuf","1 c.s moutarde Dijon","1 c.s Old Bay seasoning","Chapelure panko minimum","Rémoulade: mayo, moutarde, câpres, cornichons, citron, persil"],"s":["Mélanger très délicatement le crabe avec mayo, oeuf, moutarde, Old Bay.","Ajouter juste assez de panko pour tenir.","Former des galettes, réfrigérer 1h.","Poêler dans beurre et huile 3 min par face, ou frire 4 min.","Servir avec rémoulade et salade."]},{"n":"Okonomiyaki Osaka Style","d":"Galette de chou japonaise, poulpe ou crevettes, 3 sauces, katsuobushi dansant","i":["200g farine, dashi, 2 oeufs","300g chou blanc ciselé fin","100g crevettes ou poulpe","Tenkasu (miettes de tempura), beni shoga (gingembre rose)","Sauce okonomiyaki, mayo Kewpie, ao nori, katsuobushi"],"s":["Mélanger pâte dashi avec chou, crevettes, tenkasu, beni shoga.","Cuire en galette épaisse à feu moyen 5 min côté 1.","Retourner délicatement, cuire 5 min côté 2.","Napper sauce okonomiyaki en zigzag.","Mayo Kewpie en zigzag, ao nori, katsuobushi qui danse avec la chaleur."]},{"n":"Clam Chowder en Bol de Pain","d":"Soupe crémeuse palourdes et bacon et pommes de terre, servie dans pain sourdough évidé","i":["400g palourdes en boîte avec leur jus","100g bacon","2 oignons, 3 pommes de terre en dés","500ml crème entière, 200ml lait","Farine et beurre pour roux","4 boules de pain sourdough individuelles"],"s":["Faire revenir bacon, ajouter oignons et pommes de terre.","Faire un roux avec farine et beurre.","Mouiller avec jus de palourdes, crème, lait.","Mijoter 15 min, ajouter palourdes 5 min avant la fin.","Évider les pains sourdough, verser la chowder chaude dedans."]},{"n":"Ceviche de Saint-Jacques","d":"Noix de Saint-Jacques marinées citron vert, concombre, jalapeño, lait de coco léger","i":["300g noix de Saint-Jacques fraîches en tranches","Jus 4 citrons verts","1/2 concombre en brunoise","1 jalapeño","1 c.s lait de coco","Coriandre, aneth, sel","Chips de maïs noir"],"s":["Trancher les Saint-Jacques à 3mm.","Mariner dans jus de citron vert 8-10 min.","Égoutter légèrement.","Incorporer concombre, jalapeño, coriandre.","Lait de coco léger, aneth. Ajuster sel et citron. Chips de maïs noir pour le croquant."]},{"n":"Lobster Bisque Shooters","d":"Bisque homard concentrée servie en shot chaud, crème, ciboulette, paprika fumé","i":["Carcasses de 2 homards","1 oignon, 2 carottes, 2 branches céleri","100ml cognac","400ml crème entière","200g chair de homard","Paprika fumé, ciboulette, beurre"],"s":["Faire revenir les carcasses à feu vif avec légumes.","Flamber au cognac.","Couvrir d'eau, mijoter 45 min.","Filtrer, réduire de moitié. Ajouter crème, réduire encore.","Mixer, filtrer à nouveau. Servir en shooters avec chair de homard, ciboulette, paprika fumé."]},{"n":"Camarones a la Diabla","d":"Crevettes dans sauce très pimentée chile de arbol-tomate, riz blanc","i":["400g crevettes","10 chiles de arbol","4 tomates","4 gousses ail","1/2 oignon","Beurre, huile, sel, cumin","Riz blanc, citron vert"],"s":["Griller chiles de arbol à sec 30 secondes.","Mixer avec tomates grillées, ail, oignon jusqu'à sauce lisse.","Cuire la sauce dans beurre et huile 10 min.","Saisir les crevettes séparément 2 min.","Incorporer à la sauce, cuire 2 min de plus. Servir sur riz blanc avec citron vert."]},{"n":"Crab Rangoon Frits","d":"Wonton farcis cream cheese-crabe, frits croustillants, sauce aigre-douce","i":["16 feuilles de wonton","150g chair de crabe","150g cream cheese","2 oignons verts","1 c.c sauce soja, 1 c.c sauce Worcestershire","Sauce aigre-douce: vinaigre, sucre, ketchup, amidon"],"s":["Mélanger crabe, cream cheese, oignons verts, sauces.","Déposer une cuillerée au centre de chaque wonton.","Replier en triangle ou en bourse, sceller avec eau.","Frire à 180°C 3-4 min.","Sauce aigre-douce chaude pour tremper."]},{"n":"Pla Tod Kra Tiam (Poisson Frit à l'Ail Thaï)","d":"Poisson entier frit ail-coriandre, sauce thaï pimentée, mangue verte","i":["1 bar entier ou 2 maquereaux","Ail haché, racine coriandre, poivre blanc","Sauce poisson, sucre de palme, piment, citron vert","Mangue verte râpée","Huile abondante"],"s":["Inciser le poisson en diagonale.","Frire entier à 180°C dans huile profonde 8-10 min.","Faire revenir ail et racine coriandre dans huile chaude, napper le poisson.","Préparer sauce: sauce de poisson, sucre, piment, citron vert.","Servir avec salade mangue verte et sauce."]}]},{"cat":"VIANDE GRILLÉE / BBQ / SMASH","emoji":"🥩","items":[{"n":"Korean BBQ Galbi Short Ribs","d":"Côtes de boeuf marinées soja-poire-sésame, grillées vives, wrap laitue ssam","i":["800g short ribs de boeuf tranchés fins (flanken cut)","Marinade: 100ml soja, 1 poire asiatique mixée, 4 gousses ail, 1 c.s gingembre, 2 c.s sucre, 2 c.s huile sésame, poivre","Feuilles de laitue et perilla","Pâte de soja doenjang, riz, kimchi"],"s":["Mariner les côtes 4h minimum, idéalement une nuit.","Griller sur braise vive ou plancha très chaude, 2 min par face.","Couper en bouchées avec ciseaux à table (tradition coréenne).","Envelopper dans feuille de laitue avec riz, doenjang, kimchi.","Manger en une bouchée."]},{"n":"Picanha Brésil Churrasco","d":"Pointe de rumsteck avec chapeau de gras, gros sel, braise vive, farofa","i":["1kg picanha avec chapeau de gras","Gros sel marin","Farofa: farine de manioc, beurre, oignon, bacon, persil","Vinaigrette brésilienne: tomate, oignon, persil, vinaigre, huile"],"s":["Inciser la graisse en croisillons sans toucher la viande.","Saupoudrer de gros sel généreusement.","Griller côté gras en premier 5 min, puis retourner.","Cuire à point 5-7 min, reposer 5 min.","Trancher contre le fil, servir avec farofa et vinaigrette brésilienne."]},{"n":"Brisket Texas Style au Chêne","d":"Poitrine de boeuf entière fumée bois de chêne, croûte poivre-sel, tranches épaisses","i":["3kg plat de côte entier (brisket) avec gras","Rub: sel kasher et poivre noir grossier seulement (style Texas pur)","Bois de chêne (oak)"],"s":["Rub minimaliste: sel et poivre grossier seulement.","Fumoir 110-120°C avec chêne, 12-16h.","La stall (plateau à 73°C): laisser dépasser sans envelopper.","Température finale: 96-98°C interne.","Reposer dans serviette et glacière 2h minimum. Trancher contre le fil à 1cm d'épaisseur."]},{"n":"Yakiniku Wagyu Binchotan","d":"Fines tranches wagyu snackées sur braise de binchotan, sauce tare, riz","i":["300g wagyu tranché fin","Sauce tare: 100ml soja, 50ml mirin, 50ml saké, 1 c.s sucre, ail, sésame","Ail émincé, oignons verts","Riz japonais vapeur"],"s":["Préparer la sauce tare en chauffant tous les ingrédients 5 min.","Griller les tranches de wagyu 30 secondes par face seulement.","Tremper dans la sauce tare ou badigeonner.","Servir avec bol de riz et ail grillé.","L'expérience: griller soi-même à table."]},{"n":"Anticuchos de Corazon Péruviens","d":"Coeur de boeuf mariné ají panca, grillé en brochette, sauce huancaína","i":["500g coeur de boeuf nettoyé","Marinade: ají panca, ají amarillo, cumin, vinaigre, ail, sel","Sauce huancaína: fromage frais, ají amarillo, crackers soda, lait, ail","Maïs choclo, patates douces"],"s":["Nettoyer le coeur, enlever membranes, couper en cubes.","Mariner 2h minimum dans ají panca et épices.","Enfiler sur brochettes, presser ferme.","Griller sur braise vive 2-3 min — intérieur rose.","Huancaína crémeuse, maïs choclo grillé."]},{"n":"Pulled Pork Smoky Carolina","d":"Épaule de porc fumée 12h, sauce vinaigre Eastern North Carolina, slaw, bun","i":["2kg épaule de porc","Rub: sel, sucre roux, paprika fumé, ail, oignon, cayenne, poivre","Bois de hickory pour fumer","Sauce ENC: 200ml vinaigre blanc, 50ml ketchup, piment rouge, sel, sucre","Buns briochés, coleslaw"],"s":["Appliquer le rub généreusement, laisser la nuit au frigo.","Fumoir ou four à 110°C avec copeaux de bois trempés.","Cuire 10-14h jusqu'à température interne de 93°C.","La peau doit être une bark croustillante.","Effilocher à la main, assaisonner avec sauce vinaigre. Servir sur bun avec coleslaw et pickles."]},{"n":"St Louis Ribs Glacés","d":"Travers de porc St Louis, méthode 3-2-1, glaze miel-bourbon-sauce piquante","i":["1,5kg travers St Louis (carrés plats)","Rub: sucre brun, paprika, ail, oignon, poivre, sel, cumin, cayenne","Glaze: 100ml bourbon, 100ml miel, 50ml sauce piquante, 2 c.s beurre"],"s":["Enlever la membrane intérieure des ribs.","Rub généreux, laisser 1h.","Méthode 3-2-1: 3h fumoir à 110°C, 2h enveloppés alu avec jus de pomme, 1h découverts.","Dernière heure: badigeonner de glaze toutes les 20 min.","Reposer 15 min, couper entre les os."]},{"n":"Carnitas Michoacán","d":"Porc confit dans son propre gras et orange et épices, frit final croustillant","i":["1,5kg épaule de porc en gros morceaux","400g saindoux","1 orange coupée","1 c.s cumin, 2 feuilles de laurier, 4 gousses ail, sel"],"s":["Fondre le saindoux dans grande cocotte.","Ajouter porc, orange, ail, épices.","Confire à feu doux-moyen 1h30 en remuant régulièrement.","Monter le feu en fin de cuisson pour croustiller les extérieurs.","Effriter en morceaux irréguliers. Servir en tacos avec oignons, coriandre, salsa verde, citron vert."]},{"n":"Smash Burger Double Cheddar","d":"Boeuf écrasé plancha, cheddar fondu double, sauce big mac maison, pickles","i":["300g boeuf 80/20 en boules de 75g","4 tranches cheddar américain","Sauce: mayo, ketchup, moutarde jaune, cornichons hachés, oignon, vinaigre","Laitue iceberg, oignons blancs, cornichons","Bun graines de sésame"],"s":["Smash les 4 galettes sur plancha brûlante.","2 min par face. Cheddar sur chaque galette.","Préparer la sauce en mélangeant tous les ingrédients.","Double stack: pain bas, sauce, laitue, oignons, cornichons, 2 galettes, sauce, pain haut."]},{"n":"Carne en Vara (Boeuf sur Bâtons)","d":"Bavette marinée enfilée en accordéon sur tiges de bois, grillée autour de la braise","i":["600g bavette","Marinade: ail, origan, cumin, vinaigre, huile, sel","Tiges de bois (romarin épais ou brochettes larges)","Chimichurri rouge"],"s":["Couper la bavette en longues bandes.","Mariner 2h.","Enfiler en accordéon sur les tiges.","Planter en angle autour de la braise (cuisson latérale).","Cuire 15-20 min en tournant. Chimichurri rouge pour tremper."]}]},{"cat":"BRUNCH FOOD PORN","emoji":"🍳","items":[{"n":"Eggs Benedict Crabe Beurre Noisette","d":"Muffin anglais, crabe, oeuf poché parfait, hollandaise beurre noisette","i":["4 muffins anglais","200g chair de crabe","4 oeufs","Hollandaise: 3 jaunes, 200g beurre noisette, citron, tabasco","1 c.s vinaigre blanc"],"s":["Préparer la hollandaise au beurre noisette: monter les jaunes au bain-marie, incorporer le beurre noisette.","Pocher les oeufs dans eau frémissante vinaigrée 3 min.","Toaster les muffins.","Assembler: muffin, crabe tiède, oeuf poché, hollandaise.","Finir avec fleur de sel et herbes fraîches."]},{"n":"Shakshuka Harissa Feta","d":"Oeufs pochés dans sauce tomate harissa-poivrons, feta, pain plat","i":["6 oeufs","2 c.s harissa","400g tomates concassées","2 poivrons rouges rôtis","Cumin, coriandre, ail, oignon","100g feta émiettée","Coriandre fraîche, pain pita"],"s":["Faire revenir oignon, ail, cumin, coriandre.","Ajouter harissa, tomates, poivrons, mijoter 15 min.","Creuser des niches, casser les oeufs.","Couvrir, cuire 5-7 min (jaunes encore liquides).","Parsemer feta et coriandre, servir en poêle avec pita."]},{"n":"Croissant French Toast","d":"Croissant vieux trempé appareil vanille-cardamome, frit beurre, fruits rouges","i":["4 croissants de la veille","Appareil: 3 oeufs, 200ml crème, vanille, cardamome, sucre","Beurre pour cuire","Fruits rouges frais, coulis","Crème fouettée, sucre glace"],"s":["Couper les croissants en deux horizontalement.","Tremper dans l'appareil 1 minute par face.","Cuire dans beurre mousseux 2-3 min par côté.","Dresser avec fruits rouges, coulis, crème fouettée.","Sucre glace et zeste d'orange."]},{"n":"Pancakes Japonais Soufflés","d":"Pancakes fluffy ultra épais soufflés, vanille, sirop d'érable, beurre froid","i":["100g farine","2 c.c levure chimique","2 jaunes d'oeufs, 100ml lait, 2 c.s sucre, vanille","2 blancs montés en neige ferme","Sirop d'érable, beurre de qualité"],"s":["Mélanger jaunes, lait, farine, levure, vanille.","Monter les blancs en neige ferme avec sucre.","Incorporer délicatement les blancs à la pâte.","Cuire dans emporte-pièces huilés à feu très doux couvert 6 min par face.","Servir immédiatement avec sirop d'érable et noisette de beurre froid."]},{"n":"Chilli Scrambled Eggs Londonien","d":"Oeufs brouillés crémeux façon Dishoom, pain sourdough, chilli vert frais","i":["6 oeufs","50g beurre","100ml crème","1-2 piments verts hachés fins","Coriandre fraîche","Pain sourdough toasté","Garam masala"],"s":["Brouiller les oeufs très lentement au bain-marie avec beurre et crème.","Ne jamais cesser de remuer, processus de 8-10 min.","Arrêter avant coagulation complète.","Ajouter piment, coriandre, garam masala.","Servir immédiatement sur pain sourdough toasté beurré."]},{"n":"Breakfast Burrito Complet","d":"Grande tortilla, oeufs brouillés, chorizo, fromage fondu, haricots noirs, salsa","i":["4 grandes tortillas de blé","6 oeufs","200g chorizo mexicain émietté","200g haricots noirs","150g cheddar râpé","Salsa fraîche, crème acidulée, avocat"],"s":["Faire revenir le chorizo, ajouter les haricots noirs réchauffés.","Brouiller les oeufs au beurre.","Chauffer les tortillas.","Étaler oeufs, chorizo, haricots, fromage.","Ajouter salsa, avocat, crème, rouler serré. Passer 2 min sur plancha pour souder et croustiller."]},{"n":"Avocado Toast Premium","d":"Pain sourdough grillé, avocat écrasé, oeuf poché, feta, microgreens, huile olive","i":["2 tranches pain sourdough épais","2 avocats mûrs","Jus de citron, fleur de sel, poivre, piment rouge","Feta émiettée","Tomates cerises rôties","2 oeufs pochés","Microgreens ou roquette","Huile olive, graines sésame noir, sumac"],"s":["Rôtir les tomates cerises à l'huile 15 min.","Pocher les oeufs 3 min.","Griller le pain sourdough très croustillant.","Écraser l'avocat avec citron, sel, poivre, piment (chunky).","Étaler sur le pain. Poser oeuf poché, tomates rôties, feta. Microgreens, huile olive, sésame noir, sumac."]},{"n":"Kaya Toast Singapourien","d":"Pain de mie grillé, kaya (confiture coco-pandan-oeuf), beurre salé froid","i":["Pain de mie blanc tranché","Kaya: 4 oeufs, 200ml lait de coco, 150g sucre, pandan, curcuma","Beurre salé froid","Oeufs à la coque mollets pour tremper","Sauce soja, poivre blanc"],"s":["Préparer la kaya: battre oeufs, sucre, lait coco, pandan.","Cuire au bain-marie en mélangeant constamment jusqu'à confiture épaisse.","Refroidir. Griller le pain très croustillant.","Tartiner kaya généreusement sur une tranche, beurre salé froid sur l'autre.","Fermer, couper en deux. Tremper dans oeuf mollet assaisonné sauce soja et poivre blanc."]},{"n":"Congee Cantonais Premium Crabe","d":"Bouillie riz cuite 2h jusqu'à texture soie, garnitures premium crabe et gingembre","i":["200g riz jasmin","1,5 litre bouillon de poulet fort","Garnitures: gingembre julienne, oignons verts, huile sésame, sauce de poisson, youtiao (beignets), chair de crabe","Sel, poivre blanc"],"s":["Cuire le riz dans le bouillon 1h30-2h en mélangeant régulièrement.","Le riz doit totalement se dissoudre.","Texture: liquide et crémeuse, ni trop épaisse ni trop liquide.","Assaisonner sel et poivre blanc.","Dresser dans grand bol. Garnitures disposées sur le dessus. Youtiao pour tremper."]}]},{"cat":"STREETFOOD ASIATIQUE RARE","emoji":"🌏","items":[{"n":"Dan Dan Mian Sichuan","d":"Nouilles sésame-piment de sichuan, porc épicé ya cai, huile pimentée maison","i":["300g nouilles chinoises fraîches","200g porc haché","2 c.s ya cai (légumes marinés Sichuan)","Sauce: 3 c.s tahini, 2 c.s soja, 1 c.s vinaigre noir, 1 c.c sucre, ail, gingembre","Huile chili maison: piment en flocons, huile chaude, sel, poivre de sichuan moulu","Oignons verts, cacahuètes concassées"],"s":["Préparer l'huile chili: verser huile à 180°C sur piments, sel, poivre sichuan.","Mélanger la sauce sésame.","Faire revenir le porc émietté et ya cai à sec jusqu'à croustillant.","Cuire les nouilles al dente.","Dresser: sauce au fond du bol, nouilles, porc, oignons verts. Verser huile chili généreusement, mélanger en mangeant."]},{"n":"Tteokbokki Coréen","d":"Cylindres de riz en sauce gochujang sucrée-épicée, fishcake, oeuf mollet","i":["400g tteok (cylindres de riz)","Sauce: 3 c.s gochujang, 1 c.s sucre, 1 c.s sauce soja, 500ml dashi ou eau","200g eomuk (fishcake) en lamières","2 oeufs mollets, oignons verts, sésame"],"s":["Porter le dashi à ébullition avec la sauce gochujang.","Ajouter les tteok et fishcake.","Cuire 10-15 min en remuant, la sauce épaissit.","La sauce doit napper et former presque une glaze.","Servir avec oeuf mollet coupé, sésame, oignons verts."]},{"n":"Ramen Shoyu Street Bowl","d":"Bouillon shoyu de ramen concentré, porc chashu, oeuf ramen, nori, menma","i":["Bouillon: carcasse poulet, os de porc 4h, kombu, katsuobushi","Tare shoyu: soja, mirin, saké, sucre","Chashu: 500g poitrine roulée, soja, mirin, saké, sucre","Oeufs ramen: oeufs mollets marinés soja et mirin","Ramen frais, nori, menma, oignons verts"],"s":["Préparer le bouillon long 4h minimum, filtrer.","Cuire le chashu roulé ficelé dans la saumure 1h30.","Mariner les oeufs mollets 6h dans soja et mirin.","Chauffer le bouillon, assaisonner avec tare.","Cuire les ramen, dresser avec chashu tranché, oeuf, nori, menma, oignons."]},{"n":"Banh Xeo Crêpe Vietnamienne Croustillante","d":"Crêpe farine de riz-curcuma croustillante, crevettes-porc-soja, papier de riz et herbes","i":["Pâte: 200g farine de riz, 1 c.c curcuma, lait de coco, eau pétillante","200g crevettes, 150g porc finement tranché","200g germes de soja, oignons verts","Feuilles de laitue, papier de riz, herbes fraîches","Nuoc cham: sauce de poisson, citron, sucre, ail, piment"],"s":["Cuire crevettes et porc dans huile chaude dans grande poêle.","Verser la pâte (fine couche), couvrir 3 min.","Ajouter germes et oignons verts, couvrir 2 min.","Plier en deux, bords très croustillants.","Enrouler des morceaux dans papier de riz avec herbes, tremper dans nuoc cham."]},{"n":"Xiao Long Bao Dumplings Soupe","d":"Raviolis à soupe intérieure: gelée de bouillon pork et gingembre, pâte fine","i":["Pâte: 200g farine, 100ml eau bouillante","Gelée bouillon: 500ml bouillon de porc gélatineux réduit puis congelé","Farce: 200g porc haché, soja, gingembre, sésame, oignons verts","Sauce: vinaigre de riz, gingembre julienne"],"s":["Préparer le bouillon gélatineux, laisser figer, couper en dés.","Mélanger porc haché, dés de gelée, assaisonnements.","Étaler la pâte fine, former des disques.","Farcir, plier en 12-18 plis (technique XLB).","Cuire vapeur 8 min, servir avec sauce vinaigre gingembre."]},{"n":"Jianbing Guozi Pékinois","d":"Crêpe blé et millet, oeuf, hoisin, piment, coriandre, craquelin frit baocui","i":["Pâte: 100g farine de blé, 50g farine de millet, eau, sel","2 oeufs","Sauce hoisin, sauce chili","Coriandre, oignons verts","Baocui: craquelin frit croustillant ou cracker"],"s":["Étaler la pâte très fine sur plaque chaude en spirale.","Casser 1 oeuf sur la crêpe, étaler.","Retourner, tartiner hoisin et chili.","Poser le baocui, coriandre, oignons verts.","Plier en rectangle, servir dans papier."]},{"n":"Pad See Ew Thaï","d":"Larges nouilles de riz sautées wok vif, boeuf, brocoli chinois, sauce soja sweet","i":["300g larges nouilles de riz fraîches (sen yai)","200g boeuf tranché fin","200g brocoli chinois (gai lan)","3 oeufs","Sauce: 2 c.s sauce soja sucrée, 1 c.s sauce huître, 1 c.c sucre","Ail, huile, poivre blanc"],"s":["Wok très chaud (presque brûlant), huile.","Saisir le boeuf rapidement, réserver.","Faire revenir ail, brocoli, nouilles en séparant bien.","Pousser sur côté, brouiller les oeufs, mélanger.","Ajouter sauce, wok toss à feu très vif pour la fumée de wok (wok hei), remettre le boeuf."]},{"n":"Khinkali Géorgiens","d":"Raviolis géants plissés porc-boeuf-épices, cuisson eau bouillante, bouillon intérieur brûlant","i":["Pâte: 300g farine, 150ml eau, sel","Farce: 200g porc haché, 200g boeuf haché, 1 oignon, coriandre, cumin, piment, 100ml eau froide","Coriandre fraîche, poivre noir"],"s":["Pâte ferme: pétrir 15 min, reposer 30 min.","Farce: mélanger viandes, oignon, herbes, épices, eau froide (pour le bouillon intérieur).","Étaler fine, disques de 10cm.","20-30 plis traditionnels, tourner le noeud du haut.","Cuire à l'eau bouillante 12 min. Manger en tenant par le noeud, mordre le côté, boire le bouillon d'abord."]},{"n":"Goi Cuon Rouleaux Frais Vietnamiens","d":"Galette riz fraîche, crevettes et porc et vermicelles et herbes, sauce cacahuètes","i":["8 galettes de riz","200g crevettes cuites coupées","150g porc rôti tranché","50g vermicelles riz","Laitue, menthe, basilic thaï, ciboulette","Sauce: 3 c.s hoisin, 2 c.s beurre cacahuètes, eau, piment, sucre"],"s":["Tremper les galettes 10 secondes dans eau tiède.","Poser sur plan de travail humide.","Disposer laitue, vermicelles, porc, crevettes (face visible), herbes.","Rouler serré en rabattant les côtés.","Préparer la sauce cacahuètes. Tremper chaque rouleau à la dégustation."]},{"n":"Laksa Lemak Singapourien","d":"Nouilles riz dans bouillon coco-curry lemongrass, crevettes, tofu puffs, sambal","i":["200g vermicelles riz","Pâte laksa: lemongrass, galangal, shrimp paste, piment, curcuma","400ml lait de coco, 300ml bouillon","200g crevettes, 100g tofu puffs frits","Sambal, bean sprouts, feuilles de laksa, oeuf dur"],"s":["Mixer la pâte laksa, faire revenir à l'huile 5 min.","Mouiller avec bouillon et lait de coco, mijoter 15 min.","Cuire les crevettes dans le bouillon.","Réhydrater les vermicelles.","Dresser: vermicelles, crevettes, tofu puffs, bean sprouts. Napper de bouillon, sambal, feuilles de laksa."]}]},{"cat":"STREETFOOD AFRICAINE ET MOYEN-ORIENTALE","emoji":"🌍","items":[{"n":"Suya Nigérian Brochettes","d":"Brochettes boeuf épicées yaji (arachide-gingembre-poivre), oignons crus, tomates","i":["500g boeuf (rumsteck ou filet) en fines lamières","Épices yaji: 100g poudre cacahuètes grillées, paprika, gingembre, ail, oignon poudre, cayenne, sel","Huile","Oignons blancs crus, tomates, piment habanero en option"],"s":["Mélanger les épices yaji avec huile.","Enduire généreusement les lamières de boeuf.","Enfiler sur brochettes fines.","Griller sur braise vive 4-5 min en retournant.","Servir avec oignons crus émincés, tomates, piment."]},{"n":"Shawarma Libanais Authentique","d":"Agneau et poulet mélangés, toum maison, pickles roses, pain pita frais","i":["400g agneau émincé, 200g poulet","Épices: 7 épices, paprika, cannelle, cumin, ail, yaourt","Toum: 1 tête ail, 200ml huile neutre, jus citron, sel","Pickles roses, salade, tomates","Pita frais chaud"],"s":["Mariner viandes 4h ensemble.","Préparer le toum: mixer ail et citron, émulsionner avec huile goutte à goutte.","Griller à la plancha très chaude par petites quantités.","Réchauffer les pitas.","Garnir: toum, viande, pickles, salade, tomates, tahini."]},{"n":"Falafel Beyrouth Ultra-Croquant","d":"Pois chiches crus mixés herbes et épices, frit ultra-croustillant, vert dedans","i":["300g pois chiches crus trempés 24h (JAMAIS en boîte)","1 oignon, 4 gousses ail","Grande botte persil et coriandre","1 c.c cumin, 1 c.c coriandre, 1 c.c bicarbonate","Sel, poivre, pita, tahini, pickles"],"s":["Les pois chiches doivent être crus et trempés — jamais cuits.","Mixer avec oignon, ail, herbes, épices jusqu'à pâte granuleuse.","Ajouter bicarbonate, mélanger. Réfrigérer 30 min.","Former des boules ou disques, pas trop compressés.","Frire à 175°C 4-5 min — extérieur brun foncé, intérieur vert. Pita, tahini, salade, pickles."]},{"n":"Merguez Harissa Flatbread","d":"Merguez agneau maison grillée, pain msemen marocain, harissa rouge, chermoula","i":["Merguez maison: 400g agneau haché, harissa, ail, cumin, coriandre, paprika","Msemen: farine, semoule fine, beurre, huile","Harissa rouge maison","Chermoula: coriandre, ail, cumin, paprika, citron, huile"],"s":["Préparer les merguez en formant des saucisses, réfrigérer 1h.","Préparer le msemen: pâte feuilletée à la main, cuire à sec.","Griller les merguez 4-5 min.","Tartiner le msemen de harissa, poser les merguez.","Finir avec chermoula fraîche."]},{"n":"Samosas Punjabis Maison","d":"Pâte croustillante fine, farce pommes de terre-petits pois épicée, chutney tamarin","i":["Pâte: 200g farine, 40ml huile, sel, eau","Farce: 3 pommes de terre cuites, 100g petits pois, gingembre, cumin, garam masala, amchur, coriandre","Chutney tamarin: pâte tamarin, jus de dattes, cumin, gingembre, piment","Chutney vert: menthe, coriandre, piment, gingembre"],"s":["Préparer la pâte, laisser reposer 30 min.","Écraser les pommes de terre, mélanger avec épices et petits pois.","Former des cônes, farcir, sceller.","Frire à 170°C 6-8 min jusqu'à bien doré.","Servir avec les deux chutneys."]},{"n":"Borek Turc Fromage Sigara","d":"Tubes de feuille de yufka frits, farce feta-menthe-persil, graines nigelle","i":["8 feuilles de yufka ou filo","300g feta émiettée, menthe, persil","1 oeuf pour coller","Huile de friture","Graines de nigelle"],"s":["Mélanger feta, menthe, persil.","Couper les feuilles en triangles.","Poser farce sur bord large, rouler en cigare serré.","Coller le bout avec l'oeuf.","Frire à 175°C 3-4 min jusqu'à croustillant doré, parsemer de nigelle."]},{"n":"Kachori Jodhpur Rajasthan","d":"Boule de pâte frite farcie lentilles épicées, immergée dans chutneys et yoghourt","i":["Pâte: farine, ghee, sel, eau froide","Farce: lentilles urad, fenouil, coriandre, cumin, piment, amchur","Yaourt fouetté","Chutney tamarin, chutney vert","Sev (vermicelles de pois chiches frits)"],"s":["Préparer la pâte sablée avec beaucoup de ghee.","Cuire les lentilles, assaisonner généreusement.","Farcir les boules, fermer hermétiquement.","Frire lentement à 160°C 15 min pour cuisson uniforme.","Servir noyé dans yaourt, chutneys, sev."]},{"n":"Chermoula Marocaine Deux Versions","d":"Marinade-sauce herbes Maroc: fraîche pour poisson, rôtie pour agneau","i":["Grande botte coriandre, grande botte persil plat","6 gousses ail","1 c.s cumin, 1 c.s paprika, 1 c.c curcuma","1 piment rouge","Jus 2 citrons","100ml huile d'olive","Sel"],"s":["Version fraîche: mixer toutes les herbes, ail, épices, citron, huile.","Ne pas trop mixer — doit avoir de la texture.","Version cuite: faire revenir la pâte à l'huile 5 min avant utilisation.","Pour poisson: marinade crue 30 min puis grill.","Pour agneau-poulet: marinade cuite plus longue. Coriandre fraîche supplémentaire avant de servir."]},{"n":"Acarajé Bahianais Brésil","d":"Boulettes de haricots black-eyed pea frites dans huile de dendê, vatapá, camarão seco","i":["400g haricots à oeil noir trempés et pelés","1 oignon, sel, piment","Huile de dendê (palme rouge)","Vatapá: pain rassis, crevettes séchées, lait de coco, cacahuètes, dendê","Camarão seco (crevettes séchées)"],"s":["Mixer haricots, oignon, sel jusqu'à pâte lisse et aérée.","Frire par cuillerées dans l'huile de dendê chaude à 180°C.","Cuire 4 min jusqu'à bien dorés.","Préparer le vatapá: pain rassis, crevettes, lait coco, cacahuètes mixés, dendê.","Couper les acarajés en deux, farcir vatapá et crevettes séchées."]},{"n":"Injera Éthiopienne avec Tibs","d":"Pain teff fermenté alvéolé, tibs de boeuf épicé berbéré, ayib fromage frais","i":["Injera (achetée ou maison: farine teff fermentée)","Tibs: 400g boeuf en dés, oignon, berbéré, beurre niter kibbeh","Ayib (fromage frais éthiopien)","Mitmita (poudre pimentée), coriandre"],"s":["Faire revenir le boeuf dans beurre épicé niter kibbeh.","Ajouter oignons et berbéré, cuire 10 min.","Étaler la garniture sur l'injera.","Ajouter cuillerées d'ayib, parsemer de mitmita.","Rouler ou servir à plat, manger avec les mains."]}]},{"cat":"STREETFOOD LATAM ET CARAÏBES","emoji":"🌎","items":[{"n":"Arepas Reina Pepiada Venezolanas","d":"Galette de maïs grillée fendue, garnie poulet mayo-avocat-coriandre","i":["Arepas: 2 tasses masa arepa PAN, 2 tasses eau tiède, sel","Reina pepiada: 300g poulet effiloché, 2 avocats, mayo, coriandre, sel, citron vert"],"s":["Pétrir la masa avec eau et sel, former des disques de 1cm d'épaisseur.","Griller sur plancha 5-6 min par face jusqu'à croûte formée.","Finir au four à 200°C 10 min pour gonfler.","Préparer la farce: mélanger poulet, avocats écrasés, mayo, coriandre.","Fendre l'arepa, farcir généreusement."]},{"n":"Empanadas Argentines Boeuf","d":"Pâte feuilletée fine, farce boeuf-olives-raisins secs-oeuf dur épicée, repulgue","i":["Pâte: farine, saindoux, eau chaude, sel","Farce: 400g boeuf haché, 2 oignons, paprika, cumin, ají molido, olives, raisins secs, 2 oeufs durs"],"s":["Préparer la pâte, réfrigérer 1h.","Faire revenir boeuf, oignons, épices, ajouter olives et raisins.","Incorporer les oeufs durs hachés hors feu.","Former les disques, farcir, plier et faire le repulgue (pliage traditionnel).","Cuire au four à 200°C 20-25 min ou frire à 175°C 6 min."]},{"n":"Jerk Chicken Jamaïcain Authentique","d":"Poulet mariné jerk allspice-scotch bonnet, grillé lent bois de piment, festival (pain frit)","i":["1 poulet découpé en morceaux","Marinade jerk: scotch bonnet, allspice, thym, gingembre, ail, oignons verts, cannelle, muscade, sauce soja, jus citron vert","Festival (pain frit): farine, semoule de maïs, levure, sucre, eau"],"s":["Mixer la marinade jerk, enduire généreusement le poulet.","Mariner 12h minimum (toute la nuit).","Griller sur braise à feu moyen-doux 35-45 min.","Préparer les festivals: bouler, frire à 170°C jusqu'à dorés.","Servir avec festival et coleslaw créole."]},{"n":"Pupusas Salvadoriennes","d":"Galettes masa épaisses farcies fromage-chicharrón, curtido (chou fermenté), salsa roja","i":["2 tasses masa harina, eau, sel","Farce: 150g fromage frais fondant, 100g chicharrón mixé","Curtido: chou, carotte, oignon, vinaigre, origan, piment (fermenter 2h)","Salsa roja: tomates, ail, piment blendés"],"s":["Préparer le curtido 2h avant.","Pétrir la masa, former des boules.","Aplatir en disque, farcir au centre, refermer, aplatir à nouveau.","Cuire sur comal à sec 4-5 min par face.","Servir avec curtido et salsa roja."]},{"n":"Birria Tacos Street","d":"Birria de boeuf effiloché dans tortilla, consommé pour tremper, fromage fondu","i":["Birria: 1kg joue de boeuf, 5 piments guajillo, 3 ancho, épices, bouillon","Tortillas maïs","Fromage Oaxacan ou mozzarella","Consommé de birria réduit","Oignons, coriandre, citron vert"],"s":["Mijoter la birria avec piments réhydratés 3-4h jusqu'à effilochage.","Réserver le consommé.","Tremper les tortillas dans le gras de surface du consommé.","Poser sur plancha, garnir viande effilochée et fromage, plier.","Griller jusqu'à croustillant. Servir avec bol de consommé chaud."]},{"n":"Patacones Colombiens","d":"Tranches de plantain vert frit, écrasé, refrit, toppings variés","i":["2 plantains verts","Huile de friture","Sel","Toppings: ceviche, guacamole, chicharrón, crevettes","Ail en poudre, citron"],"s":["Couper les plantains en rondelles de 2cm.","Première friture à 170°C 4 min.","Sortir, écraser chaque rondelle à plat avec fond de verre.","Deuxième friture à 185°C 2 min jusqu'à croustillant.","Saler immédiatement. Garnir de toppings selon envie."]},{"n":"Pasteles Boricuas Puerto Rico","d":"Pâte de plantain et racines farcies porc épicé, enveloppée feuilles de bananier, bouillie","i":["Masa: plantains verts, yautia, pommes de terre, annatto, bouillon","Farce: 400g porc en dés, tomate, poivron, ail, sofrito, olives, câpres","Feuilles de bananier ou papier alu","Ficelle"],"s":["Préparer la masa en mixant plantains, yautia avec annatto et bouillon.","Mijoter la farce de porc épicée 30 min.","Étaler la masa sur feuille de bananier, farcir, rouler et attacher.","Cuire dans eau bouillante 1h.","Servir dans la feuille, ouvrir et manger avec arroz con gandules."]},{"n":"Anticuchos Péruviens Street","d":"Brochettes de coeur de boeuf mariné ají panca, sauce huancaína, maïs grillé","i":["600g coeur de boeuf nettoyé","Marinade: ají panca, ají amarillo, cumin, vinaigre blanc, ail, sel","Sauce huancaína: ají amarillo, queso fresco, crackers soda, lait, ail","Maïs choclo, patates douces roxas"],"s":["Enlever toutes les membranes et tendons du coeur.","Couper en cubes de 3cm. Mariner 2h minimum.","Enfiler sur brochettes, presser ferme.","Griller sur braise très vive 2 min par face. Intérieur rose.","Servir avec sauce huancaína, maïs grillé, patate douce."]},{"n":"Choripan BBQ Argentin","d":"Chorizo criollo sur braise, fente papillon, chimichurri maison, pain rustique","i":["4 chorizos criollos gras","Chimichurri: persil, origan, ail, piment rouge, vinaigre vin rouge, huile olive, sel","4 petits pains rustiques croustillants"],"s":["Inciser les chorizos en papillon sur toute la longueur.","Griller côté ouvert en premier sur braise vive 3 min.","Retourner 2 min pour finir.","Préparer le chimichurri en hachant finement tous les ingrédients.","Glisser le chorizo dans le pain, chimichurri généreux."]},{"n":"Ceviche Nikkei Lima-Tokyo","d":"Bar mariné dans leche de tigre yuzu, togarashi, tobiko, sésame — Lima rencontre Tokyo","i":["300g bar en dés grade sashimi","Leche de tigre nikkei: jus yuzu, soja, gingembre, ail, sel, piment jaune péruvien","Tobiko, sésame noir","Oignons rouges fins, coriandre, aneth, huile sésame","Chips de maïs noir"],"s":["Préparer la leche de tigre en mixant tous les ingrédients, filtrer.","Mariner le bar 5 min max dans la leche de tigre.","Dresser avec oignons rouges.","Tobiko, sésame noir.","Quelques gouttes d'huile sésame. Coriandre. Servir dans des petits bols avec cuillère."]}]},{"cat":"CHEESE PULLS ET TRUCS FONDANTS","emoji":"🧀","items":[{"n":"Mac and Cheese Brisket Fumé","d":"Macaroni cremeux 4 fromages, effiloché de brisket fumé dessus, panko grillé","i":["300g macaroni","Sauce: 50g beurre, 50g farine, 500ml lait, 100g cheddar, 100g gruyère, 50g parmesan, 50g cream cheese","200g brisket fumé effiloché","100g panko, beurre, paprika fumé"],"s":["Cuire les macaroni al dente.","Préparer béchamel, incorporer les fromages.","Mélanger macaroni et sauce, mettre en plat.","Poser le brisket effiloché dessus.","Couvrir de panko beurré et paprika, gratiner à 200°C 15 min."]},{"n":"Raclette Tacos Street","d":"Tortilla maïs, pommes de terre rôties, charcuterie, raclette fondue","i":["Tortillas maïs","200g pommes de terre grenaille rôties","Jambon de montagne, cornichons","200g raclette en tranches","Oignons grelots, poivre"],"s":["Rôtir les grenailles à l'huile et herbes.","Chauffer les tortillas.","Assembler: pommes de terre, charcuterie, cornichons.","Faire fondre la raclette sous la lampe ou au grill.","Napper de raclette fondue, poivrer."]},{"n":"Fundido Mexicain Skillet","d":"Skillet fromage fondu chorizo-poivrons, tortillas fraîches, pico de gallo","i":["400g fromage Chihuahua ou mozzarella et cheddar","200g chorizo mexicain","1 poivron poblano grillé en lanières","Tortillas farine fraîches","Pico de gallo"],"s":["Cuire le chorizo émietté à la poêle, égoutter.","Dans une skillet en fonte, superposer fromage, chorizo, poivrons.","Cuire à feu moyen ou four à 200°C jusqu'à fondu bouillonnant.","Servir directement dans la skillet brûlante.","Scoop avec tortillas fraîches et pico de gallo."]},{"n":"Patatas Bravas Aioli Fumé","d":"Pommes de terre frites deux fois, sauce brava tomate-piment, aioli fumé","i":["600g pommes de terre","Sauce brava: tomates, piment ñora, cayenne, vinaigre, ail, huile","Aioli fumé: mayo, ail rôti, paprika fumé, citron"],"s":["Double friture: 150°C 8 min, égoutter, refroidir, 190°C 3 min.","Préparer sauce brava en mixant tomates, piments, vinaigre.","Rôtir l'ail pour l'aioli, mixer avec mayo et paprika fumé.","Dresser les patatas, napper de sauce brava.","Trait d'aioli fumé, servir chaud."]},{"n":"Tartiflette Street en Coupelle","d":"Mini tartiflette individuelle reblochon coulant, lardons, pommes de terre","i":["4 pommes de terre à chair ferme","200g lardons fumés","2 oignons","1 reblochon","100ml vin blanc sec","Crème fraîche, poivre"],"s":["Cuire les pommes de terre en rondelles.","Faire revenir lardons et oignons, déglacer vin blanc.","Superposer dans coupelles individuelles: pommes de terre, lardons, crème.","Couvrir d'une demi-lune de reblochon croûte vers le haut.","Gratiner au four à 200°C 15-20 min."]},{"n":"Quesadilla Huitlacoche Truffe Mexicaine","d":"Quesadilla fourrée au huitlacoche (champignon du maïs), fromage Oaxacan, épazote","i":["Tortillas maïs bleues","200g huitlacoche (champignon parasite du maïs)","1 oignon, 2 gousses ail","Épazote ou coriandre","200g fromage Oaxacan ou mozzarella","Crème fraîche, salsa verde"],"s":["Faire revenir oignon, ail, ajouter huitlacoche et épazote.","Cuire 10 min, assaisonner.","Chauffer la tortilla, poser fromage d'un côté.","Ajouter huitlacoche, plier.","Griller 2 min par face jusqu'à fromage fondu. Crème fraîche et salsa verde."]},{"n":"Khachapuri Adjarian","d":"Barque de pain en pâte levée, fromage fondu, oeuf dessus, beurre — Tbilisi iconique","i":["Pâte: 300g farine, 7g levure, 150ml lait, 1 oeuf, 30g beurre, sel","Garniture: 300g imeruli cheese ou feta et mozzarella 50/50","4 oeufs, beurre, sel"],"s":["Pâte levée, pousser 1h.","Étaler en ovales épais, relever les bords en formant une barque, torsader.","Farcir de fromage émietté.","Cuire à 200°C 15 min.","Casser un oeuf au centre, remettre au four 5 min (blanc pris, jaune coulant). Noix de beurre sur l'oeuf. Mélanger à table en cassant les bords dans le fromage."]},{"n":"Nachos Chargés Ultimate","d":"Tortillas chips recouvertes de tout: boeuf épicé, fromage fondu, jalapeños, guac, crème","i":["300g chips tortilla","200g boeuf haché épicé (cumin, piment, ail)","Sauce fromage: roux, lait, cheddar, jalapeños en pot","Guacamole frais","Crème acidulée, pico de gallo, jalapeños frais, coriandre"],"s":["Étaler les chips sur plaque en une seule couche.","Parsemer de boeuf cuit épicé.","Verser la sauce fromage chaude.","Passer au four à 180°C 5 min.","Ajouter guacamole, crème, pico, jalapeños, coriandre. Servir immédiatement."]},{"n":"Pissaladière Niçoise","d":"Pâte fine, oignons confits 2h, anchois, olives niçoises, sans fromage","i":["Pâte: 300g farine, 7g levure, 150ml eau, 3 c.s huile olive","1,5kg oignons","12 filets anchois","Olives niçoises","Thym, laurier, huile olive, sel, sucre"],"s":["Confire les oignons à feu très doux avec thym et laurier 1h30-2h.","Ils doivent être dorés, fondants, presque confiture.","Préparer la pâte levée, pousser 1h.","Étaler, couvrir d'oignons confits.","Quadrillage d'anchois, olives aux intersections. Cuire à 200°C 25 min."]},{"n":"Focaccia Genovese Authentique","d":"Pâte haute hydratation 80%, saumure d'huile-sel, dimples, moelleuse croustillante","i":["500g farine","400ml eau","7g levure, 10g sel","6 c.s huile olive","Saumure: 50ml eau, 50ml huile olive, 1 c.c fleur de sel","Romarin en option"],"s":["Autolyse: farine et eau 30 min.","Ajouter levure, sel, huile, pétrir.","Huiler un plat, transférer la pâte, pousser 1h.","Étirer et plier plusieurs fois.","Verser la saumure dessus, faire les dimples profonds avec les doigts. Pousser 30 min. Cuire à 220°C 20 min."]}]},{"cat":"DESSERTS STREET ET REMIXÉS","emoji":"🍰","items":[{"n":"Churros Rellenos Farcis","d":"Churros farcis de dulce de leche ou Nutella, sucre cannelle, chocolat à tremper","i":["Pâte choux: 250ml eau, 100g beurre, 150g farine, 3 oeufs, sel","Dulce de leche ou Nutella en poche à douille","Sucre et cannelle","Chocolat noir fondu et crème pour tremper"],"s":["Préparer la pâte à choux, mettre en poche avec douille étoile.","Frire par serpentins de 15cm à 180°C 4-5 min.","Rouler immédiatement dans sucre-cannelle.","Percer un bout, farcir de dulce de leche avec poche à douille.","Servir avec sauce chocolat chaude."]},{"n":"Mochi Ice Cream Maison","d":"Pâte de riz gluant cuite au micro-ondes, farci glace framboise ou matcha","i":["100g farine de riz gluant","100ml eau, 80g sucre","Fécule pour travailler","250g glace de votre choix (matcha, sésame noir, framboise)"],"s":["Congeler des boules de glace 2h.","Mélanger farine, eau, sucre, cuire au micro-ondes 2 min en mélangeant.","Laisser tiédir, travailler sur fécule.","Étaler finement, découper en ronds.","Envelopper chaque boule de glace dans la pâte, bien sceller."]},{"n":"Waffle Liégeois Caramélisé","d":"Vraie pâte levée avec sucre perlé qui caramélise, beurre de qualité, vanille","i":["350g farine","20g levure fraîche","200g beurre 84% matière grasse","2 oeufs","100ml lait tiède","150g sucre perlé","1 c.c vanille, sel"],"s":["Délayer levure dans lait tiède et sucre, incorporer farine et oeufs.","Pétrir, ajouter beurre ramolli progressivement.","Laisser pousser 1h, incorporer le sucre perlé en dernier.","Former des boules, cuire en gaufrier très chaud.","Le sucre perlé doit caraméliser et craquer. Manger chaud nature."]},{"n":"Jalebi Indien Spirales Frites Sirop","d":"Spirales de pâte fermentée frites croustillantes, trempées sirop safran, mangées chaudes","i":["200g farine, 1 c.s farine pois chiche","7g levure","200ml yaourt nature","Eau pour la pâte","Sirop: 200g sucre, 150ml eau, safran, cardamome, eau de rose","Huile de friture"],"s":["Pâte: farine, levure, yaourt, diluer avec eau jusqu'à pâte à crêpe épaisse.","Laisser fermenter 8-12h.","Sirop: sucre, eau, safran, cuire jusqu'à 1 fil.","Mettre la pâte en poche ou bouteille squeeze, frire en spirales dans huile à 180°C 2-3 min.","Plonger immédiatement dans le sirop chaud 30 secondes. Manger immédiatement pendant qu'elles croustillent."]},{"n":"Sticky Rice Manguée Thaï","d":"Riz gluant cuit lait coco sucré, mangue Ataulfo mûre, sauce coco épaissie","i":["300g riz gluant trempé 4h","400ml lait de coco","80g sucre, 1 c.c sel","2 mangues Ataulfo ou Nam Dok Mai","Sauce coco: 100ml lait de coco, 1 c.s sucre, sel, maïzena","Graines de sésame"],"s":["Cuire le riz gluant vapeur 20 min.","Chauffer lait de coco, sucre, sel jusqu'à dissolution.","Verser sur le riz chaud, couvrir 20 min — le riz absorbe.","Préparer la sauce coco épaissie.","Dresser: riz gluant, tranches de mangue, sauce coco, sésame. Servir à température ambiante."]},{"n":"Brioche Perdue Foie Gras Figues","d":"Épaisse tranche de brioche pain perdu salée, escalope de foie gras, figues caramélisées","i":["4 tranches épaisses brioche","Appareil: 2 oeufs, 100ml crème, sel, poivre","4 escalopes de foie gras de canard","4 figues fraîches","Vinaigre balsamique, miel","Fleur de sel, poivre"],"s":["Tremper la brioche dans l'appareil salé-poivré.","Cuire dans beurre mousseux 2-3 min par face.","Poêler les figues avec miel et vinaigre balsamique.","Saisir les escalopes de foie gras 45 secondes par face.","Dresser: pain perdu, foie gras, figues caramélisées, fleur de sel."]},{"n":"Churros au Matcha Fusion","d":"Pâte à choux avec matcha cérémonie, frite, sucre glace-matcha, sauce dulce de leche","i":["Pâte choux: 250ml eau, 100g beurre, 130g farine, 20g matcha cérémonie, 3 oeufs","Sucre et matcha pour rouler","Sauce dulce de leche"],"s":["Préparer la pâte à choux en incorporant le matcha dans la farine.","Mettre en poche avec douille étoile.","Frire à 180°C 4-5 min — couleur vert tendre dorée.","Rouler dans mélange sucre et poudre de matcha.","Servir avec sauce dulce de leche pour tremper."]},{"n":"Basque Cheesecake Brûlé","d":"Cheesecake sans base, brûlé en surface, coeur crémeux tremblant","i":["600g cream cheese","180g sucre","3 oeufs, 2 jaunes","300ml crème","1 c.s farine","Extrait de vanille, sel"],"s":["Mixer cream cheese et sucre.","Ajouter oeufs et jaunes un à un.","Incorporer crème, farine, vanille, sel.","Verser dans moule tapissé papier sulfurisé froissé.","Cuire à 230°C 25-30 min — surface très brûlée, intérieur tremblant. Refroidir complètement avant de couper."]},{"n":"Tarte Tatin Camembert","d":"Tatin de pommes caramélisées, servie chaude avec demi-camembert fondu par-dessus","i":["6 pommes Reine des reinettes","150g sucre","80g beurre demi-sel","Pâte feuilletée","Thym frais","1/2 camembert"],"s":["Caramel à sec dans poêle allant au four.","Couper pommes en quartiers, cuire dans caramel 15 min.","Ajouter beurre et thym.","Couvrir de pâte feuilletée, rentrer les bords.","Cuire à 200°C 25 min. Retourner, poser demi-camembert dessus, passer 5 min sous grill. Servir immédiatement."]},{"n":"Paris-Brest Pralinée Street","d":"Chou en couronne, mousseline pralinée noisette, noisettes entières caramélisées","i":["Pâte choux","Amandes effilées","Pralinée: 200g noisettes grillées, 200g sucre caramélisé, mixés","Mousseline: crème pâtissière, beurre pommade, pralinée","Sucre glace"],"s":["Coucher la pâte choux en couronne, amandes effilées, cuire à 200°C 30 min.","Préparer le praliné maison.","Incorporer praliné dans la crème pâtissière froide, monter avec beurre pommade.","Couper la couronne, pocher la mousseline pralinée généreusement.","Noisettes caramélisées dessus, sucre glace."]}]},{"cat":"NOODLES ET PASTA STREET","emoji":"🍜","items":[{"n":"Cacio e Pepe Wrap Roulé","d":"Cacio e pepe enroulée dans crêpe fine, comme un wrap pasta, version street romaine","i":["200g tonnarelli ou spaghetti","100g pecorino romano râpé fin","50g parmesan","1 c.s poivre noir moulu grossier et torréfié","Crêpe fine: 100g farine, 1 oeuf, 200ml eau, sel"],"s":["Torréfier le poivre à sec, réserver.","Cuire les pâtes dans peu d'eau (eau plus amidonnée).","Émulsionner dans la poêle: poivre, eau de cuisson, fromages.","Pâte doit être crémeuse et napper les pâtes.","Préparer des crêpes fines. Enrouler les pâtes chaudes dans la crêpe, couper en deux, servir."]},{"n":"Pad Thai Authentique Wok","d":"Nouilles riz sautées oeufs-crevettes-tofu, sauce tamarin-poisson, cacahuètes","i":["200g nouilles riz (sen lek) trempées","150g crevettes","100g tofu ferme en dés","2 oeufs","Sauce: 2 c.s pâte tamarin, 2 c.s sauce de poisson, 1 c.s sucre de palme","Garniture: cacahuètes, bean sprouts, cive, citron vert, piment séché"],"s":["Wok très chaud avec huile.","Cuire tofu jusqu'à doré, pousser sur côté.","Ajouter crevettes, cuire. Brouiller les oeufs.","Ajouter les nouilles et sauce.","Toss fort 2 min. Servir avec toutes les garnitures à côté."]},{"n":"Yakisoba Street Japonais","d":"Nouilles sautées porc-chou-carottes, sauce yakisoba, katsuobushi, mayo","i":["300g nouilles yakisoba fraîches","150g porc en fines lanières","1/4 chou vert ciselé","1 carotte en julienne","Sauce yakisoba: 3 c.s sauce Worcestershire, 2 c.s ketchup, 1 c.s sauce soja, 1 c.s sauce huître","Katsuobushi, ao nori, mayo, gingembre rouge beni shoga"],"s":["Wok très chaud, cuire le porc.","Ajouter chou, carottes, nouilles.","Verser la sauce yakisoba.","Sauter à feu très vif 3 min en remuant constamment.","Dresser sur assiette. Katsuobushi, ao nori, trait de mayo, beni shoga."]},{"n":"Bigoli in Salsa Vénitien","d":"Pâtes épaisses venise aux anchois et oignons confits longuement, huile olive","i":["300g bigoli ou spaghetti épais","4 oignons blancs","8 filets d'anchois salés","100ml huile olive","Persil, poivre"],"s":["Confire les oignons émincés dans l'huile olive à feu très doux 40 min.","Ajouter les anchois, les faire fondre et dissoudre.","Pâte qui se forme — saucer les bigoli cuits.","Eau de cuisson si nécessaire pour fluidifier.","Persil haché et poivre."]},{"n":"Char Kway Teow Singapourien","d":"Larges nouilles riz sautées lard-crevettes-cockles, sauce noire, wok hei essentiel","i":["300g larges nouilles riz fraîches","100g crevettes, 100g cockles (coques), 50g lard ou char siu","2 oeufs","Sauce noire: soja foncé, soja clair, sauce huître, sucre","Bean sprouts, cive, piment"],"s":["Lard croustillant d'abord, réserver.","Wok au maximum, cuire crevettes.","Pousser sur côté, oeufs brouillés.","Ajouter nouilles et sauce noire.","Wok toss violent pour le wok hei (fumée caractéristique). Ajouter cockles, bean sprouts, cive en dernier."]},{"n":"Udon Froid Kake Dashi","d":"Udon épais froids, dashi glacé léger soja-mirin, gingembre, oignons verts, wasabi","i":["400g udon frais épais","Dashi: 500ml kombu et katsuobushi infusés","Tare: 3 c.s soja, 2 c.s mirin, 1 c.c sucre (réduire)","Gingembre râpé, oignons verts, wasabi frais","Tororo (igname râpée) en option"],"s":["Préparer le dashi en infusant kombu froid 30 min puis katsuobushi 5 min.","Mélanger avec tare, refroidir sur glace.","Cuire les udon, rincer à l'eau froide abondamment.","Dresser les udon froids dans bol.","Verser le dashi glacé. Gingembre, oignons, wasabi, tororo."]},{"n":"Pasta e Fagioli Napolitaine","d":"Soupe épaisse haricots borlotti, pâtes courtes, tomate, romarin, huile olive","i":["400g haricots borlotti cuits","200g ditalini ou pasta courte","400g tomates pelées","1 oignon, 2 gousses ail, romarin","100ml huile olive","Parmesan croûte, piment"],"s":["Faire revenir oignon, ail, romarin, piment dans huile olive.","Ajouter tomates, cuire 10 min.","Ajouter haricots, écraser grossièrement la moitié.","Ajouter eau-bouillon et croûte de parmesan.","Cuire les pâtes directement dans la soupe. Finir avec huile olive généreuse. Texture épaisse comme un porridge."]},{"n":"Spicy Miso Ramen Maison","d":"Bouillon miso rouge-tahini-beurre, porc effiloché, maïs sauté, beurre froid","i":["Tare miso: 3 c.s miso rouge, 1 c.s tahini, 1 c.s beurre, ail, gingembre, tōbanjan","500ml bouillon de poulet","Ramen frais","Porc chashu ou effiloché","Maïs en boîte sauté beurre","Menma, nori, beurre froid, oignons verts"],"s":["Mélanger la tare miso en pâte.","Chauffer le bouillon, incorporer la tare.","Cuire les ramen.","Dresser: ramen, bouillon chaud.","Chashu tranché, maïs sauté, menma, nori. Noisette de beurre froid sur le dessus — elle fond à table."]},{"n":"Tagliolini Truffe Noire Gratinés","d":"Pâtes fines maison, beurre noisette truffe, parmesan fondu, gratinés rapides","i":["Pâte: 200g farine 00, 2 oeufs entiers, 2 jaunes","80g beurre","30g truffe noire râpée ou arôme truffe","100g parmesan","Sel, poivre blanc"],"s":["Pâte fraîche: mélanger, pétrir 10 min, reposer 30 min.","Laminer très fin, tailler en tagliolini.","Cuire 2 min dans eau bouillante salée.","Faire beurre noisette, ajouter truffe.","Toss les pâtes dans le beurre truffe et eau cuisson. Parsemer parmesan, passer 1 min sous grill."]},{"n":"Soba Froides Zaru Japonaises","d":"Nouilles de sarrasin froides sur natte, tsuyu de trempage, wasab
