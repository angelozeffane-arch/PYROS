i, nori","i":["300g nouilles soba séchées","Tsuyu: 200ml dashi, 3 c.s soja, 2 c.s mirin (réduire 5 min, refroidir)","Wasabi frais ou en pâte","Nori en lanières, oignons verts, gingembre"],"s":["Cuire les soba al dente, rincer abondamment à l'eau froide.","Frotter les nouilles pour enlever l'amidon.","Préparer le tsuyu froid.","Dresser les soba sur natte ou assiette froide.","Nori, oignons verts, wasabi à côté. Tremper chaque bouchée dans le tsuyu."]}]},{"cat":"GRILLADES ET BROCHETTES EXOTIQUES","emoji":"🔥","items":[{"n":"Satay Poulet Malay","d":"Poulet mariné curcuma-lemongrass, grillé braise, sauce cacahuètes riche","i":["500g blancs de poulet en longues lamières","Marinade: lemongrass, curcuma, ail, échalotes, galangal, coriandre moulue, sucre, sel","Sauce satay: 200g beurre cacahuètes, lait de coco, sauce soja, sucre de palme, tamarin, piment"],"s":["Mixer la marinade, enduire les lamières de poulet. Mariner 2h minimum.","Enfiler sur brochettes en accordéon.","Griller sur braise vive 3-4 min en tournant.","Préparer la sauce en chauffant tous les ingrédients avec eau.","Servir avec concombre, oignons marinés, gâteaux de riz lontong."]},{"n":"Moo Ping Brochettes Porc Thaï","d":"Porc en lamières marinées lait de coco-sauce de poisson-ail, grillées caramélisées","i":["500g porc en lamières","Marinade: 100ml lait de coco, 3 c.s sauce de poisson, 2 c.s sucre, 4 gousses ail, coriandre, poivre blanc","Sauce trempette: nam jim jaew"],"s":["Mélanger la marinade, y tremper le porc 4h.","Enfiler sur brochettes.","Griller sur braise à feu moyen, badigeonner de marinade régulièrement.","8-10 min en tournant — caramélisation légère souhaitée.","Servir avec riz gluant et nam jim jaew."]},{"n":"Shish Taouk Libanais","d":"Poulet mariné yaourt-7 épices-citron, grillé moelleux, toum, pain pita","i":["600g poulet en cubes","Marinade: yaourt, 7 épices, paprika, ail, citron, huile, sel","Toum maison","Pain pita chaud","Salade, tomates, oignons"],"s":["Mariner le poulet 4h minimum dans le yaourt épicé.","Enfiler sur brochettes, ne pas trop serrer.","Griller sur braise 10-12 min en tournant.","Le yaourt caramélise légèrement.","Servir dans pita avec toum généreux, salade, tomates."]},{"n":"Souvlaki Porc Grec","d":"Porc en cubes marinés origan-citron-huile, brochette fine, pita grillé, tzatziki","i":["600g porc filet ou épaule en cubes de 2cm","Marinade: 100ml huile olive, jus 2 citrons, 2 c.s origan, ail, sel, poivre","Tzatziki: yaourt, concombre égoutté, ail, aneth, huile olive","Pain pita grillé, tomates, oignons, persil"],"s":["Mariner le porc 2-4h.","Enfiler sur brochettes fines.","Griller sur braise vive 8-10 min en tournant régulièrement.","Gonfler les pitas sur la braise.","Pita, tzatziki, souvlaki, tomates, oignons, persil. Trait de citron et origan."]},{"n":"Adana Kebab Turc","d":"Agneau haché épicé piment isot modelé sur brochette plate, pain lavash, sumac","i":["500g agneau haché gras (20% gras)","1 oignon mixé égoutté","2 c.s piment isot (Urfa), 1 c.s paprika, sel","Beurre clarifié pour arroser","Pain lavash","Sumac, oignons rouges, tomates, persil"],"s":["Mélanger vigoureusement agneau, oignon, épices jusqu'à pâte collante.","Réfrigérer 1h.","Modeler en saucisses allongées sur brochettes plates larges.","Griller sur braise 4-5 min en arrosant de beurre.","Servir sur lavash avec oignons sumac, tomates, persil."]},{"n":"Espetada Madérienne","d":"Gros cubes de boeuf enfilés sur branche de laurier frais, gros sel, beurre ail","i":["800g contre-filet en gros cubes de 4cm","4 branches de laurier fraîches","Gros sel de mer","Beurre d'ail: 100g beurre, 4 gousses ail, persil"],"s":["Saler les cubes de viande généreusement 30 min à l'avance.","Enfiler sur les branches de laurier.","Griller sur braise vive 8-10 min en tournant.","Servir suspendu (tradition madérienne) ou couché.","Beurre d'ail fondu versé dessus à table."]},{"n":"Yakitori Tori Kawa Peau Poulet","d":"Peau de poulet roulée sur brochette, deux cuissons, sauce tare caramélisée","i":["Peau de poulet récupérée sur 6 cuisses","Sauce tare: soja, mirin, saké, sucre","Sel, sésame"],"s":["Gratter la peau pour enlever l'excès de gras.","Rouler et enfiler serrée sur la brochette (plusieurs couches).","Première cuisson: 5 min sur braise pour rendre le gras.","Badigeonner de tare, deuxième cuisson 3 min.","La peau doit être croustillante et laquée. Sésame, servir chaud."]},{"n":"Carne Asada Street","d":"Bavette marinée agrumes-cumin-ail, grillée vive, tortilla maïs, guac, salsa","i":["600g bavette","Marinade: jus 3 citrons verts, jus 1 orange, ail, cumin, origan, coriandre, piment ancho","Tortillas maïs","Guacamole: avocats, citron, oignon, coriandre, piment, sel","Salsa verde fraîche"],"s":["Mariner la bavette 2-4h.","Griller sur braise très vive 3-4 min par face.","Laisser reposer, trancher finement contre le fil en diagonale.","Chauffer les tortillas sur la braise.","Assembler avec guac, oignons, coriandre, salsa."]},{"n":"Suya Nigérian Vegan","d":"Tofu ferme mariné dans épices yaji, grillé brochette, oignons crus, tomates","i":["400g tofu ferme bien pressé","Épices yaji: 100g poudre cacahuètes, paprika, gingembre, ail, cayenne, sel","Huile d'arachide","Oignons blancs, tomates, piment"],"s":["Couper le tofu en cubes ou tranches épaisses.","Presser et sécher soigneusement.","Enrober de yaji et huile.","Enfiler sur brochettes, griller sur braise ou plancha 3-4 min par face.","Servir avec oignons crus, tomates, piment haché."]},{"n":"Choripan BBQ","d":"Chorizo criollo sur braise, fente papillon, chimichurri maison, pain rustique","i":["4 chorizos criollos gras","Chimichurri: persil, origan, ail, piment rouge, vinaigre vin rouge, huile olive, sel","4 petits pains rustiques croustillants"],"s":["Inciser les chorizos en papillon sur toute la longueur.","Griller côté ouvert en premier sur braise vive 3 min.","Retourner 2 min pour finir.","Préparer le chimichurri en hachant finement tous les ingrédients.","Glisser le chorizo dans le pain, chimichurri généreux."]}]},{"cat":"CRÊPES ET GALETTES DU MONDE","emoji":"🥞","items":[{"n":"Crêpe Suzette Flambée","d":"Crêpe fine beurrée dans sauce beurre d'orange caramélisée, flambée Grand Marnier","i":["Pâte à crêpes: 250g farine, 3 oeufs, 500ml lait, 50g beurre fondu, sel","Sauce Suzette: 100g beurre, 100g sucre, jus 3 oranges, zeste, 50ml Grand Marnier ou Cointreau"],"s":["Préparer et cuire les crêpes, réserver.","Caraméliser sucre dans poêle, ajouter beurre, jus d'orange, zeste.","Plier les crêpes en quatre, les passer dans la sauce chaude.","Ajouter le Grand Marnier, flamber.","Servir flambant dans la sauce."]},{"n":"Galettes Sarrasin Bretonnes Complètes","d":"Galette bretonne au blé noir, jambon-fromage-oeuf, beurre salé breton","i":["300g farine de sarrasin","500ml eau","1 oeuf, 1 c.c sel","Garniture: jambon blanc, Comté, oeuf","Beurre salé de qualité"],"s":["Préparer la pâte, reposer 1h minimum.","Cuire sur billig ou grande poêle avec beurre.","Poser jambon et fromage, laisser fondre.","Casser l'oeuf au centre, cuire jusqu'à blanc pris jaune coulant.","Replier les quatre bords, servir dans le papier."]},{"n":"Dosa Masala Inde du Sud","d":"Crêpe riz-lentilles fermentée fine croustillante, farce pommes de terre-curcuma, sambar","i":["Pâte dosa fermentée: riz et lentilles urad trempées, mixées, fermentées 12h","Masala: 4 pommes de terre, oignons, graines de moutarde, curry leaves, curcuma, piment","Ghee","Sambar et chutneys"],"s":["Préparer le masala: pommes de terre cuites, oignons revenus dans ghee et épices.","Chauffer la plaque au maximum.","Verser une louche de pâte, étaler en spirale très fine.","Arroser de ghee, cuire jusqu'à bords dorés.","Poser le masala sur la moitié, plier. Servir immédiatement avec sambar et chutneys."]},{"n":"Okonomiyaki Hiroshima Style","d":"Contrairement à Osaka: ingrédients superposés en couches distinctes, pas mélangés","i":["Pâte fine: farine, dashi, sel (très peu)","Chou vert ciselé épais","Yakisoba cuits","2 oeufs","Bacon ou poitrine fumée","Sauce okonomiyaki, mayo Kewpie, katsuobushi, ao nori"],"s":["Verser une fine couche de pâte sur plaque chaude.","Empiler directement dessus: chou, bacon, crevettes.","Ne pas mélanger — laisser cuire en tour.","Retourner délicatement l'ensemble.","Cuire l'autre côté, ajouter yakisoba à côté, casser 2 oeufs, étaler. Poser le tout sur les oeufs, retourner. Saucer, mayo, katsuobushi."]},{"n":"Blini Buckwheat Caviar","d":"Petits blinis épais sarrasin levurés, crème fraîche, caviar ou oeufs de saumon","i":["100g farine de sarrasin, 50g farine de blé","7g levure","1 oeuf séparé, 200ml lait tiède, sel","Crème fraîche épaisse","Caviar ou oeufs de saumon, aneth frais"],"s":["Mélanger farines, levure, jaune, lait, laisser pousser 1h.","Monter le blanc en neige, incorporer délicatement.","Cuire des petits ronds épais dans beurre 2 min par face.","Servir tiède avec crème fraîche, caviar, aneth."]},{"n":"Injera Éthiopienne Sourdough","d":"Crêpe fermentée teff 3 jours, alvéolée, acidulée, base de tout repas éthiopien","i":["300g farine de teff","500ml eau","Starter levure (ou fermentation naturelle 3 jours)","Sel"],"s":["Mélanger teff, eau, sel.","Laisser fermenter 2-3 jours à température ambiante.","La pâte doit être acidulée et bulleuse.","Cuire sur plaque chaude: verser en spirale depuis l'extérieur.","Couvrir, cuire vapeur 3-4 min — ne pas retourner. La surface doit être alvéolée."]},{"n":"Ploye Acadienne Canada","d":"Crêpe épaisse monoface jamais retournée, sarrasin et farine de blé, sirop d'érable","i":["150g farine de sarrasin","100g farine de blé","1 c.c levure chimique","1 c.c sel","350ml eau froide","Beurre, sirop d'érable"],"s":["Mélanger les farines, levure, sel.","Incorporer l'eau froide jusqu'à pâte légèrement épaisse.","Cuire sur plaque chaude non beurrée.","NE JAMAIS RETOURNER — cuire seulement côté 1 jusqu'à surface sèche.","La ploye est moelleuse dessus, légèrement croustillante dessous. Servir immédiatement avec beurre et sirop d'érable."]},{"n":"Jianbing Guozi Street Pékinois","d":"Crêpe blé et millet, oeuf, hoisin, piment, coriandre, craquelin frit baocui","i":["Pâte: 100g farine de blé, 50g farine de millet, eau, sel","2 oeufs","Sauce hoisin, sauce chili","Coriandre, oignons verts","Baocui (craquelin frit croustillant)"],"s":["Étaler la pâte très fine sur plaque chaude en spirale.","Casser 1 oeuf sur la crêpe, étaler.","Retourner, tartiner hoisin et chili.","Poser le baocui, coriandre, oignons verts.","Plier en rectangle, servir dans papier."]}]},{"cat":"GLACES ET DESSERTS FROIDS DU MONDE","emoji":"🍦","items":[{"n":"Kulfi Indien Pistaches","d":"Glace dense riche lait réduit, pistaches, cardamome, rosewater, congelée en cônes","i":["1 litre lait entier","200ml crème, 100g sucre","1 c.c cardamome","2 c.s eau de rose","50g pistaches concassées, 50g amandes effilées","Safran en option"],"s":["Réduire le lait à feu doux 45 min en remuant jusqu'à 1/3 du volume.","Ajouter crème, sucre, cardamome, eau de rose, safran.","Laisser refroidir, ajouter fruits secs.","Verser dans moules à kulfi ou petits pots.","Congeler 6-8h. Démouler sous eau chaude rapide. Garnir pistaches et eau de rose."]},{"n":"Granita Sicilienne Café","d":"Granita café très concentrée, brioche col tuppo, panna froide dessus","i":["500ml café espresso fort refroidi","100g sucre","Brioche sicilienne","200ml crème fraîche entière très froide (non montée)"],"s":["Dissoudre sucre dans café chaud, laisser refroidir.","Verser dans plat peu profond, congeler.","Gratter à la fourchette toutes les 30 min pendant 3h.","La texture doit être cristaux grossiers et légers.","Verser dans verres, napper de crème fraîche liquide très froide. Servir avec brioche pour tremper."]},{"n":"Bingsu Coréen Fraise","d":"Glace rasée très fine comme neige, fraises fraîches, lait condensé, mochi","i":["Lait concentré sucré congelé en bloc pour la glace rasée","Fraises fraîches tranchées, coulis de fraise","Haricots rouges sucrés azuki","Petits mochis, crème fouettée","Lait concentré sucré liquide"],"s":["Congeler le lait concentré en bloc fin.","Raser avec machine à glace ou mixer par coups courts.","Dresser en montagne dans un bol froid.","Fraises, coulis, haricots rouges, mochis.","Verser lait concentré liquide. Crème fouettée. Manger vite avant que la neige fonde."]},{"n":"Halo-Halo Philippin","d":"Coupe glacée philippine multi-couches: haricots, gélatine, ube, lait évaporé","i":["Haricots rouges sucrés","Nata de coco (gelée de noix de coco)","Kaong (palmier sucre)","Macapuno (noix de coco tendre)","Ube halaya (purée igname violette)","Lait évaporé sucré","Glace vanille","Pinipig (riz croustillant)","Flan (crème caramel)"],"s":["Dans un grand verre: couche haricots, nata de coco, kaong, macapuno.","Remplir de glace pilée.","Verser lait évaporé sucré généreusement.","Boule de glace vanille sur le dessus.","Ube halaya, flan, pinipig. Mélanger entièrement avant de manger."]},{"n":"Dondurma Glace Turque Élastique","d":"Glace qui s'étire et ne fond pas vite grâce au mastic et à la farine de salep","i":["500ml lait entier, 100ml crème","120g sucre","2 c.s farine de salep ou psyllium et maïzena comme substitut","1 c.c mastic (résine du mastic)","Pistaches concassées"],"s":["Broyer le mastic avec un peu de sucre pour l'empêcher de coller.","Mélanger salep et sucre dans le lait froid.","Chauffer en mélangeant jusqu'à épaississement.","Ajouter mastic broyé et crème.","Congeler en battant régulièrement. La texture finale doit être étirable. Saupoudrer de pistaches."]},{"n":"Pandan Coconut Ice Cream Sandwich","d":"Glace pandan-coco entre deux tranches de pain blanc grillé, maïs sucré, cacahuètes","i":["Glace pandan: 400ml lait coco, 200ml crème, 100g sucre, 2 c.s pâte pandan verte","Pain de mie blanc","Beurre pour griller","Maïs sucré en grains, cacahuètes concassées"],"s":["Préparer glace pandan: chauffer lait coco, crème, sucre, pandan, refroidir, churner ou congeler.","Couper le pain en tranches, beurrer, griller légèrement.","Placer une belle quenelle ou tranche de glace.","Ajouter maïs sucré et cacahuètes.","Manger immédiatement."]},{"n":"Mango Lassi Sorbet","d":"Sorbet yaourt-mangue cardamome, texture crémeuse entre glace et sorbet","i":["500ml pulpe de mangue Alphonso","200ml yaourt grec entier","80g sucre","1 c.c cardamome","Jus de citron vert","Pistaches, eau de rose"],"s":["Mixer mangue, yaourt, sucre, cardamome, citron vert jusqu'à lisse.","Goûter et ajuster sucre et acidité.","Churner en sorbetière 20-25 min.","Ou congeler en boîte plate, mixer par impulsions toutes les 2h.","Dresser avec pistaches et quelques gouttes d'eau de rose."]}]},{"cat":"BOISSONS STREET ET MOCKTAILS","emoji":"🥤","items":[{"n":"Thai Iced Tea Authentique","d":"Thé fort infusé épices, sucré, sur glaçons, lait évaporé versé dessus","i":["4 c.s thé Thai ou thé noir très fort","500ml eau bouillante","4 étoiles d'anis, 1 bâton cannelle infusés","4 c.s sucre","Lait évaporé sucré","Glaçons"],"s":["Infuser le thé et épices 5 min dans eau bouillante.","Filtrer, ajouter sucre, refroidir.","Remplir grands verres de glaçons.","Verser le thé froid.","Verser le lait évaporé lentement sur le dessus. Ne pas mélanger avant de servir pour l'effet visuel."]},{"n":"Lassi Mangue Punjab Style","d":"Yaourt battu mangue Alphonso, cardamome, eau de rose, glaçons","i":["400ml yaourt entier","200ml pulpe de mangue Alphonso","1 c.c cardamome","1 c.s eau de rose","3 c.s sucre, glaçons","Safran et pistaches pour garnir"],"s":["Mixer yaourt, mangue, cardamome, eau de rose, sucre.","Ajouter les glaçons, mixer à nouveau.","Doit être crémeux et froid.","Servir dans grands verres.","Garnir safran infusé et pistaches concassées."]},{"n":"Agua Fresca Jamaica Hibiscus","d":"Infusion froide fleurs d'hibiscus, citron vert, sucre, eau froide","i":["50g fleurs d'hibiscus séchées","1 litre eau chaude","100g sucre","Jus 2 citrons verts","1 litre eau froide supplémentaire","Glaçons, menthe"],"s":["Infuser les fleurs d'hibiscus dans l'eau chaude 15 min.","Filtrer, ajouter sucre, mélanger.","Ajouter eau froide et jus de citron vert.","Réfrigérer.","Servir sur glace avec fleur d'hibiscus et menthe. La couleur rouge-pourpre est magnifique."]},{"n":"Matcha Latte Japonais Froid","d":"Matcha cérémonie battu au fouet, lait d'avoine froid, sirop, glaçons","i":["2 c.c matcha cérémonie","50ml eau chaude à 75°C","200ml lait d'avoine ou lait entier","2 c.s sirop simple","Glaçons"],"s":["Tamiser le matcha dans un bol.","Verser l'eau chaude (75°C, pas bouillante) dessus.","Battre au fouet bambou en zigzag jusqu'à mousse sans grumeaux.","Remplir verre de glaçons et sirop.","Verser le lait froid. Verser le matcha moussu dessus en dernier. L'effet two-tone est le signature."]},{"n":"Tamarind Agua Fresca","d":"Pulpe tamarin diluée, sucre, sel pincée, piment tajín — la plus addictive","i":["200g pâte de tamarin","800ml eau froide","100g sucre","Pincée de sel","Tajín (sel citron piment)","Glaçons, citron vert"],"s":["Diluer la pâte de tamarin dans l'eau tiède.","Filtrer en pressant pour enlever les fibres.","Ajouter sucre et sel, mélanger.","Réfrigérer.","Servir sur glaçons avec rebord de verre salé au tajín. Rondelle de citron vert."]},{"n":"Teh Tarik Malaisie","d":"Thé au lait concentré versé d'une hauteur pour faire mousser, servi chaud","i":["Thé noir fort: 4 c.s thé ceylon ou assam, 500ml eau bouillante","4 c.s lait concentré sucré","Option: cardamome, gingembre"],"s":["Infuser le thé fort 5 min, filtrer.","Ajouter le lait concentré, mélanger.","Verser d'un récipient à l'autre de hauteur pour créer la mousse et refroidir légèrement.","Répéter 4-5 fois.","Servir dans grands verres ou tasses avec mousse sur le dessus."]}]},{"cat":"VIENNOISERIES ET BAKERY STREET","emoji":"🥐","items":[{"n":"Kouign-Amann Individuel","d":"Pâte levée feuilletée au beurre salé caramélisée, version individuelle format street","i":["Pâte: 250g farine, 7g levure, 150ml eau, 5g sel","200g beurre demi-sel pour feuilletage","150g sucre pour caramélisation","Beurre demi-sel extra, fleur de sel"],"s":["Pâte levée simple, pousser 1h.","Étaler en rectangle, poser beurre froid, envelopper, 3 tours.","Saupoudrer généreusement de sucre à chaque pli.","Former des cercles individuels dans moules.","Sucre supplémentaire dessus, fleur de sel. Cuire à 200°C 25 min."]},{"n":"Cinnamon Roll Stockholm Cardamome","d":"Version suédoise avec cardamome, noeud torsadé, gros sucre perlé","i":["400g farine, 7g levure, 200ml lait tiède, 80g sucre, 80g beurre mou, 2 oeufs","Garniture: 100g beurre, 80g sucre roux, 2 c.c cannelle, 1 c.c cardamome moulue","Gros sucre perlé"],"s":["Pétrir la pâte enrichie, pousser 1h.","Étaler en rectangle, garnir beurre-sucre-épices.","Rouler en boudins, couper en sections.","Torsader chaque section en noeud traditionnel suédois.","Pousser encore 30 min. Cuire à 190°C 15 min. Sucre perlé avant cuisson."]},{"n":"Maritozzo Romain Crème Fouettée","d":"Brioche romaine fendue fourrée crème montée abondante, sucre glace","i":["Pâte briochée: 300g farine, 7g levure, 60g sucre, 2 oeufs, 80g beurre mou, 60ml lait, zeste d'orange","500ml crème entière à fouetter","50g sucre glace et vanille","Sucre glace pour finition"],"s":["Pétrir la brioche enrichie, pousser 2h.","Former des petits pains oblongs, pousser encore 45 min.","Cuire à 180°C 15-18 min. Refroidir complètement.","Fouetter la crème avec sucre glace et vanille.","Fendre sans séparer, farcir généreusement de crème. Sucre glace sur le dessus."]},{"n":"Pretzel Bavarois Sel Beurre","d":"Pâte levée trempée soude alimentaire, sel grossier, beurre fondu à la sortie","i":["500g farine de force, 7g levure, 300ml eau tiède, 30g beurre, 10g sel, 1 c.s sucre","Bain de soude: 50g bicarbonate alimentaire, 1 litre eau","Sel grossier ou sésame"],"s":["Pâte levée, pousser 1h.","Former les bretzels: longues bandes, croiser, ramener les bouts.","Tremper dans bain de soude froide 30 secondes.","Poser sur plaque, saler grossièrement.","Cuire à 220°C 15 min. Napper de beurre fondu à la sortie du four."]},{"n":"Sfogliatella Napolitaine","d":"Coquillage feuilleté croustillant napolitain, farce ricotta-semoule-citron-cannelle","i":["Pâte: 500g farine, 200ml eau, sel, strutto (saindoux) ou beurre en grande quantité","Farce: 200g ricotta, semoule cuite, sucre, citron, cannelle, fruits confits, eau de fleur d'oranger"],"s":["Pâte ferme, laisser reposer 2h.","Étirer à la machine ou rouleau jusqu'à très fine.","Enrouler sur elle-même avec beaucoup de strutto. Congeler 1h.","Couper des tranches, étirer en coquille.","Farcir de ricotta, refermer. Cuire à 200°C 20-25 min."]},{"n":"Concha Mexicaine Pan Dulce","d":"Brioche mexicaine avec topping sucré craquelé en forme de coquillage","i":["Pâte: 400g farine, 7g levure, 100g sucre, 2 oeufs, 100g beurre, 150ml lait","Topping concha: 100g sucre glace, 100g shortening ou beurre, 100g farine, extrait vanille OU 2 c.s cacao"],"s":["Pétrir la pâte enrichie, pousser 1h30.","Former des boules de 80g.","Mélanger le topping jusqu'à pâte malléable.","Étaler le topping en cercle sur chaque boule.","Marquer le motif coquillage avec couteau. Pousser 45 min, cuire à 180°C 18 min."]},{"n":"Cardamom Bun Nordique","d":"Brioche suédoise à la cardamome intense, torsadée, glacée au sirop","i":["400g farine, 7g levure, 200ml lait, 80g sucre, 80g beurre, 1 oeuf","2 c.c cardamome moulue fraîche","Garniture: 100g beurre, 80g sucre, 2 c.c cardamome","Sirop: sucre et eau à parts égales"],"s":["Pétrir pâte à la cardamome, pousser 1h.","Étaler, tartiner garniture cardamome-sucre-beurre.","Rouler, couper, torsader en noeuds.","Pousser 30 min, cuire à 190°C 12-15 min.","Badigeonner de sirop immédiatement à la sortie du four."]}]},{"cat":"LÉGUMINEUSES ET VÉGÉTARIEN PREMIUM","emoji":"🌿","items":[{"n":"Dal Makhani de Nuit","d":"Lentilles noires et haricots rouges mijotés longtemps, beurre-crème-tomate, naan beurré","i":["200g lentilles urad dal entier, 100g haricots rouges","Sauce: 400g tomates, 2 oignons, ail, gingembre, garam masala, piment, cumin","100g beurre, 150ml crème","Naan ou roti beurré"],"s":["Tremper dal et haricots une nuit. Cuire à la cocotte minute 45 min.","Préparer la sauce tomate épicée.","Incorporer le dal cuit dans la sauce.","Mijoter à feu doux 1-2h — plus c'est long, meilleur c'est.","Beurre et crème en finition. Naan beurré et coriandre fraîche."]},{"n":"Hummus Kawareh Agneau","d":"Hummus ultracrémeux avec agneau haché épicé par-dessus, huile olive, paprika","i":["300g pois chiches secs trempés et cuits","100g tahini de qualité","Jus 2 citrons, 2 gousses ail, glaçons pour texture","Garniture: agneau haché revenu épicé","Huile olive, paprika, persil"],"s":["Cuire les pois chiches très tendres, garder l'eau.","Mixer encore chauds avec tahini, citron, ail, glaçons.","Mixer 5 min minimum pour texture ultra-lisse.","Ajuster avec eau de cuisson.","Dresser en assiette, faire un creux. Poser viande chaude, huile olive, paprika, persil."]},{"n":"Mujaddara Libanais","d":"Riz et lentilles cuites, oignons frits caramélisés dessus — humble et addictif","i":["200g lentilles vertes","200g riz long","3 oignons émincés fins","100ml huile d'olive","Cumin, sel, poivre","Yaourt grec, coriandre"],"s":["Cuire les lentilles 20 min.","Frire les oignons dans beaucoup d'huile d'olive jusqu'à brun foncé croustillant (30 min).","Égoutter les oignons en gardant l'huile.","Cuire le riz dans cette huile parfumée.","Mélanger avec les lentilles. Dresser avec oignons frits en montagne dessus. Yaourt et coriandre."]},{"n":"Chana Masala Delhi Street","d":"Pois chiches en sauce tomate-amchur très épaisse, bhature (pain frit gonflé)","i":["400g pois chiches cuits","2 oignons, 3 tomates","Épices: cumin, coriandre, garam masala, amchur, piment, ail, gingembre","Bhature: farine, yaourt, levure chimique, sel"],"s":["Cuire oignons jusqu'à brun foncé, ajouter ail et gingembre.","Tomates et épices, cuire 15 min.","Pois chiches et eau, mijoter 20 min, écraser quelques pois chiches.","Amchur en dernier pour acidité.","Bhature: mélanger pâte, reposer 30 min, étaler, frire à 180°C (gonflent comme des ballons)."]},{"n":"Falafel Ultra-Croquant","d":"Pois chiches crus non cuits mixés herbes et épices, frit ultra-croustillant, vert dedans","i":["300g pois chiches crus trempés 24h (JAMAIS en boîte)","1 oignon, 4 gousses ail","Grande botte persil et coriandre","1 c.c cumin, 1 c.c coriandre, 1 c.c bicarbonate","Sel, poivre, pita, tahini, pickles"],"s":["Les pois chiches doivent être crus et trempés — jamais cuits.","Mixer avec oignon, ail, herbes, épices jusqu'à pâte granuleuse.","Ajouter bicarbonate, mélanger. Réfrigérer 30 min.","Former des boules ou disques, pas trop compressés.","Frire à 175°C 4-5 min. Extérieur brun foncé, intérieur vert. Pita, tahini, salade, pickles."]},{"n":"Aloo Tikki Indien Street","d":"Galettes pomme de terre épicées frites croustillantes, chaat masala, chutneys","i":["500g pommes de terre cuites écrasées","1 c.c cumin, 1 c.c coriandre, 1 c.c chaat masala","Piment, sel, coriandre fraîche","Chapelure ou farine de riz pour enrober","Chutney tamarin, chutney vert, yaourt, sev"],"s":["Mélanger purée, épices, coriandre fraîche, sel.","Former des galettes épaisses.","Enrober légèrement de chapelure.","Frire dans l'huile à 175°C 4 min par face.","Dresser avec les deux chutneys, yaourt, sev, chaat masala."]},{"n":"Börek Épinards Feta","d":"Feuillets de yufka ou filo, farce épinards-feta-oignons, beurré, doré au four","i":["8 feuilles de yufka ou filo","300g épinards frais sautés bien essorés","200g feta émiettée","1 oignon, aneth, noix de muscade","100g beurre fondu","Graines de sésame et nigelle"],"s":["Mélanger épinards, feta, oignon, aneth, muscade.","Badigeonner chaque feuille de beurre fondu.","Alterner feuilles et farce en couches dans plat huilé.","Inciser en losanges ou rectangles.","Parsemer sésame et nigelle. Cuire à 180°C 35-40 min jusqu'à doré."]}]},{"cat":"STREET BREAKFAST DU MONDE","emoji":"🌅","items":[{"n":"Nasi Lemak Malaisie","d":"Riz cuit dans lait de coco feuilles pandan, anchovies frits, oeuf dur, sambal, cacahuètes","i":["300g riz jasmin","400ml lait de coco, 3 feuilles pandan, sel","Ikan bilis: 100g petits anchois séchés frits croustillants","Sambal: piments, crevettes, tamarinde, oignons, sucre","Oeufs durs, concombre, cacahuètes grillées"],"s":["Cuire le riz avec lait de coco, pandan, sel.","Frire les ikan bilis jusqu'à croustillants.","Préparer le sambal en mixant et cuisant les ingrédients 20 min.","Dresser traditionnellement dans papier bananier: riz au centre entouré de tous les accompagnements.","Mélanger à la main en mangeant."]},{"n":"Dim Sum Har Gow Crevettes","d":"Pâte translucide à l'amidon, crevettes entières, cuisson vapeur, sauce soja huile sésame","i":["Pâte har gow: 100g amidon de blé, 50g fécule de tapioca, eau bouillante","200g crevettes entières pelées","1 c.s bambou émincé","Sel, sucre, huile sésame, soja","Sauce: soja, vinaigre de riz, huile piment, gingembre"],"s":["Pâte: amidon, tapioca, eau bouillante, pétrir immédiatement.","La pâte doit être translucide et élastique.","Farce: crevettes grossièrement hachées, bambou, assaisonnements.","Étaler très fin, former des demi-lunes avec 5-7 plis.","Cuire vapeur 8 min. Servir immédiatement avec sauce soja."]},{"n":"Tamago Sando Japonais","d":"Sandwich japonais oeuf battu-mayo Kewpie, pain Shokupan, sans croûtes","i":["4 oeufs durs","3 c.s mayo Kewpie","1 c.c moutarde française","Sel, poivre blanc","4 tranches Shokupan ou pain de mie japonais","Option: oeuf mollet supplémentaire pour le coeur coulant"],"s":["Cuire les oeufs 10 min, refroidir.","Écraser grossièrement (pas en purée).","Mélanger avec mayo Kewpie, moutarde, sel, poivre blanc.","Tartiner généreusement une tranche.","Fermer, appuyer, couper les croûtes, trancher net en diagonale."]},{"n":"Scotch Egg Britannique","d":"Oeuf mollet enroulé chair à saucisse, pané chapelure, frit — coeur parfait","i":["4 oeufs","300g chair à saucisse porc","1 c.c moutarde anglaise","Thym, sauge","Chapelure panko, 2 oeufs battus, farine, huile"],"s":["Oeufs mollets 6 min, refroidir immédiatement dans glace. Peler délicatement.","Mélanger chair à saucisse, moutarde, thym, sauge.","Envelopper chaque oeuf dans la chair, bien sceller.","Paner: farine, oeuf, panko.","Frire à 175°C 6-7 min. Couper en deux à table, le jaune doit couler légèrement."]},{"n":"Çilbir Oeufs Pochés Turcs","d":"Oeufs pochés sur yaourt à l'ail, beurre paprika rouge fondu par-dessus, sumac","i":["4 oeufs","300g yaourt grec épais","2 gousses ail","80g beurre","2 c.c paprika doux, piment rouge séché","Sumac, aneth frais, pain"],"s":["Fouetter yaourt, ail écrasé, sel.","Étaler dans les assiettes, à température ambiante.","Pocher les oeufs 3 min dans eau vinaigrée.","Poser sur le yaourt ail.","Chauffer beurre jusqu'à légère coloration, ajouter paprika et piment. Verser le beurre rouge sur les oeufs. Sumac, aneth, pain."]},{"n":"Omurice Japonais","d":"Riz ketchup enveloppé omelette très fine, sauce demi-glace ou ketchup","i":["200g riz cuit","100g poulet en dés, 1/2 oignon","3 c.s ketchup, sauce Worcestershire","4 oeufs, beurre","Ketchup ou sauce demi-glace pour finition"],"s":["Faire revenir poulet et oignon, ajouter riz, ketchup, Worcestershire.","Former un petit football de riz ketchup.","Battre 2 oeufs, cuire omelette fine et baveuse dans beurre.","Poser le riz au centre, enrouler l'omelette autour.","Retourner sur assiette, couper le dessus délicatement pour ouvrir. Ketchup ou sauce demi-glace."]}]},{"cat":"SUSHI ET ROLLS FUSION","emoji":"🍣","items":[{"n":"Dragon Roll Saumon Avocat","d":"Roll intérieur crevette-concombre, recouvert de tranches d'avocat en écailles","i":["Riz sushi, feuilles de nori","Crevettes tempura, concombre","2 avocats tranchés très fin","Sauce anguille, mayo sriracha, tobiko"],"s":["Former le maki: nori, riz, crevette tempura, concombre. Rouler dans la natte, serrer.","Placer les tranches d'avocat en chevauchement sur le roll (effet écailles).","Filmer, presser doucement pour former.","Couper en 8, retirer le film.","Sauce anguille, mayo sriracha, tobiko."]},{"n":"Aburi Salmon Nigiri Grillé","d":"Nigiri saumon brûlé au chalumeau, sauce spéciale ponzu, fleur de sel","i":["Riz sushi en quenelles allongées","Saumon de qualité sashimi tranché épais","Sauce aburi: mayo, ponzu, huile sésame","Fleur de sel, zeste de citron","Chalumeau de cuisine"],"s":["Former les quenelles de riz sushi.","Poser les tranches de saumon.","Napper d'un peu de sauce aburi.","Brûler au chalumeau jusqu'à légère coloration.","Le saumon devient partiellement cuit, texture fondante. Fleur de sel et zeste de citron."]},{"n":"Temaki Hand Roll Spicy Tuna","d":"Cône de nori, riz sushi, thon rouge mayo épicée, tobiko, avocat","i":["Riz à sushi assaisonné","Feuilles de nori coupées en deux","150g thon rouge en dés","Mayo spicy: mayo Kewpie, sriracha, huile sésame","Avocat en tranches, tobiko, concombre julienne"],"s":["Préparer le riz sushi.","Mélanger thon et mayo spicy.","Plier le nori en cône entre les doigts.","Remplir de riz puis garnitures dans l'ordre.","Fermer le cône avec un grain de riz. Manger immédiatement — le nori se ramollit vite."]},{"n":"Inari Sushi Tofu Fourré","d":"Poches de tofu frit sucrées-salées fourrées de riz sushi aux graines sésame","i":["Abura-age: 8 poches de tofu frit","Sauce: soja, mirin, saké, sucre (mijotée)","300g riz sushi","Sésame grillé, gingembre mariné"],"s":["Blanchir les poches de tofu, presser l'huile.","Cuire dans sauce soja-mirin-saké-sucre 15 min. Refroidir dans le jus.","Mélanger le riz sushi avec sésame.","Ouvrir délicatement les poches, farcir de riz.","Presser légèrement pour former. Servir à température ambiante."]},{"n":"Chirashi Bowl Luxe","d":"Bol de riz sushi garni de sashimi variés, oeufs de poisson, pickles, sauce","i":["200g riz sushi","Sashimi: thon, saumon, bar, crevettes, poulpe","Tobiko et ikura (oeufs de saumon)","Tamago (omelette sushi), daikon mariné jaune","Sauce ponzu, soja, wasabi, gingembre"],"s":["Préparer et assaisonner le riz sushi.","Dresser le riz dans bol, légèrement tassé.","Disposer esthétiquement les sashimi variés par-dessus.","Tobiko et ikura dans les espaces. Tamago et daikon.","Servir avec ponzu, soja, wasabi, gingembre."]}]},{"cat":"PICKLES ET FERMENTÉS","emoji":"🫙","items":[{"n":"Kimchi Maison Ultra-Traditionnel","d":"Chou napa fermenté pâte gochugaru-crevettes-ail-gingembre, fermentation 3 jours","i":["1 chou napa de 2kg","200g gros sel","200g gochugaru (poudre de piment coréen)","50g anchois fermentés ou crevettes fermentées","1 tête ail, 50g gingembre, 100g cives","1 c.s sucre","Farine de riz cuite pour lier"],"s":["Couper le chou en quartiers, saler entre les feuilles, laisser dégorger 2h.","Rincer 3 fois, essorer.","Préparer la pâte: gochugaru, anchois, ail, gingembre, sucre, porridge de riz.","Mélanger avec les cives coupées.","Enduire chaque feuille de chou de la pâte (avec des gants). Mettre en pot, laisser fermenter 1-3 jours. Réfrigérer."]},{"n":"Do Chua Pickles Vietnamiens","d":"Carottes et daikon en julienne vinaigre-sucre, prêts en 1h, banh mi incontournables","i":["2 carottes en julienne fine","1 daikon en julienne fine","1 c.s sel","3 c.s sucre","100ml vinaigre de riz","100ml eau chaude"],"s":["Julienner carottes et daikon fin.","Masser avec sel 10 min, rincer, essorer.","Dissoudre sucre dans vinaigre et eau chaude.","Verser sur les légumes.","Prêts après 1h. Meilleurs après 24h."]},{"n":"Kkakdugi Kimchi Daikon Coréen","d":"Daikon en cubes fermenté piment-ail, croquant, légèrement sucré","i":["1 daikon en cubes de 2cm","1 c.s sel, 1 c.s sucre","50g gochugaru","3 gousses ail, 1 c.s gingembre","1 c.s sauce de poisson, cives"],"s":["Saler les cubes de daikon 30 min, rincer, essorer.","Mélanger avec gochugaru, ail, gingembre, sauce de poisson, sucre.","Ajouter les cives coupées.","Mettre en pot, fermentation 24h à température ambiante.","Réfrigérer. Excellent avec du riz et du bulgogi."]},{"n":"Torshi Pickles Moyen-Orientaux","d":"Légumes variés en saumure vinaigre-sel, colorés au chou rouge, condiment universel","i":["Chou-fleur, carottes, céleris, cornichons, poivrons en morceaux","1/4 chou rouge pour la couleur rose","Saumure: 500ml vinaigre de cidre, 500ml eau, 2 c.s sel, 1 c.s sucre","Ail, laurier, grains de poivre"],"s":["Couper tous les légumes en morceaux similaires.","Mettre en bocaux stérilisés avec ail, laurier, poivre.","Verser la saumure chaude.","Laisser refroidir, fermer.","Prêts après 48h, meilleurs après 1 semaine. La couleur rose du chou rouge teinte tout."]},{"n":"Miso Tsukemono Japonais","d":"Légumes marinés directement dans le miso plusieurs jours, umami profond","i":["Légumes: concombre, carottes, daikon, navets","400g miso blanc ou rouge","1 c.s mirin, 1 c.s saké"],"s":["Mélanger miso, mirin, saké.","Envelopper les légumes dans la pâte de miso.","Mettre en sac hermétique ou pot. Réfrigérer 24-72h.","Plus le miso est foncé, plus la fermentation est puissante.","Rincer légèrement avant de servir. Trancher fin, accompagner avec riz."]}]},{"cat":"PARTY FOOD ET SHARING","emoji":"🎉","items":[{"n":"Nachos Chargés Party Size","d":"Tortillas chips recouvertes boeuf épicé, fromage fondu, jalapeños, guac, crème","i":["300g chips tortilla","200g boeuf haché épicé (cumin, piment, ail)","Sauce fromage: roux, lait, cheddar, jalapeños","Guacamole frais","Crème acidulée, pico de gallo, jalapeños frais, coriandre"],"s":["Étaler les chips sur plaque en une seule couche.","Parsemer de boeuf cuit épicé.","Verser la sauce fromage chaude.","Passer au four à 180°C 5 min.","Ajouter guacamole, crème, pico, jalapeños, coriandre. Servir immédiatement dans la plaque."]},{"n":"Buffalo Wings Party Size","d":"Ailes de poulet frites à la perfection, sauce buffalo beurre, blue cheese, céleri","i":["1kg ailes de poulet séparées en flats et drumettes","Sel, poivre, ail poudre, paprika","Huile de friture","Sauce buffalo: 100ml Frank's RedHot, 60g beurre fondu, 1 c.s vinaigre","Blue cheese dip: fromage bleu, mayo, crème, citron","Céleri en bâtonnets"],"s":["Sécher les ailes au frigo une nuit découvertes (peau sèche = plus croustillant).","Assaisonner avec sel, ail, paprika.","Frire à 175°C 12-15 min.","Mélanger sauce buffalo dans bol.","Toss les ailes dans la sauce chaude. Servir immédiatement avec blue cheese et céleri."]},{"n":"Guacamole Tableside","d":"Guacamole préparé minute devant les convives au mortier, tajín","i":["4 avocats Hass très mûrs","2 citrons verts","1/2 oignon blanc finement haché","1-2 piments serrano ou jalapeño","Coriandre fraîche abondante","Sel","1 tomate épépinée en dés, tajín"],"s":["Mortier et pilon: écraser ail, sel, piment jusqu'à pâte.","Ajouter avocats, écraser grossièrement (chunky c'est mieux).","Jus de citron vert. Oignon, coriandre, tomate, mélanger.","Goûter et ajuster: sel, citron, piment.","Tajín en finition. Servir dans le mortier avec tortillas chips chaudes."]},{"n":"Pigs in Blankets Améliorés","d":"Chipolatas dans pâte feuilletée maison, moutarde, sésame, honey mustard","i":["12 chipolatas de qualité","1 rouleau pâte feuilletée","1 c.s moutarde ancienne","1 oeuf battu","Graines sésame et nigelle","Honey mustard: moutarde, miel, vinaigre cidre"],"s":["Couper la pâte en bandes.","Badigeonner de moutarde.","Enrouler chaque chipolata dans une bande en spirale.","Dorer à l'oeuf, sésame et nigelle.","Cuire à 200°C 20 min. Honey mustard pour tremper."]},{"n":"Charcuterie Board Fusion","d":"Plateau mixte: charcuteries, fromages, pickles, fruits, noix, miel, pains variés","i":["Charcuteries variées: jambon ibérique, salami, mortadelle, bresaola","Fromages: comté, brie, manchego, bleu","Accompagnements: raisins, figues, cornichons, miel, noix, amandes","Pains: pain de campagne, grissini, crackers","Condiments: moutarde ancienne, confiture de figue"],"s":["Grande planche en bois ou ardoise.","Disposer les fromages en premier (les plus grands).","Charcuteries en rosettes ou drapées.","Raisins en grappes, figues fraîches ou sèches.","Cornichons et olives dans petits bols. Noix et amandes dans les espaces. Pain coupé, crackers sur le côté. Miel et confitures en petits pots."]}]},{"cat":"POISSONS FUMÉS MARINÉS ET CRUS","emoji":"🌊","items":[{"n":"Gravlax Saumon Aneth Scandinave","d":"Saumon mariné à sec sel-sucre-aneth, jamais cuit, tranché fin sur pumpernickel","i":["1kg filet de saumon avec peau","100g sel, 100g sucre","Grande botte d'aneth","1 c.s poivre noir concassé, 1 c.s aquavit ou vodka","Sauce moutarde-aneth: moutarde de Dijon, moutarde douce, sucre, vinaigre, huile, aneth","Pumpernickel ou pain de seigle"],"s":["Mélanger sel, sucre, poivre, aneth.","Enduire le saumon des deux côtés. Mettre face à face avec aneth entre les deux moitiés. Poser un poids dessus.","Mariner 24-48h au frigo, retourner toutes les 12h.","Rincer, sécher, trancher très fin en biais.","Sauce moutarde-aneth et pumpernickel."]},{"n":"Ceviche Tiradito Poulpe Péruvien","d":"Poulpe cuit parfait tranché fin, leche de tigre ají amarillo, huile rocoto, choclo","i":["1 poulpe cuit tendre","Leche de tigre: citron vert, ají amarillo, gingembre, ail, céleri, poisson","Huile de rocoto: piment rocoto rouge, huile","Choclo (maïs péruvien) cuit, cancha (maïs toasté), oignons rouges"],"s":["Cuire le poulpe: infusé dans eau et aromates 45-60 min. Refroidir, couper en tranches fines.","Préparer la leche de tigre mixée et filtrée.","Huile de rocoto: mixer et filtrer.","Dresser les tranches de poulpe en éventail.","Napper de leche de tigre, huile rocoto, choclo, cancha, oignons."]},{"n":"Escabeche de Sardines","d":"Sardines frites puis marinées vinaigre-légumes-épices, servies froides","i":["600g sardines fraîches entières","Farine pour paner","100ml huile d'olive","Marinade: 200ml vinaigre de vin blanc, 100ml huile, 2 oignons, 4 gousses ail, 1 carotte, poivrons, laurier, thym, safran"],"s":["Vider et paner les sardines de farine. Frire à l'huile d'olive 3 min par face.","Poser dans un plat.","Faire revenir légumes en julienne dans l'huile.","Ajouter vinaigre et épices, porter à ébullition 5 min.","Verser chaud sur les sardines. Refroidir, mariner 24h minimum. Meilleur froid avec pain grillé."]},{"n":"Maquereau Fumé Maison","d":"Filets de maquereau saumurés puis fumés à chaud, rémoulade ciboulette","i":["4 maquereaux frais en filets","Saumure: 1 litre eau, 100g sel, 50g sucre, laurier, poivre","Copeaux de bois de pommier","Rémoulade: mayo, moutarde, ciboulette, câpres, cornichons, citron"],"s":["Saumurer les filets 2h.","Rincer, sécher sur grille 1h (peau sèche = meilleure fumée).","Fumage à chaud: 80°C avec copeaux humides 45-60 min.","Rémoulade ciboulette fraîche.","Dresser sur toast pain de seigle, rémoulade, échalotes."]},{"n":"Ceviche Bar Classique","d":"Bar frais mariné citron vert, oignon rouge, ají amarillo, maïs crunchy, patate douce","i":["400g bar en dés grade sashimi","Jus de 6 citrons verts","1 oignon rouge très finement émincé","2 c.s ají amarillo (piment jaune péruvien)","Coriandre fraîche, sel, glaçons","Maïs cancha grillé, patate douce cuite"],"s":["Mélanger le bar, citron vert, sel. Mariner 3-5 min seulement.","Ajouter oignon rouge, ají amarillo, coriandre.","Goûter et ajuster l'acidité et le sel.","Dresser dans assiette froide.","Cancha et patate douce en accompagnement. Manger immédiatement."]}]},{"cat":"PÂTISSERIE STREET ET FINE","emoji":"🎂","items":[{"n":"Canelé Bordelais Authentique","d":"Croûte laquée caramélisée, coeur moelleux vanille-rhum, moule cuivre beurré","i":["500ml lait entier","50g beurre, 2 oeufs, 2 jaunes","200g sucre, 100g farine","1 c.s rhum brun","1 c.c extrait vanille","Cire d'abeille et beurre pour moules"],"s":["Faire bouillir lait, beurre, vanille, laisser tiédir.","Mélanger sucre et farine, incorporer les oeufs.","Verser le lait chaud progressivement. Ajouter rhum, mélanger.","Laisser reposer au frigo 24h minimum.","Beurrer les moules, remplir aux 2/3. Cuire à 250°C 10 min puis 190°C 50 min. Démouler chaud sur grille."]},{"n":"Eclair au Café Moderne","d":"Pâte à choux parfaite, crème légère café, glaçage miroir café, feuille or","i":["Pâte choux: 250ml eau, 100g beurre, 150g farine, 4 oeufs","Crème café: 500ml lait, 4 jaunes, 100g sucre, 40g maïzena, 3 c.s café soluble, 200ml crème fouettée","Glaçage: fondant blanc et café fort pour teinter"],"s":["Pâte à choux classique, coucher en bandes de 12cm. Cuire à 200°C 25-30 min.","Crème pâtissière café, refroidir, alléger avec crème fouettée.","Farcir les éclairs via poche par un trou dessous.","Glacer avec fondant café, lisser.","Décorer avec éclats de café ou feuille d'or."]},{"n":"Soufflé au Chocolat Minute","d":"Base chocolat montée blancs, cuit 12 min, servi immédiatement, coeur coulant","i":["100g chocolat 70%","50g beurre","4 jaunes, 4 blancs d'oeufs","80g sucre, 30g farine","Cacao en poudre, beurre pommade pour ramequins"],"s":["Beurrer ramequins, saupoudrer cacao, réfrigérer.","Fondre chocolat et beurre.","Monter blancs en neige avec sucre.","Mélanger jaunes dans chocolat, farine. Incorporer blancs délicatement.","Remplir les ramequins aux 3/4. Cuire à 180°C 12 min exactement. Servir dans les 2 minutes."]},{"n":"Millefeuille Caramel Salé","d":"Feuilletage inversé ultra-croustillant, crème légère caramel beurre salé","i":["Feuilletage inversé: beurrage 400g beurre et 150g farine / détrempe 250g farine, 7g sel, 100ml eau, 100g beurre fondu","Crème caramel salé: caramel, crème, beurre demi-sel, crème pâtissière, crème fouettée","Sucre glace caramélisé dessus"],"s":["Feuilletage inversé: 6 tours, réfrigérer entre chaque.","Étaler, piquer, saupoudrer sucre, caraméliser au four à 210°C 15 min.","Couper en rectangles nets.","Préparer crème caramel beurre salé légère.","Monter le millefeuille: 3 couches de pâte, 2 couches de crème. Sucre glace et traits de caramel."]},{"n":"Paris-Brest Pralinée Maison","d":"Chou en couronne, mousseline pralinée noisette, noisettes entières caramélisées","i":["Pâte choux","Amandes effilées","Pralinée: 200g noisettes grillées, 200g sucre caramélisé, mixés","Mousseline: crème pâtissière, beurre pommade, pralinée","Sucre glace"],"s":["Coucher la pâte choux en couronne, amandes effilées, cuire à 200°C 30 min.","Préparer le praliné maison.","Incorporer praliné dans la crème pâtissière froide, monter avec beurre pommade.","Couper la couronne, pocher la mousseline pralinée généreusement.","Noisettes caramélisées dessus, sucre glace."]},{"n":"Tarte au Citron Meringuée","d":"Fond sablé breton, crème citron intense, meringue italienne brûlée","i":["Pâte sablée: 200g farine, 100g beurre, 60g sucre glace, 1 jaune","Crème citron: 150ml jus citron, 150g sucre, 3 oeufs, 100g beurre","Meringue italienne: 150g sucre, 50ml eau, 3 blancs d'oeufs"],"s":["Foncer le moule, cuire à blanc à 180°C 15 min.","Crème citron: cuire jus, sucre, oeufs au bain-marie jusqu'à épaississement, monter au beurre.","Verser sur le fond refroidi. Réfrigérer 2h.","Meringue italienne: sirop à 121°C versé sur blancs montés.","Pocher la meringue, brûler au chalumeau."]}]},{"cat":"SAUCES ET CONDIMENTS ICONIQUES","emoji":"🌶️","items":[{"n":"Salsa Macha Mexicaine Premium","d":"Huile chile infusée avec cacahuètes, ail frit, anchois — le condiment ultime","i":["150ml huile végétale neutre","50g piments ancho et guajillo séchés","30g cacahuètes, 6 gousses ail","2 filets anchois","2 c.s graines sésame","1 c.s vinaigre de pomme, sel"],"s":["Frire l'ail dans l'huile jusqu'à doré, retirer.","Frire les piments réhydratés 30 secondes, retirer.","Frire cacahuètes jusqu'à dorées. Frire les anchois jusqu'à dissous.","Mixer tout ensemble avec le vinaigre et sel.","Texture doit être chunky, pas lisse. Se conserve 1 mois au frigo."]},{"n":"Harissa Maison Tunisienne","d":"Pâte de piments rouges séchés, carvi, coriandre, huile olive — rouge profond","i":["100g piments rouges séchés","6 gousses ail","1 c.s carvi, 1 c.s coriandre, 1 c.c cumin","Huile olive, sel"],"s":["Réhydrater les piments 30 min dans l'eau chaude, égoutter.","Griller les épices entières à sec.","Mixer piments, ail, épices moulues.","Incorporer l'huile olive en filet — pâte épaisse.","Saler, ajuster. Couvrir d'huile. Reposer 24h avant utilisation."]},{"n":"Toum Libanais Ail Pur","d":"Émulsion pur ail blanche et aérée, technique précise, accompagne tout le Moyen-Orient","i":["1 tête ail entière pelée","200ml huile de tournesol ou huile légère","Jus de 2 citrons, sel, 2 c.s eau froide"],"s":["Blender ou robot: mixer l'ail avec sel jusqu'à pâte.","Ajouter huile en tout petit filet en mixant — comme une mayo.","Alterner huile et jus de citron.","Si ça coupe: recommencer avec 1 gousse et incorporer progressivement.","Doit être blanc, aéré, épais comme une crème. Réfrigérer 1h avant de servir."]},{"n":"Romesco Sauce Catalogne","d":"Poivrons rôtis et noisettes et amandes et tomates et ñora, vinaigrette épaisse","i":["3 poivrons rouges rôtis","4 tomates rôties","50g amandes, 50g noisettes torréfiées","3 gousses ail rôties","2 piments ñora réhydratés","3 c.s huile olive","1 c.s vinaigre de xérès, sel"],"s":["Rôtir les poivrons, tomates, ail directement à la flamme ou au four.","Torréfier les fruits secs.","Mixer fruits secs en premier jusqu'à sableux.","Ajouter poivrons, tomates, ail, ñora.","Incorporer huile et vinaigre en mixant. Texture épaisse et granuleuse. Accompagne les grillades."]},{"n":"XO Sauce Cantonaise Premium","d":"Pétoncles séchés et jambon et crevettes et piment et ail, le condiment umami ultime","i":["100g pétoncles séchés (conpoy)","100g crevettes séchées","100g jambon Jinhua ou jambon sec","6 gousses ail, 4 échalotes, 4 piments rouges","100ml huile végétale","1 c.s sucre, sauce de poisson"],"s":["Réhydrater pétoncles et crevettes 2h, effiler les pétoncles.","Hacher grossièrement tous les ingrédients.","Frire pétoncles et crevettes dans huile jusqu'à croustillants.","Ajouter ail, échalotes, piment, cuire 15 min à feu doux.","Jambon, sucre, sauce de poisson. La sauce doit être sèche et friable. Se conserve 3 mois."]},{"n":"Nam Jim Jaew Sauce BBQ Thaï","d":"Sauce trempette grillades thaïe: tamarinde-poisson-khao khua-piment","i":["3 c.s pâte tamarin","2 c.s sauce de poisson","1 c.s sucre de palme","2 c.s khao khua (riz torréfié moulu grossier)","2 c.s piment séché en flocons","2 échalotes émincées, coriandre, oignon vert"],"s":["Mélanger tamarin, sauce poisson, sucre jusqu'à dissolution.","Ajuster l'équilibre: doit être acide-sucré-salé.","Ajouter piment séché et échalotes.","Khao khua en dernier.","Herbes fraîches. Servir avec grillades, surtout le moo ping (porc grillé)."]}]},{"cat":"RIZ ET CÉRÉALES DU MONDE","emoji":"🍚","items":[{"n":"Paella Valenciana Authentique","d":"Riz bomba, poulet et lapin, haricots plats, safran, socarrat (croûte), pas de fruits de mer","i":["400g riz bomba","1/2 poulet, 1/2 lapin en morceaux","200g garrofó ou lima bean","200g haricots plats verts","4 tomates râpées","Safran, romarin, paprika doux","1 litre bouillon, huile d'olive, sel"],"s":["Saisir viandes dans l'huile jusqu'à très dorées dans la paellera.","Ajouter haricots, cuire 5 min. Tomates râpées et paprika, cuire 10 min.","Ajouter bouillon et safran. Riz réparti uniformément.","Ne plus remuer. Cuire 18-20 min.","Les 3 dernières minutes: feu fort pour le socarrat (croûte caramélisée). Repos 5 min."]},{"n":"Riz Persan Tahdig Croûte Dorée","d":"Riz basmati vapeur à la croûte de riz-yaourt dorée renversée, safran, barberries","i":["400g riz basmati long trempé 1h","Safran infusé dans eau chaude","200g yaourt pour la croûte de fond (tahdig)","50g beurre","Zereshk (barberries) ou airelles séchées","Amandes effilées, pistaches"],"s":["Cuire le riz parboiled 7 min, égoutter.","Mélanger yaourt, safran, sel au fond de la casserole.","Poser le riz par-dessus en dôme, percer des trous pour vapeur.","Couvrir d'un torchon sous le couvercle, cuire à feu doux 45 min.","Retourner d'un coup sur plat de service. La croûte doit être parfaitement dorée. Garnir barberries, amandes, pistaches, safran."]},{"n":"Pilaf Agneau Ouzbek Osh Plov","d":"Le plat national: agneau et carottes et riz dans la grande chaudière, ail entier","i":["500g épaule d'agneau en cubes","500g riz devzira ou riz à grains courts","400g carottes en julienne épaisse","2 oignons","1 tête d'ail entière non épluchée","Huile, cumin, sel"],"s":["Chauffer beaucoup d'huile dans chaudron.","Frire les oignons jusqu'à brun foncé.","Ajouter agneau, saisir fort. Carottes en julienne, cuire 10 min.","Eau bouillante pour couvrir, cumin, sel, mijoter 40 min.","Riz rincé par-dessus, enfoncer tête d'ail au milieu. Cuire 20 min couverts puis 10 min vapeur. Retourner sur grand plat."]},{"n":"Arroz con Pollo Latino","d":"Riz cuit directement dans le bouillon de poulet épicé, sofrito, olives, câpres","i":["1 poulet découpé","300g riz long grain","Sofrito: oignons, poivrons, tomates, ail, coriandre","Sazón: cumin, origan, achiote, sel","200ml bouillon de poulet","Olives vertes, câpres, petits pois"],"s":["Saisir le poulet, réserver.","Faire le sofrito dans le même fond.","Ajouter riz, faire revenir 2 min.","Bouillon, sazón, poulet. Cuire à couvert 20 min.","Olives, câpres, petits pois les 5 dernières minutes. Servir dans la cocotte."]},{"n":"Congee Thaï Khao Tom Premium","d":"Bouillie de riz dashi léger, oeuf cru, gingembre frit, ciboule, sauce poisson","i":["200g riz blanc cuit","600ml bouillon de poulet léger","2 oeufs frais","Gingembre en julienne frit croustillant","Ciboule émincée","Sauce de poisson, piment frais tranché, céleri chinois"],"s":["Cuire le riz dans le bouillon jusqu'à texture bouillie crémeuse.","Verser brûlant dans bol.","Casser l'oeuf cru immédiatement dans le bol chaud (il cuit légèrement).","Gingembre frit croustillant dessus.","Sauce de poisson, ciboule, céleri, piment frais. Mélanger à table."]}]},{"cat":"BURGERS DU MONDE","emoji":"🍔","items":[{"n":"Jucy Lucy Minneapolis","d":"Burger avec le fromage FONDU À L'INTÉRIEUR de la viande — attention brûlure garantie","i":["400g boeuf haché 80/20","100g American cheese ou Velveeta en dés","Sel, poivre","Buns briochés","Oignons grillés, ketchup, moutarde"],"s":["Former 4 galettes fines.","Poser des dés de fromage sur 2 galettes.","Couvrir avec les 2 autres galettes, sceller hermétiquement les bords.","Griller sur plancha 4 min par face — le fromage fond à l'intérieur.","Attention: laisser reposer 2 min avant de mordre, le fromage est à 90°C."]},{"n":"Oklahoma Onion Smash Burger","d":"Oignons blancs émincés écrasés directement dans la viande sur la plancha","i":["300g boeuf haché 80/20 en boules","2 oignons blancs très finement émincés","Sel, cheddar américain","Buns, mayo, cornichons, moutarde jaune"],"s":["Poser une boule de boeuf sur plancha brûlante.","Couvrir d'oignons émincés, écraser fort.","Les oignons cuisent entre la viande et la spatule.","Sel, 2 min sans bouger.","Retourner, cheddar immédiatement. Bun grillé, mayo, cornichons, moutarde."]},{"n":"Burger Indien Aloo Tikki","d":"Galette pomme de terre épicée à la place du boeuf, chutney, raita","i":["500g pommes de terre cuites écrasées","Épices: cumin, coriandre, garam masala, piment, amchur","Chapelure pour tenir","Chutney tamarin","Raita: yaourt, concombre, cumin, menthe","Oignon rouge, tomate, laitue","Buns briochés"],"s":["Mélanger purée, épices, chapelure, former des galettes épaisses.","Poêler dans ghee 3 min par face jusqu'à croûte dorée.","Préparer le raita.","Assembler: bun, raita, laitue, aloo tikki, oignon rouge, tomate, chutney tamarin."]},{"n":"Burger Libanais Kafta","d":"Kafta agneau-persil-oignon grillée, hummus, toum, salade fraîche","i":["400g agneau haché","1 oignon mixé, grande botte de persil haché","Épices: cumin, cannelle, 7 épices, piment","Hummus maison, toum","Pain pita ou bun plat","Tomate, oignon, laitue"],"s":["Mélanger agneau, oignon, persil, épices, former des galettes.","Griller sur plancha ou braise 4 min par face.","Pain pita légèrement grillé.","Étaler hummus sur la base, toum sur le chapeau.","Laitue, tomate, oignon, kafta. Quelques gouttes de citron."]},{"n":"Butter Burger Wisconsin","d":"Burger simple avec une noix de beurre froid posée sur la galette chaude","i":["400g boeuf haché","50g beurre de qualité","Sel, poivre","Oignons frits","Buns mous, cornichons"],"s":["Galette classique, assaisonner généreusement.","Griller 3 min par face sur plancha chaude.","Poser une noix généreuse de beurre froid sur la galette chaude hors feu.","Le beurre fond lentement.","Bun mou légèrement grillé, cornichons, oignons frits."]},{"n":"Smash Burger Sauce Secrète","d":"Boeuf écrasé plancha, double cheddar fondu, sauce secrète maison, pickles","i":["300g boeuf 80/20 en boules de 75g","4 tranches cheddar américain","Sauce: 4 c.s mayo, 2 c.s ketchup, 1 c.s moutarde jaune, cornichons hachés, oignon, vinaigre","Laitue iceberg, oignons blancs, cornichons","Bun graines de sésame"],"s":["Smash les 4 galettes sur plancha brûlante. 2 min par face.","Cheddar sur chaque galette.","Préparer la sauce en mélangeant tous les ingrédients.","Double stack: pain bas, sauce, laitue, oignons, cornichons, 2 galettes avec cheddar, sauce, pain haut."]}]},{"cat":"SOUPES & BOUILLONS STREET","emoji":"🍲","items":[{"n":"Pho Bo Vietnamien","d":"Bouillon boeuf longuement mijoté épices grillées, nouilles riz, tranches de boeuf cru","i":["2kg os à moelle et carcasse boeuf","Épices: étoiles d'anis, cannelle, clous girofle, cardamome grillés à sec","1 oignon brûlé, 1 gingembre brûlé","Sauce de poisson, sel, sucre","Nouilles pho fraîches ou sèches","Boeuf: filet tranché très fin (cru), boeuf bien cuit","Garnitures: basilic thaï, menthe, germes soja, jalapeño, citron vert"],"s":["Blanchir les os 5 min, rincer, cuire proprement dans eau froide avec épices grillées, oignon et gingembre brûlés.","Mijoter 6-8h à frémissements. Filtrer soigneusement.","Assaisonner avec sauce de poisson, sel, sucre.","Cuire les nouilles selon le paquet.","Dresser: nouilles chaudes, tranches de boeuf cru (elles cuisent dans le bouillon brûlant), napper de bouillon. Garnitures à côté."]},{"n":"Tom Yum Kung Thaï","d":"Bouillon pimenté-acidulé citronnelle-galangal, crevettes, champignons, lait de coco en option","i":["500ml bouillon de poulet","2 tiges citronnelle","3 feuilles kaffir lime","3 tranches galangal","200g crevettes","100g champignons de paille","3-4 piments thaï","3 c.s sauce de poisson","3 c.s jus de citron vert","1 c.c sucre","Coriandre"],"s":["Porter le bouillon à ébullition avec citronnelle, kaffir lime, galangal, piments.","Infuser 5 min.","Ajouter champignons, cuire 3 min.","Ajouter crevettes, cuire 2 min.","Hors feu: sauce de poisson, citron vert, sucre. Coriandre fraîche."]},{"n":"Ramen Tonkotsu Fukuoka","d":"Bouillon porc crémeux opaque 12h, nouilles fines, chashu, gingembre mariné","i":["2kg os de porc (pieds, échine)","Tare shio: sel, mirin, saké","Ramen fins et droits style Hakata","Chashu poitrine","Champignons noirs, gingembre mariné beni shoga","Nori, oignons verts, sésame"],"s":["Blanchir les os, puis cuire à gros bouillons 12h en ajoutant de l'eau.","Le bouillon doit être blanc laiteux et crémeux.","Assaisonner avec la tare shio.","Cuire les ramen ultra fins 90 secondes seulement.","Dresser avec chashu, nori, gingembre, oignons verts. Sésame."]},{"n":"Soto Ayam Indonésien","d":"Bouillon poulet doré épices jaunes kunyit, nouilles de verre, oeufs durs, chips","i":["1 poulet entier","Pâte épice: curcuma, galangal, citronnelle, ail, échalotes, noix de macadamia","Feuilles de kaffir lime, feuilles salam","Vermicelles de verre","Oeufs durs, tomates cerises, oignons frits","Bawang goreng (oignons frits), krupuk (chips crevettes)"],"s":["Cuire le poulet avec la pâte épice et aromates.","Le bouillon doit être jaune doré.","Effilocher le poulet.","Préparer les vermicelles.","Dresser: vermicelles, poulet effiloché, oeuf dur, tomate, bouillon. Oignons frits et krupuk dessus."]},{"n":"Bun Bo Hue Vietnamien Épicé","d":"Bouillon citronelle-crevettes fermentées-piment, nouilles rondes épaisses, porc et boeuf","i":["Os de porc et boeuf pour bouillon","Pâte annatto et crevettes fermentées mam ruoc","Citronnelle, sauce de poisson","Nouilles bun bo épaisses rondes","Porc effiloché, tranche de boeuf, sang cuit en option","Banane fleur, germes, menthe, piment"],"s":["Mijoter bouillon de porc et boeuf 4h.","Ajouter annatto pour la couleur rouge, crevettes fermentées, citronnelle.","Ajuster avec sauce de poisson et sucre.","Cuire les nouilles rondes.","Dresser avec viandes variées, napper de bouillon rouge brûlant. Garnitures fraîches à côté."]},{"n":"Borsch Ukrainien Traditionnel","d":"Soupe betteraves-chou-pommes de terre-boeuf, smetana (crème), aneth","i":["500g betteraves râpées","1/4 chou blanc émincé","2 pommes de terre en dés","200g boeuf en cubes cuit","1 oignon, 2 carottes, 3 tomates","Vinaigre, sucre, sel","Smetana ou crème fraîche, aneth frais"],"s":["Faire revenir oignons, carottes, betteraves dans l'huile.","Ajouter tomates, vinaigre, sucre, mijoter 10 min.","Mouiller avec bouillon de boeuf.","Ajouter chou et pommes de terre, cuire 20 min.","Ajouter le boeuf cuit. Servir avec smetana et aneth."]},{"n":"Pozole Rojo Mexicain","d":"Soupe maïs hominy-porc-chile rouge, garnitures croquantes, origan","i":["1 tête de porc ou épaule 1kg","500g maïs hominy en boîte","5 piments guajillo réhydratés, 3 ancho","Ail, origan mexicain, sel","Garnitures: chou ciselé, radis, oignon, origan, citron vert, tortillas chips, crème"],"s":["Cuire la viande de porc jusqu'à très tendre, effilocher.","Mixer les piments guajillo et ancho réhydratés avec ail.","Frire la sauce piment dans l'huile 5 min.","Ajouter bouillon de cuisson du porc, hominy, viande.","Cuire 20 min. Servir avec toutes les garnitures en accompagnement."]}]},{"cat":"TACOS & ANTOJITOS MEXICAINS AVANCÉS","emoji":"🌽","items":[{"n":"Gorditas de Chicharrón","d":"Galettes de masa épaisses frites ouvertes, farcie chicharrón en salsa verde","i":["Masa: 2 tasses masa harina, eau, sel, saindoux","Chicharrón (couenne de porc frite) en morceaux","Salsa verde: tomatillos, jalapeño, ail, coriandre","Crème fraîche, fromage frais émietté, oignons"],"s":["Pétrir la masa avec eau, sel, saindoux jusqu'à souple.","Former des disques épais de 1cm.","Frire dans saindoux chaud à 180°C 4-5 min par face.","Égoutter, fendre en poche.","Farcir de chicharrón baigné dans salsa verde chaude. Crème et fromage dessus."]},{"n":"Tlayuda Oaxaqueña","d":"Grande tortilla cuite à sec jusqu'à semi-croustillante, haricots asientos, tasajo","i":["Grande tortilla de maïs (30cm)","Haricots noirs refrits avec asientos (gras de chicharrón)","150g tasajo (boeuf séché oaxaqueño) ou cecina","100g quesillo (fromage Oaxacan) effiloché","Feuilles de laitue, tomates, avocat","Salsa verde ou roja"],"s":["Cuire la tlayuda sur comal jusqu'à semi-croustillante avec quelques bulles.","Étaler une couche généreuse de haricots chauds.","Griller le tasajo à part sur braise.","Poser le fromage effiloché sur les haricots chauds (il fond légèrement).","Garnir de laitue, tomates, avocat. Tasajo par-dessus. Salsa."]},{"n":"Enfrijoladas Oaxaca","d":"Tortillas trempées sauce haricots noirs, poulet effiloché, crème, fromage","i":["8 tortillas maïs","Sauce: 400g haricots noirs cuits mixés avec chipotle, ail, bouillon","200g poulet effiloché cuit","Crème fraîche, fromage frais","Oignons rouges, coriandre"],"s":["Mixer les haricots avec chipotle, ail, eau jusqu'à sauce lisse.","Chauffer la sauce dans une casserole.","Tremper chaque tortilla dans la sauce chaude 10 secondes.","Plier ou rouler avec poulet effiloché à l'intérieur.","Napper de reste de sauce, crème fraîche, fromage, oignons rouges, coriandre."]},{"n":"Sopes con Todo","d":"Galettes épaisses bords relevés, haricots, viande, laitue, salsa, crème","i":["Masa: masa harina, eau, sel","Haricots noirs refrits","Viande: picadillo, chorizo ou tinga","Laitue ciselée, tomates, crème, fromage frais","Salsa verde et salsa roja"],"s":["Pétrir la masa, former des disques épais.","Cuire sur comal sec 3 min par face.","Encore chaud: pincer les bords pour créer les parois du sope.","Frire légèrement dans huile pour croustiller.","Couche haricots, viande, laitue, tomates, salsa, crème, fromage."]},{"n":"Esquites (Maïs en Verre)","d":"Maïs en grains servi dans verre avec mayo, citron, chile piquin, fromage, hot sauce","i":["4 épis de maïs cuits et égrainés","2 c.s epazote","Sel, chile piquin en poudre","Mayo","Fromage cotija ou feta émietté","Jus de citron vert","Hot sauce type Valentina"],"s":["Faire griller les grains de maïs dans une poêle très chaude à sec ou avec un peu de beurre.","Ajouter epazote, sel, cuire 5 min.","Verser dans verres individuels.","Ajouter mayo, jus de citron, chile piquin, fromage.","Hot sauce dessus. Mélanger et manger avec petite cuillère."]},{"n":"Huaraches de Nopal","d":"Grande semelle de masa allongée grillée, cactus nopal, chorizo, fromage","i":["Masa: 2 tasses masa harina, eau, sel, haricots refrits incorporés","Nopal (cactus) coupé en dés et grillé","Chorizo mexicain cuit","Fromage Oaxacan ou mozzarella","Salsa verde, crème, oignons"],"s":["Pétrir la masa avec haricots incorporés dedans pour couleur et saveur.","Former une semelle allongée de 20cm.","Cuire sur comal à sec 5 min par face.","Griller le nopal à sec jusqu'à mucilage évaporé.","Garnir: nopal, chorizo, fromage fondu, salsa, crème."]},{"n":"Tamales Oaxaqueños Mole Negro","d":"Masa de maïs nixtamalisé, garni poulet au mole negro, enveloppé feuille de bananier","i":["Masa tamale: 500g masa harina, 250g graisse végétale ou saindoux, bouillon, sel, levure chimique","Mole negro: 30 ingrédients — chiles mulato, pasilla, chihuacle negro, épices, chocolat noir, tomate","200g poulet cuit effiloché","Feuilles de bananier"],"s":["Fouetter la graisse, incorporer la masa progressivement avec bouillon jusqu'à pâte aérée.","Tester: une boule de masa doit flotter dans eau froide.","Étaler sur feuille de bananier ramollie sur flamme.","Farcir de poulet dans le mole.","Refermer, attacher. Cuire vapeur 1h15 min."]},{"n":"Quesillo Frit Oaxaca","d":"Fromage Oaxacan effiloché en boule, frit croustillant, mole negro, chips tostadas","i":["200g fromage Oaxacan (quesillo) en boule","Farine, oeuf, panko pour paner","Mole negro ou colorado","Salsa verde","Tostadas ou chips"],"s":["Effilocher le fromage et le reformer en boule compacte.","Réfrigérer 1h pour solidifier.","Paner: farine, oeuf, panko.","Frire à 180°C 2-3 min — juste pour la croûte, pas fondre.","Servir immédiatement avec mole chaud, salsa, tostadas."]}]},{"cat":"OFFAL & ABATS STREET PREMIUM","emoji":"🫀","items":[{"n":"Tripes à la Mode de Caen","d":"Tripes longtemps mijotées calvados-cidre-légumes, servies en cassolette","i":["1kg tripes de boeuf nettoyées","500ml cidre brut","100ml calvados","2 pieds de veau","Oignons, carottes, poireaux, bouquet garni","Sel, poivre, clous de girofle"],"s":["Blanchir les tripes, rincer abondamment.","Placer dans cocotte avec légumes, cidre, calvados, pieds de veau.","Cuire à feu doux 8-10h (four à 120°C idéalement).","Les tripes doivent être fondantes.","Servir en cassolette individuelle avec pain de campagne."]},{"n":"Foie de Veau Veneziana","d":"Fines tranches foie de veau, oignons confits al burro, vinaigre balsamique, sauge","i":["400g foie de veau tranché à 5mm","2 gros oignons blancs finement émincés","50g beurre, huile d'olive","2 c.s vinaigre balsamique","Feuilles de sauge fraîche","Sel, poivre blanc"],"s":["Confire les oignons dans beurre et huile à feu doux 30 min.","Sel léger, laisser fondre et blondir.","Monter le feu à vif, saisir les tranches de foie 1 min par face — cœur rosé.","Déglacer avec vinaigre balsamique.","Servir avec les oignons fondants et la sauge croustillante."]},{"n":"Rognons de Veau Moutarde","d":"Rognons sautés vifs, sauce moutarde de Dijon crème, persil, pain de campagne","i":["400g rognons de veau en dés de 2cm","2 c.s moutarde de Dijon","150ml crème fraîche","50ml cognac","Beurre, huile","Persil haché, sel, poivre"],"s":["Dégraisser et parer les rognons soigneusement.","Saisir à feu très vif dans beurre et huile par petites quantités.","Déglacer au cognac, flamber.","Ajouter crème et moutarde, réduire 2 min.","Persil haché. Servir immédiatement avec pain de campagne toasté."]},{"n":"Mollejas de Ternera Grillées","d":"Ris de veau grillés sur braise, chimichurri, citron, gremolata","i":["600g ris de veau","Court-bouillon: eau, vinaigre, oignons, laurier","Huile d'olive","Chimichurri: persil, origan, ail, piment, vinaigre, huile","Gremolata: zeste citron, persil, ail haché"],"s":["Tremper les ris dans eau froide 2h, changer l'eau 2 fois.","Court-bouillon 15 min, égoutter, presser entre deux assiettes avec poids jusqu'à refroidis.","Enlever les membranes, couper en tranches.","Badigeonner d'huile, griller sur braise vive 3-4 min par face.","Chimichurri et gremolata dessus."]},{"n":"Lengua de Res Tacos","d":"Langue de boeuf braisée 4h, tranchée fine en tacos, salsa verde, oignons","i":["1 langue de boeuf entière (1,5kg)","Aromates: oignons, ail, laurier, cumin, sel","Tortillas maïs","Salsa verde: tomatillos, jalapeño, ail, coriandre","Oignons blancs, coriandre, citron vert"],"s":["Cuire la langue dans eau avec aromates 3-4h jusqu'à très tendre.","Refroidir légèrement, peler la peau épaisse.","Trancher finement.","Poêler les tranches dans graisse de cuisson pour coloration.","Servir en tacos avec salsa verde, oignons blancs, coriandre, citron vert."]},{"n":"Cœur de Poulet Yakitori","d":"Cœurs de poulet sur brochettes grillés sauce tare, sansho","i":["400g cœurs de poulet nettoyés","Sauce tare: 100ml soja, 50ml mirin, 50ml saké, 1 c.s sucre (réduire de moitié)","Sansho (poivre japonais)","Oignons verts"],"s":["Nettoyer les cœurs, couper en deux dans la hauteur.","Enfiler 3-4 cœurs par brochette.","Griller sur braise chaude 2 min par face.","Badigeonner de sauce tare en alternant avec la cuisson.","Sansho et oignons verts."]},{"n":"Sesos de Res Brouillés","d":"Cervelle de boeuf saisie beurre noisette, oeufs brouillés, câpres, persil — tradition bistrot","i":["300g cervelle de boeuf","Court-bouillon avec vinaigre","50g beurre","4 oeufs","2 c.s câpres","Persil haché","Sel, poivre blanc"],"s":["Dégorger la cervelle 2h dans eau froide, nettoyer les membranes.","Pocher dans court-bouillon 15 min, égoutter.","Détailler en dés dans beurre noisette jusqu'à légère coloration.","Ajouter les oeufs battus, brouiller doucement.","Câpres, persil, servir sur toast."]},{"n":"Anticuchos Corazon Style Lima","d":"Cœur de boeuf mariné ají panca, sauce ají amarillo, maïs grillé, patate douce","i":["600g cœur de boeuf nettoyé","Marinade: 3 c.s ají panca pasta, cumin, vinaigre, ail, sel","Sauce: ají amarillo, crème, ail, huile","Choclo grillé, patate douce cuite"],"s":["Nettoyer et couper le cœur, mariner 4h.","Brochettes, griller très vif 2 min par face.","Mixer la sauce ají amarillo avec crème et ail.","Servir avec sauce, choclo, patate douce."]}]},{"cat":"PIZZA & FLATBREADS DU MONDE","emoji":"🍕","items":[{"n":"Pizza Napoletana DOC","d":"Pâte 72h fermentation, tomates San Marzano, fior di latte, basilic, four bois","i":["Pâte: 1kg farine W300, 650ml eau froide, 3g levure fraîche, 25g sel","Sauce: tomates San Marzano écrasées à la main, sel","Fior di latte (mozzarella fraîche)","Basilic frais, huile d'olive extra vierge"],"s":["Autolyse 30 min, incorporer levure et sel, pétrir jusqu'à lisse.","Bouler, réfrigérer 48-72h.","Tempérer 3h avant utilisation.","Étirer à la main (jamais au rouleau), sauce, mozzarella.","Four à 450°C+ (pierre) 60-90 secondes. Basilic et huile après cuisson."]},{"n":"Lahmacun Turc (Pizza Arménienne)","d":"Fine galette levée couverte de viande hachée épicée, roulée avec persil et citron","i":["Pâte fine: 300g farine, 7g levure, 150ml eau tiède, sel, huile","Garniture: 300g agneau haché, 2 tomates mixées, 1 oignon mixé, persil, paprika, piment, cumin","Persil frais, oignons rouges, jus de citron, sumac"],"s":["Pâte légèrement levée, étaler très finement.","Mixer la garniture jusqu'à presque pâte, étaler généreusement sur la pâte.","Cuire à 230°C 8-10 min.","Sortir du four, ajouter persil, oignons, citron.","Rouler la lahmacun sur elle-même et manger."]},{"n":"Manakish Za'atar","d":"Flatbread levé du matin au Liban, garni za'atar et huile d'olive, plié, mangé chaud","i":["Pâte: 500g farine, 7g levure, 280ml eau tiède, 2 c.s huile olive, 1 c.c sel","Za'atar: 4 c.s thym séché, 2 c.s sumac, 1 c.s graines sésame, 4 c.s huile olive","Option: fromage akawi ou feta mélangé à l'huile"],"s":["Pâte levée 1h.","Former des disques de 20cm.","Mélanger za'atar et huile olive généreusement.","Étaler sur la pâte jusqu'aux bords.","Cuire à 220°C 8-10 min. Plier en deux encore chaud."]},{"n":"Pide Turc Farci Viande Oeuf","d":"Barque de pâte levée, farce viande hachée épicée et poivrons, oeuf cassé dedans","i":["Pâte pide: farine, levure, lait, oeuf, beurre, sel","Farce: 400g boeuf ou agneau haché, oignons, poivrons, tomates, épices turques, persil","4 oeufs","Beurre fondu"],"s":["Pâte levée 1h.","Préparer la farce épicée.","Étaler la pâte en ovales allongés.","Garnir de farce au centre, relever les bords, pincer les extrémités.","Cuire à 200°C 10 min, casser un oeuf au centre, remettre 5 min."]},{"n":"Khachapuri Imeruli","d":"Version ronde de Géorgie de l'Ouest: fromage fondu à l'intérieur, pâte moelleuse","i":["Pâte: 400g farine, 7g levure, 200ml lait tiède, 1 oeuf, sel, sucre","400g imeruli cheese (ou suluguni, ou mozzarella et feta 50/50)","Beurre fondu"],"s":["Pâte levée 1h.","Former deux disques.","Mélanger le fromage, poser sur le premier disque.","Couvrir du deuxième disque, sceller les bords.","Cuire à 200°C 20-25 min. Badigeonner de beurre fondu immédiatement."]},{"n":"Musakhan Palestinien","d":"Grandes galettes taboun, poulet rôti sumac-oignons, noix de pin, huile d'olive intense","i":["Grandes galettes levées ou taboun bread","1 poulet entier découpé","4 gros oignons en rondelles","3 c.s sumac généreux","100ml huile d'olive","100g noix de pin grillées","Cannelle, sel, poivre"],"s":["Confire les oignons dans huile d'olive 30 min, ajouter sumac.","Enrober le poulet de sumac, oignons, épices.","Rôtir à 200°C 40 min.","Imbiber les galettes avec le jus d'oignons.","Poser les oignons sur les galettes, le poulet par-dessus, noix de pin. Passer 5 min au four."]},{"n":"Murtabak Sarawak Sucré","d":"Version sucrée: pâte fine beurre, garnie banane-chocolat-sucre condensé, pliée, grillée","i":["Pâte: farine, eau, beurre (même que murtabak salé)","Bananes écrasées","Chocolat haché ou pâte à tartiner","Lait concentré sucré","Beurre pour cuire"],"s":["Étirer la pâte très finement sur plan huilé.","Poser bananes écrasées et chocolat au centre.","Rabattre les côtés pour former un carré.","Cuire dans beurre 3 min par face jusqu'à doré et croustillant.","Verser lait concentré dessus, couper en carrés."]},{"n":"Roqaq (Pain Papier Émirat)","d":"Pain ultra-fin tradition Emirats cuit sur dôme, garni viandes ou miel camel","i":["Pâte: 500g farine, 300ml eau tiède, sel, 1 c.c levure","Garniture: viande hachée épicée bezar ou miel et fromage de chamelle"],"s":["Pâte très souple, reposer 30 min.","Étirer avec les mains sur dôme de cuisson ou plaque convexe.","Pâte doit être transparente.","Cuire 30-60 secondes seulement sur dôme chaud.","Garnir immédiatement de viande ou miel, plier."]}]},{"cat":"STREET FOOD FUSION ET CRÉATIVE","emoji":"⚡","items":[{"n":"Ramen Burger NYC","d":"Le bun est fait de ramen pressé et frit, galette boeuf, cheddar, sauce sriracha-mayo","i":["200g ramen cuits et refroidis mélangés à 1 oeuf battu","400g boeuf haché","Cheddar americain","Sriracha-mayo: mayo, sriracha, ail","Laitue, oignon"],"s":["Presser les ramen dans emporte-pièces ronds, réfrigérer 1h.","Frire les disques de ramen dans huile 2-3 min par face.","Former les galettes de boeuf, saisir.","Cheddar sur les galettes.","Assembler: bun ramen, sriracha-mayo, laitue, oignon, galette."]},{"n":"Birria Ramen Fusion","d":"Bouillon de birria comme base de ramen, tare birria, garnitures mexicaines et japonaises","i":["Bouillon birria: joue de boeuf, piments guajillo et ancho, épices","Ramen frais","Toppings: fromage Oaxacan effiloché, oignons blancs, coriandre","Nori, oeuf ramen","Huile de piment chili crisp","Citron vert"],"s":["Préparer la birria, réserver le consommé concentré.","Effilocher la viande, réserver.","Cuire les ramen.","Assaisonner le bouillon birria comme un bouillon de ramen.","Dresser ramen, birria effilochée, fromage, oignons, coriandre, nori, oeuf. Chili crisp et citron."]},{"n":"Korean-Mexican Kimchi Quesadilla","d":"Tortilla farcie kimchi-porc belly-fromage fondant, sauce gochujang-mayo","i":["Tortillas de farine","150g kimchi émincé et essoré","150g porc belly tranché cuit (ou chorizo)","150g mozzarella râpée","Sauce: mayo, gochujang, ail, citron","Oignons verts, sésame"],"s":["Mélanger kimchi et porc.","Chauffer la tortilla, parsemer de fromage sur une moitié.","Ajouter kimchi-porc sur le fromage.","Plier, griller à feu moyen 3 min par face jusqu'à croustillant.","Couper en triangles, sauce gochujang-mayo, oignons verts, sésame."]},{"n":"Okonomiyaki Taco Fusion","d":"L'okonomiyaki garni comme un taco mexicain: guac, pico, crème, chipotle","i":["Pâte okonomiyaki: farine, dashi, oeuf, chou","200g porc ou crevettes","Guacamole","Pico de gallo","Crème acidulée","Chipotle","Mayo Kewpie, sauce okonomiyaki"],"s":["Préparer l'okonomiyaki standard.","Au lieu des sauces japonaises classiques, servir avec garnitures mexicaines.","Guac d'un côté, pico de l'autre.","Trait de crème acidulée, chipotle fumé.","Mayo Kewpie pour la touche umami."]},{"n":"General Tso Cauliflower","d":"Chou-fleur frit croustillant, sauce General Tso sucrée-pimentée-collante, sésame","i":["1 chou-fleur en fleurettes","Pâte: farine de riz, maïzena, eau gazeuse, sel","Sauce General Tso: soja, vinaigre riz, sucre, bouillon, amidon, ail, gingembre, piment séché","Sésame, oignons verts"],"s":["Enrober les fleurettes dans pâte légère.","Frire à 180°C 4-5 min jusqu'à très croustillant.","Préparer la sauce: soja, vinaigre, sucre, bouillon, lier avec amidon.","Ajouter ail, gingembre, piment au dernier moment.","Toss le chou-fleur dans la sauce chaude. Sésame et oignons verts."]},{"n":"Bánh Mì Hot Dog","d":"Saucisse grillée dans baguette croustillante version bánh mì: pâté, pickles, jalapeño, coriandre","i":["4 saucisses grillées (viennoise ou hot dog de qualité)","4 petites baguettes croustillantes","Pâté de foie","Mayo","Pickles do chua (carottes et daikon)","Jalapeño, coriandre fraîche","Sauce hoisin","Oignons verts"],"s":["Griller les saucisses.","Ouvrir les baguettes, tartiner pâté d'un côté, mayo de l'autre.","Ajouter la saucisse.","Garnir de pickles do chua égouttés, jalapeño, coriandre.","Trait de sauce hoisin, oignons verts."]},{"n":"Truffle Mac Attack","d":"Mac and cheese luxe: fettuccines fraîches, 5 fromages, truffe noire, chips de parmesan","i":["200g fettuccines fraîches","Sauce: beurre, farine, lait, 100g gruyère, 100g cheddar, 50g fontina, 50g parmesan, 50g cream cheese","Truffe noire fraîche ou conserve","Chips de parmesan","Poivre blanc"],"s":["Cuire les fettuccines.","Béchamel aux 5 fromages, monter le fromage doucement.","Assaisonner poivre blanc.","Mélanger avec les pâtes.","Truffe noire généreusement râpée. Chips de parmesan pour le croustillant."]},{"n":"Croque Monsieur Kimchi","d":"Pain de mie, jambon, kimchi, gruyère fondu, béchamel — fusion Paris-Séoul","i":["Pain de mie","Jambon blanc","150g kimchi bien essoré et haché","Gruyère râpé","Béchamel: beurre, farine, lait, muscade","Beurre pour griller"],"s":["Préparer la béchamel.","Assembler: pain, béchamel, jambon, kimchi, gruyère, pain.","Tartiner béchamel sur le dessus et gruyère.","Griller dans beurre à feu moyen 3 min par face.","Finir sous le grill pour gratiner."]}]},{"cat":"SALADES & BOLS STREET PREMIUM","emoji":"🥗","items":[{"n":"Salade Thaï Larb de Porc","d":"Porc haché sauté et citronné, herbes fraîches, khao khua, piment, sans laitue","i":["400g porc haché","3 c.s jus de citron vert","2 c.s sauce de poisson","2 c.s khao khua (riz torréfié moulu)","4 piments thaï émincés","Oignons verts, échalotes, feuilles de menthe, coriandre","Salade en accompagnement pour wrapper"],"s":["Cuire le porc haché dans wok sans matière grasse jusqu'à cuit.","Hors feu: jus de citron, sauce de poisson, khao khua, piment.","Mélanger bien.","Ajouter herbes fraîches juste avant de servir.","Servir avec feuilles de salade pour envelopper."]},{"n":"Poke Bowl Saumon Premium","d":"Saumon mariné soja-sésame-gingembre, riz sushi, avocat, edamame, sauces diverses","i":["200g saumon sashimi en dés","Marinade: 2 c.s soja, 1 c.s huile sésame, 1 c.c gingembre, 1 c.c sirop d'érable","150g riz sushi","Garnitures: avocat, edamame, concombre, radis marinés, tobiko","Sauces: mayo sriracha, sauce ponzu","Furikake, oignons verts"],"s":["Mariner le saumon 15 min.","Assaisonner le riz sushi.","Dresser le riz en base dans bol.","Disposer les garnitures en sections autour.","Poser le saumon mariné au centre. Tobiko, furikake, oignons verts. Sauces à côté."]},{"n":"Som Tum Papaye Verte Thaï","d":"Papaye verte râpée et pilée au mortier avec piment, tamarin, sauce de poisson, crevettes séchées","i":["1 petite papaye verte râpée","4-6 piments thaï selon tolérance","2 c.s jus de tamarin","2 c.s sauce de poisson","1 c.s sucre de palme","1 c.s crevettes séchées","Tomates cerises, haricots longs, cacahuètes","Citron vert"],"s":["Mortier: piler les piments avec crevettes séchées.","Ajouter tomates et haricots, piler légèrement.","Incorporer tamarin, sauce de poisson, sucre — goûter et équilibrer.","Ajouter la papaye râpée, mélanger en pilant légèrement.","Cacahuètes concassées, citron vert."]},{"n":"Bibimbap Bol Coréen","d":"Riz chaud, légumes sautés assaisonnés, oeuf au plat, boeuf bulgogi, sauce gochujang","i":["Riz japonais cuit","Légumes: épinards, germes soja, courgette, champignons, carottes — chacun sauté séparément avec soja, sésame, ail","Bulgogi: 150g boeuf mariné soja-poire-sésame grillé","Oeuf au plat","
