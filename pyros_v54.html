e soja, sauce de poisson","Curry poudre, sel"],"s":["Chauffer la plaque ou wok très fort.","Sauter les légumes et poulet.","Ajouter les morceaux de roti, mélanger vigoureusement.","Pousser, brouiller les oeufs.","Soja, sauce de poisson, curry. Hacher et mélanger bruyamment — le son du kottu est une signature."]},{"n":"Baleadas Honduras","d":"Tortilla de farine grasse garnie haricots refrits, oeuf brouillé, crème, fromage","i":["4 grandes tortillas de farine épaisses (mantecadas)","400g haricots rouges refrits","4 oeufs brouillés","Mantequilla hondureña (crème épaisse locale) ou crème fraîche","Fromage hondureño ou feta émietté"],"s":["Chauffer la tortilla sur comal.","Étaler généreusement les haricots chauds.","Oeufs brouillés par-dessus.","Crème fraîche.","Fromage émietté. Plier en deux. Manger immédiatement."]},{"n":"Pão de Queijo Brésilien","d":"Petits pains fromage tapioca fondants et élastiques, spécialité Minas Gerais","i":["200g fécule de tapioca","100ml lait","50ml huile","1 oeuf","150g queijo minas ou emmental râpé","Sel"],"s":["Chauffer lait et huile jusqu'à frémissement, verser sur la fécule.","Mélanger, laisser tiédir.","Incorporer oeuf et fromage.","Faire des petites boules de 3cm.","Cuire à 180°C 20-25 min. Ils doivent gonfler et être dorés. Manger chaud: l'élasticité est signature."]},{"n":"Takoyaki Classique Osaka","d":"Boulettes poulpe dans pâte dashi moelleuse, 3 sauces, katsuobushi dansant","i":["Pâte: 150g farine, 2 oeufs, 500ml dashi, 1 c.s soja","200g poulpe cuit en dés de 1cm","Tenkasu, beni shoga (gingembre rouge mariné)","Sauce okonomiyaki, mayo Kewpie","Ao nori, katsuobushi"],"s":["Préparer la pâte dashi lisse.","Chauffer le moule takoyaki, huiler généreusement.","Remplir les cavités de pâte, déposer poulpe, tenkasu, beni shoga.","Tourner avec pics toutes les 2 min pour former des sphères.","Napper sauce, mayo Kewpie. Ao nori, katsuobushi qui danse."]},{"n":"Fritule Croates","d":"Petits beignets ronds avec zeste citron et orange, rhum, raisins secs, carnaval","i":["200g farine","1 c.c levure","2 oeufs","100ml rhum","Zeste 1 citron et 1 orange","50g raisins secs trempés rhum","2 c.s sucre, sel","Huile de friture","Sucre glace"],"s":["Mélanger farine, levure, sucre, sel.","Incorporer oeufs, rhum, zestes, raisins.","Pâte épaisse, reposer 30 min.","Frire par petites cuillerées à 170°C 3-4 min.","Sucre glace abondant. Tradition de carnaval en Croatie."]}]},{"cat":"BOWLS ET ASSEMBLAGES MODERNES","emoji":"🥣","items":[{"n":"Acai Bowl Brésilien Premium","d":"Açaï mixé congelé, granola, banane, fruits, lait de coco, miel","i":["200g pulpe d'açaï congelée","100ml lait de coco","1 banane congelée","Granola maison ou artisanal","Banane fraîche, fraises, myrtilles, kiwi","Miel, beurre de cacahuètes"],"s":["Mixer açaï, banane congelée, lait de coco jusqu'à texture crémeuse épaisse.","Ne pas trop diluer — doit tenir la cuillère.","Verser dans bol refroidi.","Granola, fruits frais disposés esthétiquement.","Filet de miel, trait de beurre de cacahuètes."]},{"n":"Buddha Bowl Équilibré","d":"Bol complet: céréales, légumineuses, légumes rôtis, protéine, sauce tahini","i":["Céréales: quinoa ou riz complet","Légumineuses: pois chiches rôtis épicés","Légumes rôtis: patate douce, brocoli, betterave","Protéine: oeuf mollet ou tofu","Sauce tahini: tahini, citron, ail, eau","Avocat, graines de chanvre, microgreens"],"s":["Rôtir les légumes à 200°C 25 min.","Rôtir les pois chiches épicés séparément.","Cuire les céréales.","Préparer la sauce tahini.","Dresser en sections: céréales centre, légumes colorés autour, protéine, pois chiches, sauce, microgreens."]},{"n":"Grain Bowl Méditerranéen","d":"Orge perlé, feta, olives, tomates confites, herbes, vinaigrette citron-origan","i":["200g orge perlé cuit","100g feta émiettée","Olives kalamata","Tomates cerises rôties","Concombre","Herbes: persil, menthe, aneth","Vinaigrette: huile olive, jus citron, origan, sel"],"s":["Cuire l'orge al dente.","Rôtir les tomates cerises 15 min avec huile et thym.","Préparer la vinaigrette.","Mélanger orge tiède avec vinaigrette.","Tomates rôties, feta, olives, concombre, herbes fraîches."]},{"n":"Smoothie Bowl Tropical","d":"Mangue-ananas-banane mixé épais, garnitures tropicales, granola coco","i":["1 mangue congelée","100g ananas congelé","1 banane congelée","100ml lait de coco","Granola noix de coco","Fruits frais: mangue, kiwi, ananas, maracuja","Noix de coco râpée torréfiée"],"s":["Mixer fruits congelés avec lait de coco — texture très épaisse.","Verser dans bol froid.","Granola coco, fruits frais en sections.","Noix de coco torréfiée.","Maracuja pour l'acidité finale."]},{"n":"Ceviche Bowl Peruvien","d":"Base patate douce-maïs, ceviche frais par-dessus, cancha, leche de tigre","i":["300g ceviche de bar (recette standard)","Patates douces cuites en dés","Maïs choclo","Cancha (maïs grillé croustillant)","Coriandre, oignons rouges","Leche de tigre en sauce"],"s":["Cuire les patates douces, refroidir.","Préparer le ceviche frais.","Dresser: patates douces en base.","Maïs choclo autour.","Ceviche au centre, leche de tigre versée, cancha, oignons, coriandre."]}]},{"cat":"SPÉCIALITÉS OUBLIÉES À RETROUVER","emoji":"💎","items":[{"n":"Suppli al Telefono Rome","d":"Arancino romain: risotto tomate-mozza dans chapelure, frit, fromage qui file","i":["400g risotto rouge (tomate) refroidi","200g mozzarella en bâtonnets de 4cm","2 oeufs, chapelure","Huile de friture","Sauce tomate pour servir"],"s":["Former des ovales de risotto avec un bâtonnet de mozza au centre.","Chaque supplì est ovale et allongé — pas sphérique comme l'arancino.","Paner oeuf puis chapelure.","Frire à 175°C 5-6 min jusqu'à brun foncé.","Couper en deux: le fromage file comme un téléphone (d'où le nom)."]},{"n":"Migas Espagnoles Charcuterie","d":"Pain rassis émietté sauté ail-huile, chorizo, panceta, raisins ou rondelles de melon","i":["300g pain de campagne rassis émietté","100g chorizo en dés","100g panceta ou lardons","4 gousses ail","Huile d'olive généreuse","Raisins ou melon pour l'accord sucré-salé","Paprika fumé"],"s":["Humidifier légèrement les miettes de pain.","Frire l'ail entier dans beaucoup d'huile.","Ajouter chorizo et panceta jusqu'à croustillant.","Incorporer le pain humide, sauter à feu vif en remuant.","Paprika fumé. Servir avec raisins frais — l'accord salé-sucré est essentiel."]},{"n":"Tostones Crujientes Cuba","d":"Plantain vert frit deux fois, aplati entre deux cuissons, sel ail, mojo cubain","i":["3 plantains verts fermes","Huile de friture ou arachide","Gros sel d'ail","Mojo cubain: ail, jus orange amère, huile olive, cumin, sel"],"s":["Couper les plantains en rondelles épaisses de 2,5cm.","Première friture 170°C 4 min — dorés mais pas croustillants.","Égoutter, écraser avec fond de verre ou tostonera.","Deuxième friture 185°C 2 min — vraiment croustillants.","Sel d'ail immédiat. Mojo cubain pour tremper."]},{"n":"Pâte à Choux Parisienne Street","d":"Gros choux nature fourrés chantilly vanille, glacés fondant blanc classique","i":["Pâte choux: 250ml eau, 100g beurre, 150g farine, 4 oeufs","Chantilly: 300ml crème entière, 50g sucre glace, 1 gousse vanille","Fondant blanc pour glacer","Sucre glace"],"s":["Pâte à choux classique, coucher de gros choux.","Cuire à 200°C 25-30 min sans ouvrir.","Refroidir complètement.","Fouetter la chantilly vanille ferme.","Couper le chapeau, fourrer de chantilly, glacer avec fondant blanc."]},{"n":"Ful Medames Égyptien","d":"Fèves cuites à l'huile ail-cumin-citron, oeuf dur, pain aish baladi, tradition du matin","i":["400g fèves en boîte ou sèches cuites","4 gousses ail écrasées","Jus de 2 citrons","4 c.s huile d'olive","1 c.c cumin moulu","Persil, piment","Oeufs durs","Pain baladi ou pita"],"s":["Égoutter les fèves, chauffer dans casserole.","Écraser grossièrement la moitié.","Ail écrasé, cumin, citron, huile d'olive.","Mijoter 5 min en mélangeant.","Servir avec oeufs durs, piment frais, persil, pain baladi. Plat du matin cairote."]},{"n":"Bánh Tráng Trộn Salade de Rue Saïgon","d":"Galettes de riz déchirées en morceaux avec tomates vertes, boeuf séché, sauce épicée","i":["8 galettes de riz trempées et déchirées","100g bò khô (boeuf séché épicé)","2 tomates vertes râpées","Crevettes séchées","Sauce: sauce de poisson, citron, sucre, ail, piment","Oignons verts frits, cacahuètes, herbes"],"s":["Tremper brièvement les galettes, déchirer en morceaux.","Mélanger avec boeuf séché, tomates vertes râpées, crevettes séchées.","Sauce pimentée-acidulée.","Mélanger avec les mains (tradition du street food Saïgon).","Oignons frits, cacahuètes, herbes fraîches."]},{"n":"Simit Sésame Istanbul","d":"Couronne de pain tartiné mélasse de raisin, roulée sésame, croustillante tendre","i":["300g farine forte","7g levure","180ml eau tiède","5g sel","1 c.s huile","Mélasse de raisin (pekmez) diluée 1:2 avec eau","100g graines de sésame"],"s":["Pâte levée 1h.","Former des boudins, joindre les extrémités en couronne.","Tremper chaque couronne dans la mélasse diluée.","Rouler immédiatement dans les graines de sésame.","Cuire à 220°C 15-20 min. Croustillant, sésame abondant."]},{"n":"Martabak Manis Indonésie","d":"Grande crêpe épaisse pliée fourrée chocolat-fromage-cacahuètes-lait condensé","i":["Pâte: 200g farine, 1 oeuf, 200ml lait, levure, sel, sucre","Garniture: chocolat Milo ou pépites, fromage cheddar râpé, cacahuètes, lait condensé","Beurre en quantité"],"s":["Pâte levurée, pousser 30 min.","Cuire dans grande poêle beurrée — galette épaisse.","Quand surface presque sèche, garnir généreusement de chocolat, fromage, cacahuètes.","Beurre dessus.","Plier en deux, couper en sections. Lait condensé sur le dessus."]},{"n":"Poori Indien Petit-Déjeuner","d":"Petit pain intégral frit qui gonfle en ballon, mangé avec aloo sabzi ou chutney","i":["200g farine complète (atta)","Eau pour pétrir","Sel","1 c.c huile dans la pâte","Huile de friture abondante","Aloo sabzi: pommes de terre épicées cumin-coriandre"],"s":["Pétrir la pâte très ferme, reposer 20 min."," let sf={view:'cat',catIdx:null,recIdx:null,mult:1,stepDone:{},timers:{},carIdx:0,q:''};

function sfOpen(){activeTab='__sf__';sf.view='cat';sf.q='';renderAll();}
function sfBack(){if(sf.view==='rec'){sf.view='cat';Object.values(sf.timers).forEach(t=>{if(t.iv)clearInterval(t.iv);});sf.timers={};sf.stepDone={};sf.mult=1;}else{goHome();}renderAll();}

function renderSF(c){
  const wrap=document.createElement('div');wrap.className='sf-wrap';
  // Header
  const hdr=document.createElement('div');hdr.className='sf-hdr';
  const back=document.createElement('button');back.className='sf-back';back.textContent='← Retour';back.onclick=sfBack;
  const title=document.createElement('div');title.className='sf-hdr-title';
  title.textContent=sf.view==='rec'?(SF_DATA[sf.catIdx].emoji+' '+SF_DATA[sf.catIdx].cat):'🍜 Street Food — 504 recettes';
  hdr.appendChild(back);hdr.appendChild(title);
  if(sf.view==='cat'){
    const srch=document.createElement('input');srch.className='sf-search';srch.placeholder='Rechercher...';srch.value=sf.q;
    srch.oninput=function(){sf.q=this.value;sfRenderCat(body);};
    hdr.appendChild(srch);
  }
  wrap.appendChild(hdr);
  const body=document.createElement('div');body.className='sf-body';
  if(sf.view==='cat')sfRenderCat(body);else sfRenderRec(body);
  wrap.appendChild(body);
  c.appendChild(wrap);
}

function sfRenderCat(body){
  body.innerHTML='';
  const q=sf.q.toLowerCase().trim();
  SF_DATA.forEach((cat,ci)=>{
    let items=cat.items;
    if(q)items=items.filter(r=>r.n.toLowerCase().includes(q)||r.d.toLowerCase().includes(q));
    if(!items.length)return;
    const lbl=document.createElement('span');lbl.className='sf-cat-lbl';
    lbl.textContent=cat.emoji+'  '+cat.cat+' ('+items.length+')';
    body.appendChild(lbl);
    const grid=document.createElement('div');grid.className='sf-grid';
    items.forEach(recipe=>{
      const ri=cat.items.indexOf(recipe);
      const card=document.createElement('div');card.className='sf-card';
      const photoKey='sf_photo_'+ci+'_'+ri;
      const savedPhoto=sfGetPhoto(photoKey);
      // Thumbnail
      const thumb=document.createElement('div');thumb.className='sf-card-thumb';
      if(savedPhoto){const im=document.createElement('img');im.src=savedPhoto;im.alt=recipe.n;thumb.appendChild(im);}
      else{const em=document.createElement('span');em.className='sf-thumb-emoji';em.textContent=cat.emoji;thumb.appendChild(em);}
      const addPhotoBtn=document.createElement('button');addPhotoBtn.className='sf-thumb-add';addPhotoBtn.textContent='+ Photo';
      addPhotoBtn.onclick=(e)=>{e.stopPropagation();sfOpenPhotoModal(photoKey,recipe.n,card,thumb,cat.emoji);};
      thumb.appendChild(addPhotoBtn);
      card.appendChild(thumb);
      const info=document.createElement('div');info.className='sf-card-info';
      info.innerHTML='<div class="sf-card-name">'+sfEsc(recipe.n)+'</div><div class="sf-card-desc">'+sfEsc(recipe.d)+'</div>';
      card.appendChild(info);
      card.onclick=(e)=>{if(e.target.classList.contains('sf-thumb-add')||e.target.closest('.sf-thumb-add'))return;sf.catIdx=ci;sf.recIdx=ri;sf.view='rec';sf.stepDone={};sf.timers={};sf.mult=1;sf.carIdx=0;renderAll();};
      grid.appendChild(card);
    });
    body.appendChild(grid);
  });
}

function sfRecipeKey(){return 'rec_'+sf.catIdx+'_'+sf.recIdx;}
function sfGetPhotos(){
  var key=sfRecipeKey();
  if(state.sfPhotos&&state.sfPhotos[key]&&state.sfPhotos[key].length)return state.sfPhotos[key];
  return [];
}
function sfSavePhotos(arr){
  if(!state.sfPhotos)state.sfPhotos={};
  state.sfPhotos[sfRecipeKey()]=arr;save();
}
function sfRenderRec(body){
  const cat=SF_DATA[sf.catIdx];const rec=cat.items[sf.recIdx];
  // Photos personnalisées (URLs collées par l'utilisateur)
  var imgs=sfGetPhotos();

  const car=document.createElement('div');car.className='sf-carousel';
  if(imgs.length){
    const strip=document.createElement('div');strip.className='sf-carousel-imgs';strip.id='sf-strip';
    imgs.forEach((src,i)=>{
      const img=document.createElement('img');img.className='sf-carousel-img';img.src=src;img.alt=rec.n;img.loading='lazy';
      img.onerror=function(){this.className='sf-carousel-img placeholder';this.textContent=cat.emoji;};
      strip.appendChild(img);
    });
    strip.style.transform='translateX(-'+(sf.carIdx*100)+'%)';
    car.appendChild(strip);
    if(imgs.length>1){
      const dots=document.createElement('div');dots.className='sf-car-dots';dots.id='sf-dots';
      imgs.forEach((_,i)=>{const d=document.createElement('div');d.className='sf-car-dot'+(i===sf.carIdx?' on':'');d.onclick=()=>sfCarGo(i);dots.appendChild(d);});
      car.appendChild(dots);
      const lbt=document.createElement('button');lbt.className='sf-car-btn lft';lbt.innerHTML='‹';lbt.onclick=()=>sfCarGo((sf.carIdx-1+imgs.length)%imgs.length);
      const rbt=document.createElement('button');rbt.className='sf-car-btn rgt';rbt.innerHTML='›';rbt.onclick=()=>sfCarGo((sf.carIdx+1)%imgs.length);
      car.appendChild(lbt);car.appendChild(rbt);
    }
  }else{
    // Placeholder emoji géant
    const ph=document.createElement('div');ph.className='sf-carousel-img placeholder';ph.style.height='100%';ph.textContent=cat.emoji;car.appendChild(ph);
  }
  // Bouton gérer les photos

function sfScale(text,m){
  return text.replace(/([d]+(?:[,.]d+)?)s*(g|kg|ml|l|cl|tasse|c.s|c.c)/gi,(match,n,u)=>{
    const v=parseFloat(n.replace(',','.'));const s=v*m;const nice=s===Math.floor(s)?s:Math.round(s*10)/10;return nice+' '+u;
  });
}

function sfRenderStep(container,rec,si){
  const step=rec.s[si];const isDone=!!sf.stepDone[si];const timer=sf.timers[si];
  const tsec=sfDetectTimer(step);
  const el=document.createElement('div');el.className='sf-step'+(isDone?' done':'');el.id='sf-s-'+si;
  const head=document.createElement('div');head.className='sf-step-head';
  const num=document.createElement('div');num.className='sf-step-n';num.textContent=si+1;
  const txt=document.createElement('div');txt.className='sf-step-txt';txt.textContent=step;
  head.appendChild(num);head.appendChild(txt);el.appendChild(head);
  const foot=document.createElement('div');foot.className='sf-step-foot';
  if(tsec>0){
    const tb=document.createElement('button');tb.id='sf-tb-'+si;
    if(!timer||(!timer.run&&!timer.fin)){tb.className='sf-tbtn';tb.innerHTML='⏱ '+sfFmt(tsec);tb.onclick=()=>sfTimerStart(si,tsec,rec);}
    else if(timer.run){tb.className='sf-tbtn run';tb.innerHTML='⏱ '+sfFmt(timer.sec);tb.onclick=()=>sfTimerStop(si,rec);}
    else{tb.className='sf-tbtn fin';tb.innerHTML='✅ Terminé';tb.onclick=()=>{delete sf.timers[si];sfRefreshStep(si,rec);};}
    foot.appendChild(tb);
  }else{foot.appendChild(document.createElement('span'));}
  const cb=document.createElement('button');cb.className='sf-cbtn';cb.textContent=isDone?'✓ Fait':'Marquer fait';
  cb.onclick=()=>{sf.stepDone[si]=!sf.stepDone[si];sfRefreshStep(si,rec);};
  foot.appendChild(cb);el.appendChild(foot);
  container.appendChild(el);
}

function sfRefreshStep(si,rec){
  const old=document.getElementById('sf-s-'+si);if(!old)return;
  const p=old.parentNode;const nx=old.nextSibling;old.remove();
  const tmp=document.createElement('div');sfRenderStep(tmp,rec,si);p.insertBefore(tmp.firstChild,nx);
}

function sfDetectTimer(t){
  const p=[
    {re:/(\d+)\s*h(?:eure)?s?\s*(\d+)?\s*(?:min(?:utes?)?)?/i,fn:m=>parseInt(m[1])*3600+(m[2]?parseInt(m[2])*60:0)},
    {re:/(\d+)\s*(?:min(?:utes?)?)/i,fn:m=>parseInt(m[1])*60},
    {re:/(\d+)\s*(?:sec(?:ondes?)?)/i,fn:m=>parseInt(m[1])},
  ];
  for(const x of p){const m=t.match(x.re);if(m&&parseInt(m[1])>0){const s=x.fn(m);if(s>0&&s<86400)return s;}}
  return 0;
}

function sfFmt(s){const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);const sc=s%60;if(h>0)return h+'h'+String(m).padStart(2,'0');return String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');}

function sfTimerStart(si,total,rec){
  if(sf.timers[si]&&sf.timers[si].iv)clearInterval(sf.timers[si].iv);
  sf.timers[si]={sec:total,total,run:true,fin:false};
  sf.timers[si].iv=setInterval(()=>{
    sf.timers[si].sec--;
    if(sf.timers[si].sec<=0){
      clearInterval(sf.timers[si].iv);sf.timers[si].run=false;sf.timers[si].fin=true;sf.timers[si].sec=0;
      try{navigator.vibrate&&navigator.vibrate([300,100,300,100,500]);}catch(e){}
      try{notify&&notify('⏱ Timer fini','Étape '+(si+1)+' terminée !');}catch(e){}
    }
    const btn=document.getElementById('sf-tb-'+si);
    if(btn){if(sf.timers[si].fin){btn.className='sf-tbtn fin';btn.innerHTML='✅ Terminé';btn.onclick=()=>{delete sf.timers[si];sfRefreshStep(si,rec);};}
    else{btn.innerHTML='⏱ '+sfFmt(sf.timers[si].sec);}}
  },1000);
  sfRefreshStep(si,rec);
}

function sfTimerStop(si,rec){if(sf.timers[si]&&sf.timers[si].iv)clearInterval(sf.timers[si].iv);delete sf.timers[si];sfRefreshStep(si,rec);}

function sfCarGo(i){

}

/* ===== MÉTÉO FIX — géolocalisation auto ===== */
function loadWeatherAuto(){
  if(!navigator.geolocation){loadWeather();return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat=pos.coords.latitude.toFixed(4);
      const lon=pos.coords.longitude.toFixed(4);
      loadWeatherCoords(lat,lon);
    },
    function(){loadWeather();}, // fallback to hardcoded coords
    {timeout:5000,maximumAge:3600000}
  );
}
function loadWeatherCoords(lat,lon){
  setWx('⛅…');
  const url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code,is_day&daily=weather_code,temperature_2m_max&timezone=auto&forecast_days=7';
  fetch(url).then(r=>r.json()).then(j=>{if(j&&j.current)renderWeather(j);else setWx('⚠');}).catch(()=>setWx('📍?'));
}

// Détection auto d'allergènes dans le texte d'une recette
function detectAllergens(recipe){
  const txt=((recipe.i||[]).join(' ')+' '+(recipe.s||[]).join(' ')+' '+(recipe.n||'')+' '+(recipe.d||'')).toLowerCase();
  const found=new Set();

    oeuf:['oeuf','œuf','jaune','blanc d','mayonnaise','mayo','meringue','aïoli','aioli','hollandaise'],
    poisson:['poisson','thon','saumon','bar','cabillaud','morue','anchois','sardine','maquereau','tilapia','daurade','bonite','dashi','sauce de poisson','katsuobushi','nuoc'],
    arachide:['cacahuète','arachide','beurre de cacahuètes','satay'],
    soja:['soja','tofu','edamame','miso','tamari','tempeh','hoisin','sauce soja'],
    lait:['lait','beurre','crème','fromage','mozzarella','parmesan','gruyère','cheddar','mascarpone','ricotta','feta','yaourt','ghee','reblochon','camembert','burrata','stracciatella','comté','raclette','cream cheese'],
    fruits_coque:['amande','noisette','noix','pistache','cajou','pécan','macadamia','praliné','marron','châtaigne'],
    celeri:['céleri','celeri'],
    moutarde:['moutarde'],
    sesame:['sésame','sesame','tahini','tahin'],
    sulfites:['vin','sulfite','vinaigre de vin'],
    lupin:['lupin'],
    mollusques:['poulpe','calmar','encornet','seiche','moule','palourde','huître','huitre','escargot','coque','pétoncle','saint-jacques','seiches','clam']

/* ===== Détection allergènes pour un plat de section ===== */
function detectPlatAllergens(item){
  // Combine nom + composants + fiche technique si existe
  const ft=(state.fiches&&state.fiches[item.id])||{};
  const parts=[item.name||''];
  (item.comps||[]).forEach(c=>parts.push(c.name||''));
  if(ft.ingredients)parts.push(ft.ingredients);
  if(ft.prep)parts.push(ft.prep);
  if(ft.steps)parts.push(ft.steps);
  // Si allergènes manuels définis dans la fiche, on les utilise en priorité
  if(ft.allergens&&ft.allergens.length)return ft.allergens.slice();
  const txt=parts.join(' ').toLowerCase();
  const found=new Set();
  const rules={
    gluten:['farine','pain','panko','chapelure','blé','semoule','nouille','pâte','pasta','spaghetti','ramen','udon','soba','pita','tortilla','brioche','biscuit','gaufre','crêpe','bao','baguette','naan','couscous','orge','bière','wonton','pizza','focaccia','feuilleté','sablé','choux','croûte'],

function ftField(label,fkey,value,type,placeholder){
  var f=document.createElement('div');f.className='ft-field';

  f.appendChild(inp);

}

function ftSaveAll(itemId){
  var ft=getFiche(itemId);
  document.querySelectorAll('.ft-body [data-f]').forEach(function(el){
    ft[el.dataset.f]=el.value;
  });
  save();
}

function ftRenderTimer(t,itemId){
  var row=document.createElement('div');row.className='ft-timer-row';row.id='ftrow-'+t.id;
  var st=ftTimers[t.id];
  var nm=document.createElement('div');nm.className='ft-timer-name';nm.textContent=t.name;
  var disp=document.createElement('div');disp.className='ft-timer-disp';disp.id='ftdisp-'+t.id;
  disp.textContent=ftFmt(st?st.sec:t.total);
  if(st&&st.running)row.classList.add('running');
  if(st&&st.done)row.classList.add('done');
  var startBtn=document.createElement('button');startBtn.className='ft-tbtn';
  if(!st||(!st.running&&!st.done)){startBtn.textContent='▶';startBtn.onclick=function(){ftStartTimer(t,itemId);};}
  else if(st.running){startBtn.textContent='❚❚';startBtn.onclick=function(){ftPauseTimer(t.id);};}
  else{startBtn.textContent='↻';startBtn.onclick=function(){delete ftTimers[t.id];ftRefreshTimer(t,itemId);};}
  var delBtn=document.createElement('button');delBtn.className='ft-tbtn';delBtn.textContent='🗑';
  delBtn.onclick=function(){var ft=getFiche(itemId);ft.timers=ft.timers.filter(function(x){return x.id!==t.id;});if(ftTimers[t.id]&&ftTimers[t.id].iv)clearInterval(ftTimers[t.id].iv);delete ftTimers[t.id];save();renderAll();};
  row.appendChild(nm);row.appendChild(disp);row.appendChild(startBtn);row.appendChild(delBtn);
  return row;
}

function ftRefreshTimer(t,itemId){
  var old=document.getElementById('ftrow-'+t.id);if(!old)return;
  var nw=ftRenderTimer(t,itemId);old.parentNode.replaceChild(nw,old);
}

function ftStartTimer(t,itemId){
  if(ftTimers[t.id]&&ftTimers[t.id].iv)clearInterval(ftTimers[t.id].iv);
  var start=ftTimers[t.id]&&ftTimers[t.id].sec>0?ftTimers[t.id].sec:t.total;
  ftTimers[t.id]={sec:start,total:t.total,running:true,done:false};
  ftTimers[t.id].iv=setInterval(function(){
    ftTimers[t.id].sec--;
    if(ftTimers[t.id].sec<=0){
      clearInterval(ftTimers[t.id].iv);ftTimers[t.id].running=false;ftTimers[t.id].done=true;ftTimers[t.id].sec=0;
      try{navigator.vibrate&&navigator.vibrate([300,100,300,100,500]);}catch(e){}
      try{notify('⏱ '+t.name,'Minuteur terminé !');}catch(e){}
      ftRefreshTimer(t,itemId);
    }
    var disp=document.getElementById('ftdisp-'+t.id);
    if(disp)disp.textContent=ftFmt(ftTimers[t.id].sec);
  },1000);
  ftRefreshTimer(t,itemId);
}

function ftPauseTimer(tid){
  if(ftTimers[tid]&&ftTimers[tid].iv)clearInterval(ftTimers[tid].iv);
  if(ftTimers[tid])ftTimers[tid].running=false;
  var ft2=null;
  // find item - just refresh via re-render
  var sec=menu.sections.find(function(s){return s.id===ftOpen.secId;});
  if(sec){var it=sec.items.find(function(i){return i.id===ftOpen.itemId;});var t=(getFiche(ftOpen.itemId).timers||[]).find(function(x){return x.id===tid;});if(t)ftRefreshTimer(t,ftOpen.itemId);}
}

function ftFmt(s){var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);var sc=s%60;if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');return String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');}

function escFt(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Import depuis Street Food
function ftOpenImport(itemId){
  var modal=document.createElement('div');modal.className='sf-photo-modal';
  var box=document.createElement('div');box.className='sf-photo-box';box.style.cssText='max-width:380px;max-height:70vh;display:flex;flex-direction:column;';
  box.innerHTML='<div class="sf-photo-title">🍜 Importer une recette</div><input class="sf-photo-inp" id="ftimp-search" placeholder="Rechercher parmi 504 recettes...">';
  var resList=document.createElement('div');resList.style.cssText='overflow-y:auto;flex:1;margin-bottom:12px;';
  box.appendChild(resList);
  var cancel=document.createElement('button');cancel.className='sf-photo-cancel';cancel.textContent='Annuler';cancel.style.width='100%';
  cancel.onclick=function(){document.body.removeChild(modal);};
  box.appendChild(cancel);
  modal.appendChild(box);document.body.appendChild(modal);

  function renderResults(q){
    resList.innerHTML='';q=(q||'').toLowerCase().trim();
    var count=0;
    for(var ci=0;ci<SF_DATA.length&&count<40;ci++){
      for(var ri=0;ri<SF_DATA[ci].items.length&&count<40;ri++){
        var r=SF_DATA[ci].items[ri];
        if(q&&r.n.toLowerCase().indexOf(q)<0&&r.d.toLowerCase().indexOf(q)<0)continue;
        if(!q&&count>=20)break;
        var it=document.createElement('button');it.style.cssText='display:block;width:100%;text-align:left;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:5px;cursor:pointer;font-family:inherit;color:var(--text);';
        it.innerHTML='<div style="font-size:12px;font-weight:600;">'+escFt(r.n)+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">'+SF_DATA[ci].emoji+' '+escFt(SF_DATA[ci].cat)+'</div>';
        (function(recipe){it.onclick=function(){ftImportRecipe(itemId,recipe);document.body.removeChild(modal);renderAll();};})(r);
        resList.appendChild(it);count++;
      }
    }
    if(count===0){resList.innerHTML='<div style="text-align:center;color:var(--text3);font-size:12px;padding:20px;">Aucun résultat</div>';}
  }
  renderResults('');
  document.getElementById('ftimp-search').oninput=function(){renderResults(this.value);};
  modal.onclick=function(e){if(e.target===modal)document.body.removeChild(modal);};
}

function ftImportRecipe(itemId,recipe){
  var ft=getFiche(itemId);
  ft.ingredients=(recipe.i||[]).join('\n');
  ft.steps=(recipe.s||[]).map(function(s,i){return (i+1)+'. '+s;}).join('\n');
  ft.prep=recipe.d||'';
  // detect allergens
  var algs=detectAllergens(recipe);
  ft.allergens=algs;
  // detect timers from steps
  if(!ft.timers)ft.timers=[];
  (recipe.s||[]).forEach(function(step,i){
    var sec=sfDetectTimer(step);
    if(sec>0){ft.timers.push({id:'ftt'+Date.now()+'_'+i,name:'Étape '+(i+1),total:sec});}
  });
  save();
}

/* ===== Suppression produit stock ===== */
function deleteStockProduct(cat,idx,name){
  // Si c'est un produit custom, on l'enlève du customStock
  var baseLen=BASE_ITEMS[cat]?BASE_ITEMS[cat].length:0;
  if(idx>=baseLen){
    var ci=idx-baseLen;
    if(state.customStock&&state.customStock[cat]){state.customStock[cat].splice(ci,1);}
  }else{
    // produit de base : on le masque
    if(!state.hiddenStock)state.hiddenStock={};
    if(!state.hiddenStock[cat])state.hiddenStock[cat]=[];
    state.hiddenStock[cat].push(name);
  }
  applyCustom();save();renderAll();
}

/* ===== Swipe entre interfaces home ===== */
function setupHomeSwipe(container){
  var x0=null,y0=null;
  container.addEventListener('touchstart',function(e){if(e.touches.length===1){x0=e.touches[0].clientX;y0=e.touches[0].clientY;}},{passive:true});
  container.addEventListener('touchend',function(e){
    if(x0===null)return;
    var dx=e.changedTouches[0].clientX-x0;var dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.5){
      var idx=HOME_VIEWS.indexOf(homeView);
      if(dx<0&&idx<HOME_VIEWS.length-1){homeView=HOME_VIEWS[idx+1];organizeMode=false;renderAll();}
      else if(dx>0&&idx>0){homeView=HOME_VIEWS[idx-1];organizeMode=false;renderAll();}
    }
    x0=null;y0=null;
  },{passive:true});
}

function runComparateur(productName,log,btn){

  var i=0;
  function step(){
    if(i>=allStores.length){log.textContent+='\n✓ Terminé — '+allStores.length+' sites ouverts.\nCompare les prix, frais de port et délais dans les onglets.';log.scrollTop=log.scrollHeight;btn.disabled=false;btn.textContent='⚖️ Relancer';return;}

    window.open(directSearchUrl(m.domain,productName),'_blank');i++;setTimeout(step,600);

  vBtn.onclick=function(){var v=(vInp.value||'').trim();if(v){if(!mc.videos)mc.videos=[];mc.videos.push(v);save();renderAll();}};
  var vUp=document.createElement('label');vUp.className='mod-up-btn';vUp.textContent='📁';
  var vFile=document.createElement('input');vFile.type='file';vFile.accept='video/*';vFile.style.display='none';
  vFile.onchange=function(e){var f=e.target.files[0];if(!f)return;if(f.size>4500000){uiConfirm('Vidéo trop lourde (>4.5 Mo) pour le stockage local. Utilise plutôt un lien YouTube. Continuer quand même ?',function(){_storeVid(f,mc);});return;}_storeVid(f,mc);};
  vUp.appendChild(vFile);
  vAdd.appendChild(vInp);vAdd.appendChild(vBtn);vAdd.appendChild(vUp);box.appendChild(vAdd);

  container.appendChild(box);
}
function _storeVid(f,mc){var r=new FileReader();r.onload=function(){if(!mc.videos)mc.videos=[];mc.videos.push(r.result);save();renderAll();};r.readAsDataURL(f);}

function videoEmbed(url){
  // YouTube
  var yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/);
  if(yt){return '<iframe class="mod-video-frame" src="https://www.youtube.com/embed/'+yt[1]+'" frameborder="0" allowfullscreen></iframe>';}
  // Vimeo
  var vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm){return '<iframe class="mod-video-frame" src="https://player.vimeo.com/video/'+vm[1]+'" frameborder="0" allowfullscreen></iframe>';}
  // Fichier local (data URL) ou mp4 direct
  if(url.indexOf('data:video')===0||/\.(mp4|webm|ogg|mov)$/i.test(url)){return '<video class="mod-video-frame" src="'+url+'" controls></video>';}
  // Fallback : lien
  return '<a href="'+url+'" target="_blank" class="mod-video-link">▶ Ouvrir la vidéo</a>';
}

function calorieFor(name){
  var n=(name||'').toLowerCase();
  // recherche exacte puis partielle
  if(CALORIE_DB[n])return CALORIE_DB[n];
  var best=null;
  Object.keys(CALORIE_DB).forEach(function(k){if(n.indexOf(k)>=0){if(!best||k.length>best.length)best=k;}});
  return best?CALORIE_DB[best]:null;
}

function spotifyEmbed(url){
  // Transforme open.spotify.com/track/xxx en embed
  var m=url.match(/open\.spotify\.com\/(intl-[a-z]+\/)?(track|playlist|album|artist|episode|show)\/([a-zA-Z0-9]+)/);
  if(!m)return '';
  var type=m[2],id=m[3];
  var h=(type==='track'||type==='episode')?'152':'380';
  return '<iframe style="border-radius:12px;width:100%;height:'+h+'px;" src="https://open.spotify.com/embed/'+type+'/'+id+'?utm_source=generator" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>';
}

/* ===== ZONES DE FROID (référence éditable) ===== */
const FRIDGE_ZONES_DEFAULT={
  frigo:{label:'Frigo',emoji:'🧊',min:0,max:4},
  timbre:{label:'Timbre',emoji:'🧊',min:0,max:3},
  positive:{label:'Chambre froide positive',emoji:'❄️',min:0,max:4},
  negative:{label:'Chambre froide négative',emoji:'🥶',min:-18,max:-12},
  congel:{label:'Congélé',emoji:'❄️',min:-25,max:-18}
};
function getFridgeZones(){
  if(!state.fridgeZones){state.fridgeZones=JSON.parse(JSON.stringify(FRIDGE_ZONES_DEFAULT));}
  // S'assurer que toutes les zones existent
  Object.keys(FRIDGE_ZONES_DEFAULT).forEach(function(k){if(!state.fridgeZones[k])state.fridgeZones[k]=Object.assign({},FRIDGE_ZONES_DEFAULT[k]);});
  return state.fridgeZones;
}
function zoneStatus(zoneKey,temp){
  if(temp===''||temp==null||isNaN(parseFloat(temp)))return {cls:'none',label:'—'};
  var z=getFridgeZones()[zoneKey];if(!z)return {cls:'none',label:'—'};
  var t=parseFloat(temp);var margin=2;
  if(t>=z.min&&t<=z.max)return {cls:'ok',label:'Conforme'};
  if(t>=z.min-margin&&t<=z.max+margin)return {cls:'cmd',label:'Limite'};
  return {cls:'rupt',label:'Anomalie'};
}

  if(!state.fridges)state.fridges=[];
  var zones=getFridgeZones();

    var z=zones[k];
    var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:9px;padding:10px 13px;';
    row.innerHTML='<span style="font-size:18px;">'+z.emoji+'</span><span style="flex:1;font-size:13px;font-weight:600;color:var(--text);">'+z.label+'</span><span style="font-size:13px;font-weight:700;color:var(--green);">'+z.min+'°C → '+z.max+'°C</span>';
    refGrid.appendChild(row);
  });
  container.appendChild(refGrid);
  // Relevés
  var hd=document.createElement('div');hd.className='section-header';hd.innerHTML='<span class="section-label">Relevés</span>';
  var addb=document.createElement('button');addb.type='button';addb.className='sec-reset';addb.style.color='var(--green)';addb.style.borderColor='var(--green)';addb.textContent='+ Relevé';addb.onclick=function(){openFridgeForm2(null);};
  hd.appendChild(addb);container.appendChild(hd);
  var arr=state.fridges.slice().sort(function(a,b){var ka=(a.date||'')+(a.time||''),kb=(b.date||'')+(b.time||'');return ka<kb?1:(ka>kb?-1:0);});
  if(!arr.length){var e=document.createElement('div');e.className='cmd-empty';e.textContent='Aucun relevé. Clique « + Relevé ».';container.appendChild(e);return;}
  arr.forEach(function(it){
    var zk=it.zone||(it.type==='negatif'?'negative':'frigo');
    var st=zoneStatus(zk,it.temp);var z=zones[zk]||{label:it.name,emoji:'🌡️'};
    var row=document.createElement('div');row.className='dlc-row dlc-'+st.cls;

function nutriFor(name){
  var n=(name||'').toLowerCase();
  if(NUTRI_DB[n])return Object.assign({},NUTRI_DB[n]);
  var best=null;Object.keys(NUTRI_DB).forEach(function(k){if(n.indexOf(k)>=0){if(!best||k.length>best.length)best=k;}});
  return best?Object.assign({},NUTRI_DB[best]):null;
}
// Classement auto (sain/conseillé/calorique...)
function classifyFood(nutri){
  if(!nutri)return [];
  var tags=[];
  if(nutri.kcal<=100)tags.push({k:'sain',label:'🥗 Aliment sain',color:'#16a34a'});
  if(nutri.kcal>=300)tags.push({k:'calorique',label:'🔥 Calorique',color:'#D97706'});
  if(nutri.prot>=15)tags.push({k:'proteine',label:'💪 Riche en protéines',color:'#2563eb'});
  if(nutri.fib>=5)tags.push({k:'fibres',label:'🌾 Riche en fibres',color:'#16a34a'});
  if(nutri.lip>=30)tags.push({k:'gras',label:'🧈 Gras élevé',color:'#D97706'});
  if(nutri.kcal<=100&&nutri.prot>=2)tags.push({k:'conseille',label:'✅ Conseillé',color:'#16a34a'});
  return tags;
}

function getNutriOverride(key){return (state.nutriEdits&&state.nutriEdits[key])||null;}

  var data=override?Object.assign({},base,override):base;

  var box=document.createElement('div');box.className='nutri-card';
  var head=document.createElement('button');head.type='button';head.className='nutri-head';
  var tags=classifyFood(data);
  var tagsHtml=tags.map(function(t){return '<span class="nutri-tag" style="background:'+t.color+'22;color:'+t.color+';">'+t.label+'</span>';}).join('');
  head.innerHTML='<span class="nutri-title">🥗 Fiche nutrition'+(data.kcal!==''?' · '+data.kcal+' kcal/100g':'')+'</span><span class="nutri-toggle">▾</span>';
  var body=document.createElement('div');body.className='nutri-body';body.style.display='none';

  if(tagsHtml){var tg=document.createElement('div');tg.className='nutri-tags';tg.innerHTML=tagsHtml;body.appendChild(tg);}

  var macros=[['kcal','Calories (kcal)'],['prot','Protéines (g)'],['lip','Lipides (g)'],['gluc','Glucides (g)'],['fib','Fibres (g)']];
  var grid=document.createElement('div');grid.className='nutri-grid';

    var inp=document.createElement('input');inp.type='text';inp.value=(data[m[0]]!=null?data[m[0]]:'');inp.inputMode='decimal';

    cell.appendChild(l);cell.appendChild(inp);grid.appendChild(cell);
  });
  body.appendChild(grid);

  // Textes éditables
  var texts=[['vitamines','Vitamines'],['mineraux','Minéraux'],['bon','Nutriments bons'],['mauvais','Points négatifs']];

    f.appendChild(l);f.appendChild(inp);body.appendChild(f);
  });

}
